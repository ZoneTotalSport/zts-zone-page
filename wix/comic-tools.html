<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zone Total Sport &#8212; Comic Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Boogaloo&family=Patrick+Hand&family=Fredoka+One&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        bangers: ['"Luckiest Guy"', 'cursive'],
        boogaloo: ['"Boogaloo"', 'cursive'],
        baloo: ['"Patrick Hand"', 'cursive'],
        fredoka: ['"Fredoka One"', 'cursive'],
      }
    }
  }
}
</script>
<style>
  html, body {
    margin: 0; padding: 0;
    background: transparent;
    overflow: visible;
    font-family: 'Patrick Hand', cursive;
  }

  /* ========== DOCK ========== */
  .nav-dock {
    position: fixed; right: 20px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 1rem; z-index: 900; padding: 10px;
  }
  .nav-icon-box {
    background: #fff; width: 3.2rem; height: 3.2rem; border: 3px solid #18181b;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s cubic-bezier(0.175,0.885,0.32,1.275);
    box-shadow: 4px 4px 0px #18181b; border-radius: 10px;
  }
  .nav-item:hover .nav-icon-box { transform: scale(1.2) rotate(-5deg); background: #22D3EE; z-index: 60; }
  .nav-item.active .nav-icon-box { background: #FACC15; transform: scale(1.1); }
  .nav-label {
    transition: all 0.2s; opacity: 0; transform: translateX(10px) scale(0.8);
    pointer-events: none; position: absolute; right: 100%; top: 50%;
    margin-right: 12px; margin-top: -14px; z-index: 60;
    background: #18181b; color: #fff; padding: 4px 12px; border: 2px solid #fff;
    box-shadow: -4px 4px 0px rgba(0,0,0,0.2);
    font-family: 'Luckiest Guy', cursive; font-size: 0.9rem; white-space: nowrap; border-radius: 6px;
  }
  .nav-item:hover .nav-label { opacity: 1; transform: translateX(0) scale(1); }

  /* ========== POPUP ========== */
  .comic-popup {
    background: #fff; border: 5px solid #18181b; box-shadow: 10px 10px 0px rgba(0,0,0,0.8);
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(1); z-index: 950;
    padding: 4rem 2rem 2rem; width: 90vw; max-width: 550px; height: auto; max-height: 90vh;
    overflow-y: auto; display: flex; flex-direction: column; align-items: center; justify-content: center;
    animation: comicPopIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275); border-radius: 16px;
  }
  @keyframes comicPopIn { from { transform: translate(-50%,-50%) scale(0.5); opacity: 0; } to { transform: translate(-50%,-50%) scale(1); opacity: 1; } }
  .comic-popup.hidden { display: none !important; }

  .comic-btn { transition: transform 0.1s, box-shadow 0.1s; cursor: pointer; border: 3px solid #18181b; box-shadow: 4px 4px 0px #18181b; border-radius: 8px; }
  .comic-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0px #18181b; }

  .close-btn {
    position: absolute; top: 15px; right: 15px; width: 44px; height: 44px;
    background: #EF4444; border: 3px solid #18181b; border-radius: 50%; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Luckiest Guy', cursive; font-size: 1.3rem; cursor: pointer;
    box-shadow: 3px 3px 0px #18181b; transition: transform 0.1s; z-index: 60;
  }
  .close-btn:hover { transform: scale(1.1); }

  .comic-input { border: 3px solid #18181b; outline: none; font-family: 'Patrick Hand', cursive; padding: 0.5rem; font-size: 1.2rem; width: 100%; border-radius: 8px; }
  .comic-input:focus { background: #FEF08A; }

  /* Dice */
  .dice-container { perspective: 1000px; margin: 1rem 0 2rem; }
  .dice { width: 130px; height: 130px; position: relative; transform-style: preserve-3d; transition: transform 1s ease-out; cursor: pointer; }
  .face { position: absolute; width: 130px; height: 130px; background: #fff; border: 4px solid #18181b; display: flex; justify-content: center; align-items: center; font-size: 3.5rem; font-family: 'Luckiest Guy', cursive; border-radius: 12px; }
  .face:nth-child(1) { transform: translateZ(65px); }
  .face:nth-child(2) { transform: rotateY(180deg) translateZ(65px); }
  .face:nth-child(3) { transform: rotateY(90deg) translateZ(65px); }
  .face:nth-child(4) { transform: rotateY(-90deg) translateZ(65px); }
  .face:nth-child(5) { transform: rotateX(90deg) translateZ(65px); }
  .face:nth-child(6) { transform: rotateX(-90deg) translateZ(65px); }

  /* Period window controls */
  .window-controls { position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; z-index: 60; }
  .win-btn { width: 36px; height: 36px; border: 3px solid #18181b; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 3px 3px 0px #18181b; transition: transform 0.1s; background: #fff; }
  .win-btn:hover { transform: scale(1.1); }

  .comic-popup.fullscreen { width: 100vw!important; height: 100vh!important; max-width: none!important; max-height: none!important; top: 0!important; left: 0!important; transform: none!important; border: none; border-radius: 0; z-index: 9990; padding: 0; background: #FACC15; }
  .comic-popup.fullscreen #period-countdown { font-size: 13vw!important; line-height: 1; font-family: 'Luckiest Guy', cursive!important; background: #fff; color: #18181b!important; border: 8px solid #18181b; padding: 3rem 5rem!important; box-shadow: 15px 15px 0px #18181b; transform: rotate(-2deg); max-width: 90vw; white-space: nowrap; }
  .comic-popup.fullscreen h2 { font-size: 4.5vw!important; margin-bottom: 3rem; background: #fff; color: #18181b; border: 4px solid #18181b; padding: 0.5rem 2rem; transform: rotate(1deg); white-space: nowrap; }
  .comic-popup.fullscreen .hide-fs { display: none; }
  .comic-popup.fullscreen .window-controls { top: 20px; right: 20px; }

  .comic-popup.mini { width: auto!important; max-width: none!important; height: auto!important; padding: 15px!important; top: 20px!important; right: 20px!important; left: auto!important; transform: none!important; box-shadow: 4px 4px 0px rgba(0,0,0,0.5); border-width: 3px; display: flex; align-items: center; justify-content: center; min-width: 150px; overflow: visible!important; border-radius: 12px; }
  .comic-popup.mini h2, .comic-popup.mini label, .comic-popup.mini input, .comic-popup.mini p, .comic-popup.mini .flex.gap-2, .comic-popup.mini .flex.gap-3 { display: none!important; }
  .comic-popup.mini .bg-cyan-200 { background: transparent!important; border: none!important; box-shadow: none!important; padding: 0!important; margin: 0!important; width: auto!important; }
  .comic-popup.mini .bg-black.text-green-400 { background: transparent!important; border: none!important; padding: 0!important; }
  .comic-popup.mini #period-countdown { font-size: 2.5rem!important; border: none; background: transparent; color: #18181b!important; padding: 0; display: block!important; line-height: 1; font-family: 'Luckiest Guy', cursive; }
  .comic-popup.mini .window-controls { top: -10px; right: -10px; transform: scale(0.5); transform-origin: top right; }

  /* Overlay behind popup */
  .popup-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 940;
  }
  .popup-overlay.active { display: block; }

  @media (max-width: 768px) {
    .nav-dock { right: 10px; gap: 0.8rem; }
    .nav-icon-box { width: 2.8rem; height: 2.8rem; }
    .nav-label { display: none; }
    .comic-popup { width: 95vw; padding: 3rem 1.5rem 1.5rem; }
  }
</style>
</head>
<body>

<!-- ========== COMIC TOOLS DOCK ========== -->
<nav class="nav-dock">
    <button onclick="openToolPopup('dice')" class="nav-item group relative outline-none">
        <div class="nav-icon-box"><i data-lucide="dice-5" class="w-7 h-7 text-black stroke-[2.5px]"></i></div>
        <div class="nav-label rotate-1">D&#201; / DICE</div>
    </button>
    <button onclick="openToolPopup('wheel')" class="nav-item group relative outline-none">
        <div class="nav-icon-box"><i data-lucide="aperture" class="w-7 h-7 text-black stroke-[2.5px]"></i></div>
        <div class="nav-label -rotate-2" style="background:#F472B6">ROUE / WHEEL</div>
    </button>
    <button onclick="openToolPopup('stopwatch')" class="nav-item group relative outline-none">
        <div class="nav-icon-box"><i data-lucide="timer" class="w-7 h-7 text-black stroke-[2.5px]"></i></div>
        <div class="nav-label rotate-2" style="background:#22C55E">CHRONO</div>
    </button>
    <button onclick="openToolPopup('timer')" class="nav-item group relative outline-none">
        <div class="nav-icon-box"><i data-lucide="hourglass" class="w-7 h-7 text-black stroke-[2.5px]"></i></div>
        <div class="nav-label -rotate-1" style="background:#FACC15;color:#18181b">TIMER</div>
    </button>
    <button onclick="openToolPopup('period')" class="nav-item group relative outline-none">
        <div class="nav-icon-box"><i data-lucide="school" class="w-7 h-7 text-black stroke-[2.5px]"></i></div>
        <div class="nav-label rotate-3" style="background:#22D3EE;color:#18181b">CLASSE</div>
    </button>
</nav>

<!-- Overlay -->
<div id="popup-overlay" class="popup-overlay" onclick="closeAllPopups()"></div>

<!-- POPUP D&#201; -->
<div id="popup-dice" class="comic-popup hidden">
    <button onclick="closeToolPopup('dice')" class="close-btn">X</button>
    <div class="flex flex-col items-center space-y-4 w-full">
        <h2 class="text-3xl font-bangers text-center tracking-wide">D&#201; / DICE</h2>
        <div class="dice-container w-[130px] h-[130px]">
            <div id="dice" class="dice" onclick="rollDice()">
                <div class="face bg-red-500 text-white">1</div>
                <div class="face bg-blue-500 text-white">6</div>
                <div class="face bg-yellow-400 text-black">3</div>
                <div class="face bg-green-500 text-white">4</div>
                <div class="face bg-purple-500 text-white">5</div>
                <div class="face bg-orange-500 text-white">2</div>
            </div>
        </div>
        <div id="dice-result" class="opacity-0 transition-opacity text-6xl font-bangers text-red-600 drop-shadow-[2px_2px_0px_black] h-16">--</div>
        <p class="text-sm text-gray-400 font-baloo">Clique le cube!</p>
    </div>
</div>

<!-- POPUP ROUE -->
<div id="popup-wheel" class="comic-popup hidden">
    <button onclick="closeToolPopup('wheel')" class="close-btn">X</button>
    <div class="flex flex-col items-center w-full">
        <h2 class="text-3xl font-bangers mb-4 tracking-wide">ROUE / WHEEL</h2>
        <div class="relative w-[280px] h-[280px] mb-4">
            <canvas id="wheelCanvas" width="280" height="280" class="w-full h-full"></canvas>
            <div class="absolute top-0 left-1/2 -translate-x-1/2 -mt-2 w-0 h-0 border-l-[12px] border-l-transparent border-r-[12px] border-r-transparent border-t-[25px] border-t-black z-10"></div>
        </div>
        <button onclick="spinWheel()" class="comic-btn bg-red-500 text-white font-bangers text-xl px-8 py-2 mb-4 hover:bg-red-400">TOURNER!</button>
        <div class="w-full max-w-sm">
            <label class="font-bangers text-sm tracking-wide">NOMS / NAMES:</label>
            <textarea id="wheel-names" class="comic-input h-20 text-sm" oninput="drawWheel()">L&#233;a, Thomas, Sarah, Lucas</textarea>
        </div>
    </div>
</div>

<!-- POPUP CHRONO -->
<div id="popup-stopwatch" class="comic-popup hidden">
    <button onclick="closeToolPopup('stopwatch')" class="close-btn">X</button>
    <div class="flex flex-col items-center w-full max-w-md">
        <h2 class="text-3xl font-bangers mb-6 tracking-wide">CHRONO</h2>
        <div class="bg-white border-4 border-black p-6 shadow-[6px_6px_0px_black] rotate-1 mb-8 w-full rounded-xl">
            <div id="stopwatch-display" class="font-bangers text-5xl tracking-widest text-center">00:00:00</div>
        </div>
        <div class="flex gap-4 w-full justify-center">
            <button onclick="toggleStopwatch()" id="sw-btn" class="comic-btn bg-green-400 text-black font-bangers text-xl px-6 py-3 flex-1">START</button>
            <button onclick="resetStopwatch()" class="comic-btn bg-red-400 text-black font-bangers text-xl px-6 py-3 flex-1">RESET</button>
        </div>
    </div>
</div>

<!-- POPUP TIMER -->
<div id="popup-timer" class="comic-popup hidden">
    <button onclick="closeToolPopup('timer')" class="close-btn">X</button>
    <div class="flex flex-col items-center w-full max-w-md">
        <h2 class="text-3xl font-bangers mb-6 tracking-wide">MINUTEUR / TIMER</h2>
        <div class="relative flex items-center justify-center w-48 h-48 mb-6">
            <div class="absolute inset-0 bg-red-500 rounded-full animate-pulse opacity-20"></div>
            <div class="relative z-10 bg-white border-4 border-black rounded-full w-44 h-44 flex items-center justify-center shadow-[6px_6px_0px_black]">
                <span id="timer-display" class="font-bangers text-4xl">00:00</span>
            </div>
        </div>
        <div class="flex gap-2 mb-6 items-end">
            <div class="text-center"><label class="text-xs font-bold block">MIN</label><input type="number" id="timer-min" value="5" class="comic-input w-20 text-center text-2xl" min="0"></div>
            <span class="font-bangers text-3xl pb-1">:</span>
            <div class="text-center"><label class="text-xs font-bold block">SEC</label><input type="number" id="timer-sec" value="0" class="comic-input w-20 text-center text-2xl" min="0" max="59"></div>
        </div>
        <div class="flex gap-4 w-full">
            <button onclick="startTimer()" id="tm-btn" class="comic-btn bg-yellow-400 text-black font-bangers text-lg px-4 py-3 flex-1">GO!</button>
            <button onclick="resetTimer()" class="comic-btn bg-gray-300 text-black font-bangers text-lg px-4 py-3 flex-1">STOP</button>
        </div>
    </div>
</div>

<!-- POPUP CLASSE / PERIOD -->
<div id="popup-period" class="comic-popup hidden transition-all duration-300">
    <div class="window-controls">
        <button onclick="toggleMode('period','mini')" class="win-btn bg-blue-300" title="Mini"><i data-lucide="minimize-2" class="w-4 h-4 stroke-[3px]"></i></button>
        <button onclick="toggleMode('period','fullscreen')" class="win-btn bg-yellow-300" title="Plein &#233;cran"><i data-lucide="maximize" class="w-4 h-4 stroke-[3px]"></i></button>
        <button onclick="closeToolPopup('period')" class="win-btn bg-red-500 text-white font-bangers text-lg">X</button>
    </div>
    <div class="flex flex-col items-center w-full max-w-lg">
        <h2 class="text-2xl font-bangers mb-2 bg-black text-white w-full text-center py-2 -rotate-1 shadow-[4px_4px_0px_rgba(0,0,0,0.2)] rounded-lg tracking-wide">FIN DU COURS / END OF CLASS</h2>
        <div class="w-full mt-4 p-4 bg-cyan-200 border-4 border-black shadow-[6px_6px_0px_black] flex flex-col items-center rounded-xl">
            <label class="block font-bangers text-lg mb-1 hide-fs tracking-wide">HEURE DE FIN</label>
            <div class="flex gap-2 mb-3 w-full justify-center hide-fs flex-wrap">
                <button onclick="addMinutesToPeriod(30)" class="bg-white border-2 border-black rounded px-3 py-1 font-bangers hover:bg-cyan-100 shadow-[2px_2px_0px_black] active:translate-y-1 transition-all">+30m</button>
                <button onclick="addMinutesToPeriod(45)" class="bg-white border-2 border-black rounded px-3 py-1 font-bangers hover:bg-cyan-100 shadow-[2px_2px_0px_black] active:translate-y-1 transition-all">+45m</button>
                <button onclick="addMinutesToPeriod(50)" class="bg-white border-2 border-black rounded px-3 py-1 font-bangers hover:bg-cyan-100 shadow-[2px_2px_0px_black] active:translate-y-1 transition-all">+50m</button>
                <button onclick="addMinutesToPeriod(60)" class="bg-white border-2 border-black rounded px-3 py-1 font-bangers hover:bg-cyan-100 shadow-[2px_2px_0px_black] active:translate-y-1 transition-all">+60m</button>
            </div>
            <input type="time" id="period-end" class="comic-input w-full text-center text-3xl mb-4 hide-fs cursor-pointer bg-white">
            <div class="flex gap-3 w-full mb-4 hide-fs">
                <button onclick="startPeriodTimer()" id="period-btn" class="comic-btn bg-green-400 text-black font-bangers text-lg px-2 py-2 flex-1">D&#201;MARRER</button>
                <button onclick="stopPeriodTimer()" class="comic-btn bg-red-400 text-white font-bangers text-lg px-2 py-2 flex-1">ARR&#202;T</button>
            </div>
            <div class="bg-black text-green-400 font-mono text-center p-4 border-2 border-white rounded transition-all duration-300 w-full">
                <span id="period-countdown" class="text-5xl font-bold block">--:--:--</span>
            </div>
        </div>
        <p class="text-xs text-center mt-3 font-bold hide-fs text-gray-400">Le temps s'&#233;coule m&#234;me ferm&#233;!</p>
    </div>
</div>

<script>
// ============================================================
// ============ COMIC TOOLS JS
// ============================================================

const GROUP_ID = 'comicTools';
const alarmSound = new Audio("https://static.wixstatic.com/mp3/692b77_1862ffbf28ff4a6a863045f716cddfa6.mp3");
function playAlarm() { alarmSound.currentTime = 0; alarmSound.play().catch(e => {}); }

// ---------- POPUP MANAGEMENT ----------
function openToolPopup(id) {
    document.querySelectorAll('.comic-popup').forEach(p => p.classList.add('hidden'));
    const popup = document.getElementById(`popup-${id}`);
    if (popup) { popup.classList.remove('hidden'); if (id === 'wheel') drawWheel(); }
    document.getElementById('popup-overlay').classList.add('active');
    lucide.createIcons();
}
function closeToolPopup(id) {
    const popup = document.getElementById(`popup-${id}`);
    if (popup) { popup.classList.add('hidden'); popup.classList.remove('fullscreen', 'mini'); }
    // Check if any popup still open
    const anyOpen = document.querySelectorAll('.comic-popup:not(.hidden)');
    if (anyOpen.length === 0) document.getElementById('popup-overlay').classList.remove('active');
}
function closeAllPopups() {
    document.querySelectorAll('.comic-popup').forEach(p => { p.classList.add('hidden'); p.classList.remove('fullscreen', 'mini'); });
    document.getElementById('popup-overlay').classList.remove('active');
}
function toggleMode(id, mode) {
    const popup = document.getElementById(`popup-${id}`);
    if (popup.classList.contains(mode)) { popup.classList.remove(mode); }
    else { popup.classList.remove('fullscreen', 'mini'); popup.classList.add(mode); }
}

// ---------- DICE ----------
function rollDice() {
    const dice = document.getElementById('dice');
    const resultDisplay = document.getElementById('dice-result');
    resultDisplay.style.opacity = '0';
    const result = Math.floor(Math.random() * 6) + 1;
    let xBase = 0, yBase = 0;
    switch (result) {
        case 1: xBase = 0; yBase = 0; break;
        case 6: xBase = 0; yBase = 180; break;
        case 3: xBase = 0; yBase = -90; break;
        case 4: xBase = 0; yBase = 90; break;
        case 5: xBase = -90; yBase = 0; break;
        case 2: xBase = 90; yBase = 0; break;
    }
    const xF = xBase + (Math.floor(Math.random() * 3) + 2) * 360;
    const yF = yBase + (Math.floor(Math.random() * 3) + 2) * 360;
    dice.style.transform = `rotateX(${xF}deg) rotateY(${yF}deg)`;
    setTimeout(() => {
        resultDisplay.innerText = result;
        resultDisplay.style.opacity = '1';
        resultDisplay.style.transform = "scale(1.5)";
        setTimeout(() => resultDisplay.style.transform = "scale(1)", 200);
    }, 1000);
}

// ---------- WHEEL ----------
let wheelCanvas = document.getElementById('wheelCanvas');
let wheelCtx = wheelCanvas ? wheelCanvas.getContext('2d') : null;
let wheelNames = []; let wheelRotation = 0; let wheelSpinning = false;
const wheelColors = ['#FACC15', '#22D3EE', '#F472B6', '#A7F3D0', '#C4B5FD', '#FCA5A5'];

function drawWheel() {
    if (!wheelCtx || !wheelCanvas) return;
    const text = document.getElementById('wheel-names').value;
    wheelNames = text.split(',').map(n => n.trim()).filter(n => n.length > 0);
    if (wheelNames.length === 0) wheelNames = ['?'];
    const cx = wheelCanvas.width / 2, cy = wheelCanvas.height / 2, r = 110;
    const step = (2 * Math.PI) / wheelNames.length;
    wheelCtx.clearRect(0, 0, wheelCanvas.width, wheelCanvas.height);
    wheelCtx.beginPath(); wheelCtx.arc(cx, cy, r + 5, 0, 2 * Math.PI); wheelCtx.fillStyle = '#18181b'; wheelCtx.fill();
    wheelCtx.save(); wheelCtx.translate(cx, cy); wheelCtx.rotate(wheelRotation);
    for (let i = 0; i < wheelNames.length; i++) {
        wheelCtx.beginPath(); wheelCtx.moveTo(0, 0); wheelCtx.arc(0, 0, r, i * step, (i + 1) * step); wheelCtx.closePath();
        wheelCtx.fillStyle = wheelColors[i % wheelColors.length]; wheelCtx.fill(); wheelCtx.stroke();
        wheelCtx.save(); wheelCtx.rotate(i * step + step / 2); wheelCtx.textAlign = 'right';
        wheelCtx.fillStyle = '#18181b'; wheelCtx.font = 'bold 13px Patrick Hand'; wheelCtx.fillText(wheelNames[i], r - 10, 5);
        wheelCtx.restore();
    }
    wheelCtx.restore();
}
function spinWheel() {
    if (wheelSpinning || wheelNames.length < 1) return;
    wheelSpinning = true;
    let vel = 0.5 + Math.random() * 0.5, fric = 0.99;
    function anim() {
        if (vel < 0.002) { wheelSpinning = false; return; }
        vel *= fric; wheelRotation += vel; drawWheel(); requestAnimationFrame(anim);
    }
    anim();
}
if (wheelCanvas) drawWheel();

// ---------- STOPWATCH ----------
let swInterval, swTime = 0, swRunning = false;
function updateSWDisplay() {
    const h = Math.floor(swTime / 360000), m = Math.floor((swTime % 360000) / 6000), s = Math.floor((swTime % 6000) / 100);
    const f = n => n.toString().padStart(2, '0');
    document.getElementById('stopwatch-display').innerText = `${f(h)}:${f(m)}:${f(s)}`;
}
function toggleStopwatch() {
    const btn = document.getElementById('sw-btn');
    if (swRunning) { clearInterval(swInterval); swRunning = false; btn.innerText = "START"; btn.className = btn.className.replace('bg-yellow-400', 'bg-green-400'); }
    else { swInterval = setInterval(() => { swTime += 10; updateSWDisplay(); }, 10); swRunning = true; btn.innerText = "PAUSE"; btn.className = btn.className.replace('bg-green-400', 'bg-yellow-400'); }
}
function resetStopwatch() { clearInterval(swInterval); swRunning = false; swTime = 0; updateSWDisplay(); document.getElementById('sw-btn').innerText = "START"; }

// ---------- TIMER ----------
let tmInterval, tmTotal = 0, tmRunning = false;
function updateTmDisplay(s) { if (s < 0) s = 0; document.getElementById('timer-display').innerText = `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }
function startTimer() {
    if (tmInterval) clearInterval(tmInterval);
    tmTotal = (parseInt(document.getElementById('timer-min').value)||0)*60 + (parseInt(document.getElementById('timer-sec').value)||0);
    if (tmTotal <= 0) return; tmRunning = true; document.getElementById('tm-btn').innerText = "..."; updateTmDisplay(tmTotal);
    tmInterval = setInterval(() => { tmTotal--; updateTmDisplay(tmTotal); if (tmTotal <= 0) { clearInterval(tmInterval); tmRunning = false; document.getElementById('tm-btn').innerText = "GO!"; document.getElementById('timer-display').innerText = "FINI!"; playAlarm(); } }, 1000);
}
function resetTimer() { if (tmInterval) clearInterval(tmInterval); tmRunning = false; document.getElementById('tm-btn').innerText = "GO!"; updateTmDisplay((parseInt(document.getElementById('timer-min').value)||0)*60+(parseInt(document.getElementById('timer-sec').value)||0)); }

// ---------- PERIOD ----------
let periodInterval;
function addMinutesToPeriod(min) {
    const now = new Date(); now.setMinutes(now.getMinutes() + min);
    document.getElementById('period-end').value = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    stopPeriodTimer();
}
function startPeriodTimer() {
    const timeInput = document.getElementById('period-end').value; if (!timeInput) return;
    const btn = document.getElementById('period-btn'); btn.innerText = "EN COURS..."; btn.className = btn.className.replace('bg-green-400', 'bg-yellow-400');
    if (periodInterval) clearInterval(periodInterval);
    periodInterval = setInterval(() => {
        const now = new Date(), [tH, tM] = timeInput.split(':').map(Number), target = new Date();
        target.setHours(tH, tM, 0, 0); let diff = target - now;
        if (diff <= 0) { clearInterval(periodInterval); document.getElementById('period-countdown').innerText = "00:00:00"; btn.innerText = "TERMIN&#201;!"; btn.className = btn.className.replace('bg-yellow-400', 'bg-green-400'); playAlarm(); return; }
        const h = Math.floor((diff/3600000)%24), m = Math.floor((diff/60000)%60), s = Math.floor((diff/1000)%60);
        document.getElementById('period-countdown').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }, 1000);
}
function stopPeriodTimer() {
    if (periodInterval) clearInterval(periodInterval); document.getElementById('period-countdown').innerText = "--:--:--";
    const btn = document.getElementById('period-btn'); btn.innerText = "D&#201;MARRER"; if (btn.className.includes('bg-yellow-400')) btn.className = btn.className.replace('bg-yellow-400', 'bg-green-400');
}

// ---------- POSTMESSAGE BRIDGE ----------
window.addEventListener('message', (e) => {
    if (!e.data || !e.data.type) return;
    // No specific messages to handle yet for comic tools
    // Could add setLang to translate labels in future
});

// Init Lucide icons
lucide.createIcons();
