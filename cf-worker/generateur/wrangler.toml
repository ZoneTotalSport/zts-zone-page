name = "zts-generateur"
main = "src/generateur-worker.js"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Route prod : voir [[env.production.routes]] plus bas.

# Default top-level = safe (prod). Un déploiement sans --env hérite de "prod".
[vars]
DEFAULT_MODEL = "claude-haiku-4-5-20251001"
SONNET_MODEL = "claude-sonnet-4-6"
QUOTA_FREE_MONTH = "10"
QUOTA_ANON_MONTH = "3"
MAX_OUTPUT_TOKENS = "2000"
FIREBASE_PROJECT_ID = "zone-total-sport"
ENVIRONMENT = "prod"

# Secrets (à provisionner via `wrangler secret put`) :
# - ANTHROPIC_API_KEY        (clé zts-generateur-worker)
# - FIREBASE_SERVICE_ACCOUNT (JSON service account complet, single-line)

[[kv_namespaces]]
binding = "ANON_QUOTA"
id = "3dc369766df54fafadd52bb232f34573"
preview_id = "d523ae6dd61e4bba9521fa88d4e2ccfb"

# ────────────────────────────────────────────────────────────────────
# DEV : `wrangler dev --env dev` ou `wrangler deploy --env dev`
# Active les routes /debug/* (gated par ENVIRONMENT === "dev" côté worker).
# ────────────────────────────────────────────────────────────────────
[env.dev]
name = "zts-generateur-dev"

[env.dev.vars]
DEFAULT_MODEL = "claude-haiku-4-5-20251001"
SONNET_MODEL = "claude-sonnet-4-6"
QUOTA_FREE_MONTH = "10"
QUOTA_ANON_MONTH = "3"
MAX_OUTPUT_TOKENS = "2000"
FIREBASE_PROJECT_ID = "zone-total-sport"
ENVIRONMENT = "dev"

[[env.dev.kv_namespaces]]
binding = "ANON_QUOTA"
id = "3dc369766df54fafadd52bb232f34573"
preview_id = "d523ae6dd61e4bba9521fa88d4e2ccfb"

# ────────────────────────────────────────────────────────────────────
# PRODUCTION : `wrangler deploy --env production`
# /debug/* renvoient 404. Sert api.zonetotalsport.ca.
# ────────────────────────────────────────────────────────────────────
[env.production]
name = "zts-generateur"

[env.production.vars]
DEFAULT_MODEL = "claude-haiku-4-5-20251001"
SONNET_MODEL = "claude-sonnet-4-6"
QUOTA_FREE_MONTH = "10"
QUOTA_ANON_MONTH = "3"
MAX_OUTPUT_TOKENS = "2000"
FIREBASE_PROJECT_ID = "zone-total-sport"
ENVIRONMENT = "prod"

[[env.production.kv_namespaces]]
binding = "ANON_QUOTA"
id = "3f1ca3dec85e4472930beea526ff9273"

[[env.production.routes]]
pattern = "api.zonetotalsport.ca"
custom_domain = true
