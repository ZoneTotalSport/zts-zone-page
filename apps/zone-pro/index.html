<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zone PRO — Banque ÉPS internationale · Zone Total Sport</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Bangers&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'ZoneTotalSport';
  src: url('ZoneTotalSport.ttf') format('truetype');
  font-display: swap;
  size-adjust: 50%;
  unicode-range: U+0020-007E;
}
:root {
  --cyan: #00E5FF;
  --cyan-d: #00B4D8;
  --jaune: #FFD600;
  --nuit: #0D1B2A;
  --nuit-2: #1B2942;
  --blanc: #FFFFFF;
  --gris: #E8ECF1;
  --rouge: #E63946;
  --violet: #9D4EDD;
  --vert: #06A77D;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: 'Fredoka', system-ui, sans-serif;
  color: var(--blanc);
  min-height: 100vh;
  overflow-x: hidden;
}
body {
  background:
    linear-gradient(135deg, rgba(13,27,42,.88) 0%, rgba(27,41,66,.92) 100%),
    url('gym-bg.jpg') center/cover fixed no-repeat;
}
@media (max-width: 768px) { body { background-attachment: scroll; } }

a { color: var(--cyan); }

/* Hero */
.hero {
  background: linear-gradient(135deg, var(--cyan-d) 0%, var(--cyan) 100%);
  color: var(--nuit);
  padding: 32px 20px 40px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: ""; position: absolute; inset: 0;
  background: radial-gradient(circle at 20% 30%, rgba(255,214,0,.30) 0%, transparent 40%),
              radial-gradient(circle at 80% 70%, rgba(13,27,42,.18) 0%, transparent 40%);
  pointer-events: none;
}
.hero h1 {
  font-family: 'Luckiest Guy', cursive;
  font-size: 3.8rem; letter-spacing: 2px; line-height: 0.9;
  text-shadow: 4px 4px 0 var(--jaune), 8px 8px 0 var(--nuit);
  margin-bottom: 12px; position: relative;
}
.hero .subtitle {
  font-family: 'Luckiest Guy', cursive;
  font-size: 1.2rem; letter-spacing: 1px; color: var(--nuit); position: relative;
}
.hero .pill-row {
  margin-top: 18px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
  position: relative;
}
.pill {
  background: var(--nuit); color: var(--cyan);
  padding: 8px 16px; border-radius: 999px;
  font-family: 'Luckiest Guy', cursive; letter-spacing: 1px;
  font-size: 1rem; box-shadow: 3px 3px 0 var(--jaune);
}
.pill strong { color: var(--jaune); font-size: 1.1rem; }

/* Categories */
.cats {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 12px; padding: 20px;
  max-width: 1280px; margin: 0 auto;
}
@media (max-width: 900px) { .cats { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px) { .cats { grid-template-columns: 1fr; } }
.cat-card {
  background: var(--nuit-2);
  border: 2px solid var(--cyan);
  border-radius: 14px;
  padding: 16px;
  text-align: center;
  cursor: pointer;
  transition: transform .15s ease, box-shadow .15s ease;
  position: relative;
}
.cat-card:hover { transform: translateY(-4px); box-shadow: 0 8px 0 var(--jaune); }
.cat-card.active { background: var(--cyan); color: var(--nuit); border-color: var(--jaune); }
.cat-card .icon { font-size: 2rem; }
.cat-card .label {
  font-family: 'Luckiest Guy', cursive;
  font-size: 1.4rem; letter-spacing: 1px;
  margin-top: 6px;
}
.cat-card .count {
  font-size: .9rem; opacity: .8; margin-top: 4px;
}

/* Filters */
.filters {
  background: var(--nuit-2); padding: 14px 20px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center;
  border-top: 2px solid var(--cyan); border-bottom: 2px solid var(--cyan);
}
.filters input, .filters select {
  background: var(--nuit); color: var(--blanc);
  border: 2px solid var(--cyan); border-radius: 8px;
  padding: 10px 14px; font-family: 'Fredoka', sans-serif; font-size: 1rem;
  min-width: 180px;
}
.filters input { flex: 1 1 280px; max-width: 480px; }
.filters input:focus, .filters select:focus { outline: none; border-color: var(--jaune); }
.filters .clear-btn {
  background: var(--rouge); color: var(--blanc); border: none;
  padding: 10px 18px; border-radius: 8px; cursor: pointer;
  font-family: 'Luckiest Guy', cursive; letter-spacing: 1px;
}

/* Grid */
.grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px; padding: 20px;
  max-width: 1400px; margin: 0 auto;
}
@media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
.card {
  background: var(--nuit-2);
  border: 2px solid var(--cyan); border-radius: 12px;
  overflow: hidden; cursor: pointer;
  transition: transform .15s ease, box-shadow .15s ease;
  display: flex; flex-direction: column;
}
.card:hover { transform: translateY(-3px); box-shadow: 0 6px 0 var(--jaune); }
.card .thumb {
  width: 100%; aspect-ratio: 16/10;
  background: var(--nuit); display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}
.card .thumb img { width: 100%; height: 100%; object-fit: cover; }
.card .thumb .placeholder {
  font-size: 3rem;
}
.card .body { padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
.card .badge {
  display: inline-block; padding: 3px 8px; border-radius: 6px;
  font-family: 'Luckiest Guy', cursive; font-size: .85rem; letter-spacing: 1px;
  align-self: flex-start;
}
.card h3 {
  font-family: 'Luckiest Guy', cursive; font-size: 1.2rem; letter-spacing: .5px;
  color: var(--jaune); line-height: 1.1; min-height: 2.4em;
}
.card .meta {
  font-size: .82rem; opacity: .75; margin-top: auto;
}

.no-results {
  text-align: center; padding: 60px 20px; opacity: .7;
  font-size: 1.1rem;
}

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.85);
  display: none; z-index: 1000;
  overflow-y: auto;
  padding: 20px;
}
.modal-overlay.show { display: block; }
.modal {
  background: var(--nuit-2);
  max-width: 900px; margin: 20px auto;
  border-radius: 14px; border: 3px solid var(--cyan);
  padding: 24px; position: relative;
}
@media (max-width: 600px) {
  .modal-overlay { padding: 0; }
  .modal { margin: 0; border-radius: 0; min-height: 100vh; padding: 16px; }
}
.modal h2 {
  font-family: 'Luckiest Guy', cursive; font-size: 2.2rem;
  color: var(--jaune); letter-spacing: 1px;
  padding-right: 50px; line-height: 1.05;
}
.modal .meta-row {
  margin: 12px 0; display: flex; flex-wrap: wrap; gap: 8px; font-size: .9rem;
}
.modal .meta-row span {
  background: var(--nuit); padding: 4px 10px; border-radius: 6px;
}
.modal .actions {
  display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 0;
}
.modal .btn {
  background: var(--cyan); color: var(--nuit); border: none;
  padding: 10px 16px; border-radius: 8px; cursor: pointer;
  font-family: 'Luckiest Guy', cursive; letter-spacing: 1px; font-size: .95rem;
}
.modal .btn.fav { background: var(--jaune); }
.modal .btn.fav.active { background: var(--rouge); color: var(--blanc); }
.modal .btn.close-btn { background: var(--rouge); color: var(--blanc); }
.modal .gallery {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px; margin: 16px 0;
}
.modal .gallery img {
  width: 100%; aspect-ratio: 4/3; object-fit: cover;
  border-radius: 8px; cursor: zoom-in; border: 2px solid var(--nuit);
}
.modal .body-text {
  white-space: pre-wrap; line-height: 1.55;
  background: var(--nuit); padding: 16px;
  border-radius: 8px; font-size: .95rem;
  max-height: 60vh; overflow-y: auto;
}
.modal .sections {
  margin: 12px 0;
}
.modal .sections .sec {
  background: var(--nuit); padding: 12px 14px; border-left: 3px solid var(--jaune);
  border-radius: 6px; margin-bottom: 8px;
}
.modal .sections .sec h4 {
  font-family: 'Luckiest Guy', cursive; color: var(--cyan); margin-bottom: 6px;
  letter-spacing: 1px;
}
.modal .sections .sec p { white-space: pre-wrap; line-height: 1.5; }

/* Lightbox */
.lightbox {
  position: fixed; inset: 0; background: rgba(0,0,0,.95);
  display: none; z-index: 2000;
  align-items: center; justify-content: center; padding: 20px;
}
.lightbox.show { display: flex; }
.lightbox img { max-width: 95vw; max-height: 95vh; object-fit: contain; }
.lightbox .close-x {
  position: absolute; top: 20px; right: 20px;
  background: var(--rouge); color: var(--blanc); border: none;
  width: 44px; height: 44px; border-radius: 50%;
  font-size: 1.5rem; cursor: pointer;
}

/* Login gate */
.login-gate {
  position: fixed; inset: 0; z-index: 5000;
  background: rgba(13,27,42,.97);
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.login-gate.hidden { display: none; }
.login-gate .box {
  background: var(--nuit-2); border: 3px solid var(--cyan);
  border-radius: 18px; padding: 40px 30px; max-width: 460px; text-align: center;
}
.login-gate h2 {
  font-family: 'Luckiest Guy', cursive; font-size: 2.4rem;
  color: var(--jaune); letter-spacing: 1px; margin-bottom: 12px;
  text-shadow: 3px 3px 0 var(--nuit);
}
.login-gate p { margin-bottom: 24px; line-height: 1.5; }
.login-gate a {
  display: inline-block; background: var(--cyan); color: var(--nuit);
  padding: 14px 28px; border-radius: 10px; text-decoration: none;
  font-family: 'Luckiest Guy', cursive; letter-spacing: 1px; font-size: 1.2rem;
  box-shadow: 4px 4px 0 var(--jaune);
}

footer {
  text-align: center; padding: 30px 20px; opacity: .65;
  font-size: .9rem; border-top: 1px solid rgba(255,255,255,.1);
}

.loading {
  text-align: center; padding: 80px 20px;
  font-family: 'Luckiest Guy', cursive; color: var(--cyan); font-size: 1.5rem;
  letter-spacing: 1px;
}

/* Modal close button */
.modal .x-btn {
  position: absolute; top: 14px; right: 14px;
  background: var(--rouge); color: var(--blanc); border: none;
  width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
  font-size: 1.2rem; font-weight: bold;
}

@media print {
  body * { visibility: hidden; }
  .modal-overlay, .modal-overlay * { visibility: visible; }
  .modal-overlay { position: absolute; inset: 0; background: white; padding: 0; }
  .modal { background: white; color: black; border: none; box-shadow: none; }
  .modal h2, .modal .sections .sec h4, .modal .body-text { color: black; }
  .modal .body-text { background: white; max-height: none; overflow: visible; }
  .modal .actions, .modal .x-btn { display: none; }
}
</style>
</head>
<body>

<!-- Login gate -->
<div class="login-gate" id="loginGate">
  <div class="box">
    <h2>Zone PRO</h2>
    <p><strong>Réservée aux membres</strong><br>Connecte-toi pour accéder à la banque ÉPS internationale (42 ressources, 1000+ fiches).</p>
    <a href="https://zonetotalsport.ca/#login">🔐 Se connecter</a>
  </div>
</div>

<div id="app" style="display:none">

<header class="hero">
  <h1>ZONE PRO</h1>
  <div class="subtitle">Banque ÉPS internationale</div>
  <div class="pill-row">
    <span class="pill"><strong id="statResources">42</strong> ressources</span>
    <span class="pill"><strong id="statFiches">0</strong> fiches</span>
    <span class="pill"><strong id="statImages">0</strong> images</span>
  </div>
</header>

<section class="cats" id="catsRow"></section>

<div class="filters">
  <input id="searchInput" type="search" placeholder="🔍 Rechercher (titre, mots-clés)…">
  <select id="pdfFilter"><option value="">📄 Toutes les sources</option></select>
  <select id="sortBy">
    <option value="alpha">A-Z</option>
    <option value="cat">Par catégorie</option>
    <option value="source">Par source</option>
  </select>
  <button class="clear-btn" id="clearBtn">✕ Reset</button>
</div>

<main class="grid" id="grid"><div class="loading">Chargement…</div></main>

<footer>
  Zone Total Sport · Mr Root · Zone PRO (membres)
</footer>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="x-btn" id="modalClose">✕</button>
    <h2 id="mTitle"></h2>
    <div class="meta-row" id="mMeta"></div>
    <div class="actions">
      <button class="btn fav" id="btnFav">⭐ Favoris</button>
      <button class="btn" id="btnPrint">🖨️ Imprimer</button>
      <button class="btn" id="btnCopy">📋 Copier</button>
      <button class="btn close-btn" id="btnClose2">✕ Fermer</button>
    </div>
    <div class="gallery" id="mGallery"></div>
    <div class="sections" id="mSections"></div>
    <div class="body-text" id="mBody"></div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="close-x" id="lbClose">✕</button>
  <img id="lbImg" alt="">
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBoBxVP6g_ObKIJJ1jkviNFQ-wpJoWdjbA",
  authDomain: "zone-total-sport.firebaseapp.com",
  databaseURL: "https://zone-total-sport-default-rtdb.firebaseio.com",
  projectId: "zone-total-sport",
  storageBucket: "zone-total-sport.firebasestorage.app",
  messagingSenderId: "681359040455",
  appId: "1:681359040455:web:80c9f584583824cc8cc3e2",
  measurementId: "G-09S9R1HJ94"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

let DATA = null;
let CURRENT_USER = null;
let FAVORITES = new Set();
let CURRENT_FICHE = null;
let activeCategory = null;

firebase.auth().onAuthStateChanged(async (user) => {
  if (user) {
    CURRENT_USER = user;
    document.getElementById('loginGate').classList.add('hidden');
    document.getElementById('app').style.display = 'block';
    await loadFavorites();
    if (!DATA) await loadData();
  } else {
    document.getElementById('loginGate').classList.remove('hidden');
    document.getElementById('app').style.display = 'none';
  }
});

async function loadData() {
  try {
    const r = await fetch('data.json');
    DATA = await r.json();
    initUI();
  } catch (e) {
    document.getElementById('grid').innerHTML = '<div class="no-results">Erreur de chargement: ' + e.message + '</div>';
  }
}

async function loadFavorites() {
  if (!CURRENT_USER) return;
  try {
    const snap = await firebase.firestore().collection('users').doc(CURRENT_USER.uid).collection('favorites').get();
    FAVORITES = new Set(snap.docs.map(d => d.id));
  } catch (e) { console.warn('favs load failed', e); }
}

function initUI() {
  // stats
  const totalImgs = DATA.fiches.reduce((s, f) => s + (f.images?.length || 0), 0);
  document.getElementById('statResources').textContent = DATA.pdfs.length;
  document.getElementById('statFiches').textContent = DATA.fiches.length;
  document.getElementById('statImages').textContent = totalImgs;

  // categories
  const catsEl = document.getElementById('catsRow');
  catsEl.innerHTML = DATA.categories.map(c => `
    <div class="cat-card" data-cat="${c.key}" style="border-color:${c.color}">
      <div class="icon">${c.icon}</div>
      <div class="label" style="color:${c.color}">${c.label}</div>
      <div class="count">${c.count} fiches</div>
    </div>
  `).join('');
  catsEl.querySelectorAll('.cat-card').forEach(el => {
    el.onclick = () => {
      const k = el.dataset.cat;
      activeCategory = (activeCategory === k) ? null : k;
      catsEl.querySelectorAll('.cat-card').forEach(c => c.classList.toggle('active', c.dataset.cat === activeCategory));
      render();
    };
  });

  // pdf filter
  const sel = document.getElementById('pdfFilter');
  DATA.pdfs.sort((a, b) => a.title.localeCompare(b.title)).forEach(p => {
    const o = document.createElement('option');
    o.value = p.slug; o.textContent = `${p.title} (${p.fiches_count})`;
    sel.appendChild(o);
  });

  document.getElementById('searchInput').oninput = render;
  document.getElementById('pdfFilter').onchange = render;
  document.getElementById('sortBy').onchange = render;
  document.getElementById('clearBtn').onclick = () => {
    document.getElementById('searchInput').value = '';
    document.getElementById('pdfFilter').value = '';
    document.getElementById('sortBy').value = 'alpha';
    activeCategory = null;
    document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('active'));
    render();
  };

  render();
}

const catColor = (k) => (DATA.categories.find(c => c.key === k) || {}).color || '#00E5FF';
const catIcon = (k) => (DATA.categories.find(c => c.key === k) || {}).icon || '';
const catLabel = (k) => (DATA.categories.find(c => c.key === k) || {}).label || k;

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const pdf = document.getElementById('pdfFilter').value;
  const sort = document.getElementById('sortBy').value;

  let list = DATA.fiches.filter(f => {
    if (activeCategory && f.category !== activeCategory) return false;
    if (pdf && f.source_slug !== pdf) return false;
    if (q) {
      const hay = (f.title + ' ' + (f.body || '') + ' ' + (f.tags || []).join(' ')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  if (sort === 'alpha') list.sort((a, b) => a.title.localeCompare(b.title));
  else if (sort === 'cat') list.sort((a, b) => a.category.localeCompare(b.category) || a.title.localeCompare(b.title));
  else if (sort === 'source') list.sort((a, b) => a.source_slug.localeCompare(b.source_slug) || a.page - b.page);

  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = '<div class="no-results">Aucun résultat</div>';
    return;
  }

  // Cap to 600 visible to keep DOM snappy; if needed user filters more
  const cap = list.slice(0, 600);
  const html = cap.map(f => {
    const thumb = f.images && f.images[0]
      ? `<img loading="lazy" src="${f.images[0]}" alt="">`
      : `<div class="placeholder">${catIcon(f.category)}</div>`;
    const col = catColor(f.category);
    return `<div class="card" data-id="${f.id}">
      <div class="thumb">${thumb}</div>
      <div class="body">
        <span class="badge" style="background:${col};color:#0D1B2A">${catIcon(f.category)} ${catLabel(f.category)}</span>
        <h3>${escapeHtml(f.title)}</h3>
        <div class="meta">📄 ${escapeHtml(f.source_pdf)} · p.${f.page}</div>
      </div>
    </div>`;
  }).join('');
  const note = list.length > cap.length
    ? `<div class="no-results">${list.length} résultats — affichage des ${cap.length} premiers. Affine la recherche.</div>`
    : '';
  grid.innerHTML = html + note;
  grid.querySelectorAll('.card').forEach(el => {
    el.onclick = () => openFiche(el.dataset.id);
  });
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function openFiche(id) {
  const f = DATA.fiches.find(x => x.id === id);
  if (!f) return;
  CURRENT_FICHE = f;
  document.getElementById('mTitle').textContent = f.title;
  const col = catColor(f.category);
  document.getElementById('mMeta').innerHTML =
    `<span style="background:${col};color:#0D1B2A">${catIcon(f.category)} ${catLabel(f.category)}</span>` +
    `<span>📄 ${escapeHtml(f.source_pdf)}</span>` +
    `<span>📑 Page ${f.page}</span>` +
    (f.tags && f.tags.length ? `<span>🏷️ ${f.tags.slice(0, 5).join(', ')}</span>` : '');

  // gallery
  const gal = document.getElementById('mGallery');
  gal.innerHTML = (f.images || []).map(img =>
    `<img loading="lazy" src="${img}" alt="" data-full="${img}">`
  ).join('');
  gal.querySelectorAll('img').forEach(im => {
    im.onclick = () => openLightbox(im.dataset.full);
  });

  // sections
  const secEl = document.getElementById('mSections');
  if (f.sections && Object.keys(f.sections).length) {
    secEl.innerHTML = Object.entries(f.sections).map(([k, v]) =>
      `<div class="sec"><h4>${escapeHtml(k)}</h4><p>${escapeHtml(v)}</p></div>`
    ).join('');
  } else { secEl.innerHTML = ''; }

  document.getElementById('mBody').textContent = f.body || '';

  // fav state
  const favBtn = document.getElementById('btnFav');
  favBtn.classList.toggle('active', FAVORITES.has(f.id));
  favBtn.textContent = FAVORITES.has(f.id) ? '⭐ Favori ✓' : '⭐ Favoris';

  document.getElementById('modalOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  document.body.style.overflow = '';
  CURRENT_FICHE = null;
}
document.getElementById('modalClose').onclick = closeModal;
document.getElementById('btnClose2').onclick = closeModal;
document.getElementById('modalOverlay').onclick = (e) => {
  if (e.target === e.currentTarget) closeModal();
};

document.getElementById('btnPrint').onclick = () => window.print();
document.getElementById('btnCopy').onclick = async () => {
  if (!CURRENT_FICHE) return;
  const txt = CURRENT_FICHE.title + '\n\n' + (CURRENT_FICHE.body || '');
  try { await navigator.clipboard.writeText(txt); document.getElementById('btnCopy').textContent = '✓ Copié'; setTimeout(() => document.getElementById('btnCopy').textContent = '📋 Copier', 1500); } catch (e) { alert('Copie impossible'); }
};

document.getElementById('btnFav').onclick = async () => {
  if (!CURRENT_FICHE || !CURRENT_USER) return;
  const f = CURRENT_FICHE;
  const ref = firebase.firestore().collection('users').doc(CURRENT_USER.uid).collection('favorites').doc(f.id);
  if (FAVORITES.has(f.id)) {
    await ref.delete();
    FAVORITES.delete(f.id);
  } else {
    await ref.set({ fiche_id: f.id, title: f.title, category: f.category, source: f.source_pdf, added_at: firebase.firestore.FieldValue.serverTimestamp() });
    FAVORITES.add(f.id);
  }
  const favBtn = document.getElementById('btnFav');
  favBtn.classList.toggle('active', FAVORITES.has(f.id));
  favBtn.textContent = FAVORITES.has(f.id) ? '⭐ Favori ✓' : '⭐ Favoris';
};

// Lightbox
function openLightbox(src) {
  document.getElementById('lbImg').src = src;
  document.getElementById('lightbox').classList.add('show');
}
document.getElementById('lbClose').onclick = () => document.getElementById('lightbox').classList.remove('show');
document.getElementById('lightbox').onclick = (e) => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('show');
};
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('lightbox').classList.contains('show')) {
      document.getElementById('lightbox').classList.remove('show');
    } else if (document.getElementById('modalOverlay').classList.contains('show')) {
      closeModal();
    }
  }
});
</script>
</body>
