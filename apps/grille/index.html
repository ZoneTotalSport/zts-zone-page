<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Grille Horaire — Zone Total Sport</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Schoolbell&family=Luckiest+Guy&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--cyan:#00BCD4;--cyan2:#00E5FF;--green:#43A047;--red:#D32F2F;--orange:#FB8C00;--purple:#7C4DFF;--pink:#FF1493;--yellow:#FFD600;--card:#fff;--border:#ddd;--text:#222;--muted:#888;--radius:12px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Fredoka',sans-serif;background:url('img/bg-planification.png') center/cover no-repeat fixed;color:var(--text);min-height:100vh;overflow-x:hidden;
      font-size:22px}

    /* HEADER — gros et tactile */
    .hdr{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#00838F,#00ACC1);padding:10px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
    .hdr img{height:65px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.2))}
    .hdr .t{font-family:'Luckiest Guy',cursive;font-size:1.8em;color:#fff;letter-spacing:3px;text-shadow:2px 2px 0 rgba(0,0,0,.15)}
    .hdr .s{font-family:'Schoolbell',cursive;font-size:.85em;color:rgba(255,255,255,.75)}
    .hdr .spacer{flex:1}
    .hdr select,.hdr button{font-family:'Fredoka';font-size:.9em;font-weight:600;border:none;border-radius:8px;padding:10px 16px;cursor:pointer;min-height:44px}
    .hdr select{background:#fff;color:var(--text)}
    .hdr .hb{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3);font-size:1em}
    .hdr .hb:hover{background:rgba(255,255,255,.35)}
    .hdr a{color:#fff;font-family:'Luckiest Guy',cursive;font-size:.9em;text-decoration:none;padding:10px 16px;background:rgba(255,255,255,.15);border-radius:8px;border:1px solid rgba(255,255,255,.25)}

    /* PROGRESS */
    .progress{background:var(--card);border-bottom:2px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:14px;font-size:1em}
    .progress .pbar{flex:1;height:14px;background:#e8e8e8;border-radius:7px;overflow:hidden}
    .progress .pbar div{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:7px;transition:width .3s}
    .progress .ptxt{font-weight:700;color:var(--cyan);min-width:80px;text-align:right}

    /* LAYOUT */
    .layout{display:flex;height:calc(100vh - 110px);overflow:hidden}

    /* LEFT PANEL */
    .panel{width:260px;background:var(--card);border-right:2px solid var(--border);overflow-y:auto;padding:14px;flex-shrink:0}
    .panel h3{font-family:'Bangers',cursive;font-size:1.2em;color:#00838F;margin-bottom:10px;letter-spacing:1px}
    .spec-card{border:3px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .1s;min-height:50px}
    .spec-card:hover{border-color:var(--cyan)}
    .spec-card.active{border-color:#000;box-shadow:0 0 0 3px var(--cyan2),0 3px 10px rgba(0,0,0,.15)}
    .spec-card .sc-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
    .spec-card .sc-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
    .spec-card .sc-name{font-weight:700;font-size:1em;flex:1}
    .spec-card .sc-remain{font-family:'Bangers',cursive;font-size:1.1em;color:var(--cyan)}
    .spec-card .sc-info{font-size:.8em;color:var(--muted)}
    .spec-card .sc-bar{height:6px;background:#eee;border-radius:3px;margin-top:5px;overflow:hidden}
    .spec-card .sc-bar div{height:100%;border-radius:3px;transition:width .2s}

    .panel .p-section{margin-top:16px;padding-top:12px;border-top:2px solid var(--border)}
    .panel .p-btn{display:block;width:100%;font-family:'Fredoka';font-weight:600;font-size:.95em;padding:12px;border:2px dashed var(--border);border-radius:10px;background:transparent;cursor:pointer;color:var(--muted);text-align:center;margin-bottom:6px;min-height:48px}
    .panel .p-btn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,188,212,.04)}

    /* ALERT TOAST */
    .toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:10px;font-weight:600;font-size:1em;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:toastIn .3s ease-out}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

    /* GRID AREA */
    .grid-area{flex:1;overflow:auto;padding:12px;background:rgba(244,246,248,.85)}
    .grid{display:grid;gap:3px;min-width:min-content}
    .g-hdr{background:linear-gradient(135deg,#00838F,#00ACC1);border-radius:10px;padding:12px;text-align:center;min-height:54px;display:flex;align-items:center;justify-content:center;font-family:'Bangers',cursive;font-size:1.4em;color:#fff;letter-spacing:1px}
    .g-time{background:var(--card);border:2px solid var(--border);border-radius:10px;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Bangers',cursive;font-size:1.2em;color:#00838F}
    .g-time small{font-family:'Fredoka';font-size:.65em;color:var(--muted);font-weight:500}
    .g-brk{border-radius:10px;min-height:38px;display:flex;align-items:center;justify-content:center;font-family:'Bangers',cursive;font-size:1em;letter-spacing:1px}
    .g-brk.rec{background:#fff9c4;color:#F9A825}
    .g-brk.lun{background:#e0f7fa;color:#00838F}

    .g-cell{border:3px solid var(--border);border-radius:10px;min-height:80px;background:var(--card);display:flex;flex-wrap:wrap;align-content:center;align-items:stretch;justify-content:center;cursor:pointer;padding:4px;transition:all .1s;gap:3px}
    .g-cell:hover{border-color:var(--cyan);background:#e0f7fa}
    .g-cell.can-drop{border-color:var(--cyan2);background:rgba(0,229,255,.1);border-style:dashed}
    .g-cell.cant-drop{opacity:.35}
    .g-cell.hard{border-color:var(--red)!important;background:rgba(211,47,47,.06)!important}
    .g-cell.soft{border-color:var(--orange)!important;background:rgba(255,152,0,.05)!important}

    .g-chip{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:8px;font-size:.85em;font-weight:800;justify-content:space-between;color:#000;white-space:nowrap;flex:1 1 auto;min-width:0;border:2px solid rgba(0,0,0,.12);text-shadow:0 1px 0 rgba(255,255,255,.4)}
    .g-cell.multi .g-chip{font-size:.75em;padding:4px 7px}
    .g-chip:hover{filter:brightness(.92)}
    .g-chip .x{font-size:.75em;opacity:.3;padding:2px 4px;cursor:pointer;min-width:24px;min-height:24px;display:flex;align-items:center;justify-content:center;border-radius:4px}
    .g-chip .x:hover{opacity:1;color:#fff;background:var(--red)}
    .g-chip .sp-tag{font-size:.7em;opacity:.6;font-weight:600;background:rgba(0,0,0,.1);padding:1px 4px;border-radius:3px}
    .g-cell .plus{color:rgba(0,0,0,.12);font-size:1.8em;font-weight:300}

    /* RIGHT PANEL */
    .rpanel{width:240px;background:var(--card);border-left:2px solid var(--border);overflow-y:auto;padding:14px;flex-shrink:0}
    .rpanel h3{font-family:'Bangers',cursive;font-size:1.2em;color:#00838F;margin-bottom:10px}
    .next-item{font-size:.85em;padding:8px 10px;border-radius:8px;margin-bottom:4px;border-left:4px solid var(--border);background:rgba(0,0,0,.02)}
    .next-item .ni-cls{font-weight:700;font-size:1em}
    .next-item .ni-sub{color:var(--muted);font-size:.85em}
    .next-item .ni-need{font-family:'Bangers',cursive;color:var(--cyan);float:right;font-size:1.1em}

    /* WELCOME HERO — inline, not overlay */
    .hero{display:flex;justify-content:center;padding:30px 20px;background:transparent}
    .hero.hidden{display:none}
    .hero-box{background:linear-gradient(135deg,rgba(255,255,255,.92),rgba(224,247,250,.88));border:3px solid var(--cyan);border-radius:24px;padding:0;max-width:800px;width:100%;display:flex;align-items:stretch;box-shadow:0 8px 40px rgba(0,0,0,.15);overflow:hidden;backdrop-filter:blur(6px)}
    .hb-left{flex:0 0 200px;display:flex;align-items:flex-end;justify-content:center;padding:20px 10px 0}
    .hb-left img{width:185px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.2))}
    .hb-right{flex:1;padding:30px 34px}
    .hb-right h2{font-family:'Luckiest Guy',cursive;font-size:1.7em;color:#222;letter-spacing:2px;line-height:1.15;margin-bottom:4px}
    .hb-right h2 span{color:var(--cyan);display:block}
    .hb-right .hb-desc{font-family:'Schoolbell',cursive;font-size:.9em;color:#555;line-height:1.6;margin:12px 0 16px}
    .hb-badges{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
    .hb-badge{font-family:'Bangers',cursive;font-size:.8em;letter-spacing:.5px;padding:5px 12px;border-radius:18px;border:2px solid var(--border);background:#fff;color:#444;display:inline-flex;align-items:center;gap:4px}
    .hb-actions{display:flex;flex-wrap:wrap;gap:12px}
    .hb-btn{font-family:'Bangers',cursive;font-weight:700;font-size:1.15em;letter-spacing:1px;padding:14px 26px;border:none;border-radius:14px;cursor:pointer;display:inline-flex;align-items:center;gap:10px;min-height:52px;box-shadow:0 4px 15px rgba(0,0,0,.1);transition:all .15s}
    .hb-btn:hover{filter:brightness(.93);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.15)}
    .hb-btn.main{background:linear-gradient(135deg,#FFD600,#FFB300);color:#222}
    .hb-btn.sec{background:#fff;color:#00838F;border:2px solid var(--cyan)}
    @media(max-width:700px){.hb-left{display:none}.hb-right{padding:20px}}

    /* MODAL — gros et tactile */
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(2px);z-index:5000;display:flex;align-items:center;justify-content:center}
    .mbox{background:#fff;border:3px solid var(--cyan);border-radius:var(--radius);padding:24px;width:95%;max-width:650px;max-height:88vh;overflow-y:auto;box-shadow:0 6px 30px rgba(0,0,0,.2)}
    .mbox h3{font-family:'Bangers',cursive;font-size:1.5em;color:#00838F;text-align:center;margin-bottom:14px}
    .macts{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:2px solid #f0f0f0}
    .fr{display:flex;gap:10px;align-items:center;margin-bottom:9px;flex-wrap:wrap}
    .fr label{font-weight:600;min-width:95px;font-size:.9em}
    .fr input,.fr select{font-family:'Fredoka';font-size:.9em;font-weight:500;border:2px solid var(--border);border-radius:8px;padding:8px 12px;min-height:40px}
    .fr input:focus,.fr select:focus{outline:none;border-color:var(--cyan);background:#e0f7fa}
    .fr input[type=number]{width:70px}
    .fr input[type=checkbox]{width:22px;height:22px;accent-color:var(--cyan)}
    .chips{display:flex;flex-wrap:wrap;gap:4px}
    .ck{font-size:.85em;font-weight:700;padding:6px 14px;border-radius:18px;cursor:pointer;border:2px solid var(--border);background:#f5f5f5;color:#999;user-select:none;min-height:36px;display:flex;align-items:center}
    .ck.on{background:var(--cyan);color:#fff;border-color:#00838F}
    .dt{width:100%;border-collapse:collapse;font-size:.9em}
    .dt th{background:#00838F;color:#fff;font-family:'Bangers',cursive;padding:8px;text-align:left;letter-spacing:.5px}
    .dt td{padding:7px 8px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
    .dt tr:hover{background:rgba(0,188,212,.04)}
    .cdot{display:inline-block;width:12px;height:12px;border-radius:50%;vertical-align:middle;margin-right:4px}
    .btn{font-family:'Fredoka';font-weight:700;font-size:.9em;padding:9px 18px;border:none;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;min-height:42px}
    .btn:hover{filter:brightness(.93)}
    .btn.g{background:var(--green);color:#fff}
    .btn.c{background:var(--cyan);color:#fff}
    .btn.r{background:var(--red);color:#fff}
    .btn.o{background:#f0f0f0;color:var(--text)}
    .btn.sm{font-size:.8em;padding:5px 10px;min-height:32px}

    /* CLASS PICKER — gros boutons tactiles */
    .class-picker{display:flex;flex-direction:column;gap:6px}
    .class-picker .cp-btn{font-family:'Fredoka';font-weight:700;font-size:1.1em;padding:14px 18px;border:3px solid var(--border);border-radius:10px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:space-between;min-height:52px;transition:all .1s}
    .class-picker .cp-btn:hover{border-color:var(--cyan);background:#e0f7fa}
    .class-picker .cp-btn:disabled{opacity:.3;cursor:default}
    .class-picker .cp-btn .cp-need{font-family:'Bangers',cursive;color:var(--cyan);font-size:1em}

    @media print{.hdr,.panel,.rpanel,.progress,.hero{display:none!important}.layout{height:auto}.grid-area{padding:0}}
    @media(max-width:900px){.panel{width:200px}.rpanel{display:none}}
    @media(max-width:600px){.panel{display:none}.rpanel{display:none}.layout{flex-direction:column;height:auto}.grid-area{min-height:60vh}}
  </style>
  <!-- ZTS Landing Template -->
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Bangers&family=Schoolbell&family=Patrick+Hand&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="zts-landing.css">
</head>
<body>

<header class="hdr">
  <a href="https://zonetotalsport.ca">🏠 Accueil</a>
  <img src="https://zonetotalsport.ca/logo-zts-text.png" alt="Zone Total Sport" style="height:70px;width:auto;">
  <div>
    <div class="t" data-t="appTitle">GRILLE HORAIRE</div>
  </div>
  <div class="spacer"></div>
  <button class="hb" onclick="showHelp()">❓</button>
  <button class="hb" onclick="openSetupModal()">⚙️</button>
  <button class="hb" onclick="solveSchedule()">🤖 Auto</button>
  <button class="hb" onclick="validateAll()">✅</button>
  <button class="hb" onclick="exportPDF()">📄</button>
  <button class="hb" onclick="clearSchedule()">🗑️</button>
  <select id="langSel" onchange="changeLang(this.value)">
    <option value="fr">🇫🇷 FR</option>
    <option value="en">🇬🇧 EN</option>
    <option value="es">🇪🇸 ES</option>
    <option value="zh">🇨🇳 中文</option>
  </select>
  <div id="zts-auth-status" style="display:flex;align-items:center;gap:8px;min-width:fit-content">
    <span id="zts-auth-label" style="font-family:'Schoolbell',cursive;color:#fff;font-size:0.85rem;opacity:0.9"></span>
    <button id="zts-auth-btn" style="font-family:'Luckiest Guy',cursive;padding:6px 14px;border-radius:999px;border:2px solid rgba(255,255,255,0.5);background:rgba(255,255,255,0.15);color:#fff;font-size:0.8rem;cursor:pointer;white-space:nowrap;display:none" onclick="ztsAuthAction()"></button>
  </div>
</header>

<section class="hero" id="heroSection">
  <div class="hero-box">
    <div class="hb-left"><img src="img/bucheron-salut.png" alt="Mr Root"></div>
    <div class="hb-right">
      <h2 data-t="heroTitle">Ta grille horaire</h2>
      <div class="hb-desc" data-t="heroDesc"></div>
      <div class="hb-badges">
        <span class="hb-badge" data-t="heroBadge1">📅 5 à 10 jours/cycle</span>
        <span class="hb-badge" data-t="heroBadge2">⚙️ 3 à 7 périodes</span>
        <span class="hb-badge" data-t="heroBadge3">🌍 4 langues</span>
        <span class="hb-badge">📄 Export PDF</span>
        <span class="hb-badge" data-t="heroBadge5">🤖 Auto-remplissage</span>
        <span class="hb-badge">👥 Team teaching</span>
      </div>
      <div class="hb-actions">
        <button class="hb-btn main" onclick="useTemplate()" data-t="heroStart">🚀 Commencer!</button>
        <button class="hb-btn sec" onclick="showHelp()" data-t="heroHelp">📖 Comment utiliser</button>
      </div>
    </div>
  </div>
</section>

<div class="progress">
  <span id="progLabel" style="font-weight:600">0 / 0</span>
  <div class="pbar"><div id="progBar" style="width:0%"></div></div>
  <span class="ptxt" id="progPct">0%</span>
  <span id="pillH" style="font-weight:700;color:var(--red);display:none">🚫 0</span>
  <span id="pillS" style="font-weight:700;color:var(--orange);display:none">⚠️ 0</span>
</div>

<div class="layout">
  <div class="panel" id="panel">
    <h3>👤 <span data-t="selectSpec">Sélectionnez</span></h3>
    <div id="specList"></div>
    <div class="p-section">
      <button class="p-btn" onclick="openSpecModal()">👤 Spécialistes</button>
      <button class="p-btn" onclick="openClassesModal()">🎓 Classes</button>
      <button class="p-btn" onclick="openRoomsModal()">🏛️ Locaux</button>
    </div>
  </div>
  <div class="grid-area"><div class="grid" id="grid"></div></div>
  <div class="rpanel" id="rpanel">
    <h3>📋 <span data-t="toPlace">À placer</span></h3>
    <div id="nextList"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

function t(k){return I[lang]?.[k]||I.fr[k]||k}
function applyI18n(){document.querySelectorAll('[data-t]').forEach(el=>{const k=el.dataset.t;if(I[lang]?.[k])el.innerHTML=I[lang][k]})}

// STATE
const DEF_PER=[{type:'period',num:1,start:'08:20',end:'09:10'},{type:'period',num:2,start:'09:15',end:'10:05'},{type:'recess',label:'Récré',start:'10:05',end:'10:20'},{type:'period',num:3,start:'10:20',end:'11:10'},{type:'lunch',label:'Dîner',start:'11:10',end:'12:40'},{type:'period',num:4,start:'12:40',end:'13:30'},{type:'period',num:5,start:'13:35',end:'14:25'}];
const DEF_SUB=[
  {id:'eps',name:'Éducation physique',color:'#FF5252',roomType:'gym',min:{pres:120,'1':120,'2':120,'3':90,'4':90,'5':60,'6':60}},
  {id:'mus',name:'Musique',color:'#4FC3F7',roomType:'music',min:{pres:60,'1':60,'2':60,'3':60,'4':60,'5':60,'6':60}},
  {id:'art',name:'Art plastique',color:'#CE93D8',roomType:'art',min:{pres:60,'1':60,'2':60,'3':60,'4':60,'5':60,'6':60}},
  {id:'dram',name:'Art dramatique',color:'#F48FB1',roomType:'',min:{pres:0,'1':0,'2':0,'3':60,'4':60,'5':60,'6':60}},
  {id:'ang',name:'Anglais',color:'#81D4FA',roomType:'',min:{pres:0,'1':60,'2':60,'3':90,'4':90,'5':120,'6':120}},
  {id:'ecr',name:'Éthique',color:'#A5D6A7',roomType:'',min:{pres:0,'1':50,'2':50,'3':50,'4':50,'5':50,'6':50}}
];
let nid=1;function uid(){return'id_'+(nid++)}
let S={school:{name:'',cycleDays:9,periodsPerDay:5,periodDuration:50,quotaMode:'periods',tache100:30,periods:JSON.parse(JSON.stringify(DEF_PER))},subjects:JSON.parse(JSON.stringify(DEF_SUB)),specialists:[],classes:[],rooms:[],assignments:{}};
let lang='fr',activeSpec=null;

function save(){localStorage.setItem('gh2',JSON.stringify(S))}
function load(){try{const r=localStorage.getItem('gh2');if(r){S=JSON.parse(r);if(!S.assignments)S.assignments={};if(!S.school.quotaMode)S.school.quotaMode='minutes';if(!S.school.periodsPerDay)S.school.periodsPerDay=tPer().length||5;if(!S.school.tache100)S.school.tache100=S.school.cycleDays*(S.school.periodsPerDay||5)}}catch(e){}
  lang=localStorage.getItem('gh_lang')||'fr';document.getElementById('langSel').value=lang;
  [...(S.specialists||[]),...(S.classes||[]),...(S.rooms||[])].forEach(x=>{if(x?.id){const n=parseInt(x.id.replace('id_',''));if(!isNaN(n)&&n>=nid)nid=n+1}})}
function changeLang(l){lang=l;localStorage.setItem('gh_lang',l);applyI18n();renderAll()}

// TOAST
function toast(msg,dur){const d=document.createElement('div');d.className='toast';d.textContent=msg;document.body.appendChild(d);setTimeout(()=>d.remove(),dur||2500)}

// GROUP COLORS — vivid/fluo palette, consistent per class
const GROUP_COLORS=['#00E5FF','#FF1744','#76FF03','#FF9100','#D500F9','#FFEA00','#00E676','#FF4081','#18FFFF','#FF6D00','#B388FF','#64FFDA','#FF3D00','#C6FF00','#448AFF','#F50057','#69F0AE','#FFD740','#E040FB','#00B0FF','#FF8A80','#B2FF59','#EA80FC','#84FFFF','#FF9E80','#CCFF90','#82B1FF','#FF80AB','#A7FFEB','#FFE57F'];
const _gcCache={};
function groupColor(classId){
  if(_gcCache[classId])return _gcCache[classId];
  const idx=S.classes.findIndex(c=>c.id===classId);
  _gcCache[classId]=GROUP_COLORS[idx%GROUP_COLORS.length]||'#ccc';
  return _gcCache[classId]}
function resetGroupColors(){Object.keys(_gcCache).forEach(k=>delete _gcCache[k])}

// HELPERS
function tPer(){return S.school.periods.filter(p=>p.type==='period')}
function lunchIdx(){return S.school.periods.findIndex(p=>p.type==='lunch')}
function isAM(n){const li=lunchIdx();let c=0;for(let i=0;i<S.school.periods.length;i++){if(S.school.periods[i].type==='period'){c++;if(c===n)return i<(li===-1?999:li)}}return true}
function getA(d,p){return S.assignments[d]?.[p]||[]}
function setA(d,p,sid,cid,rid){if(!S.assignments[d])S.assignments[d]={};if(!S.assignments[d][p])S.assignments[d][p]=[];S.assignments[d][p]=S.assignments[d][p].filter(a=>a.specId!==sid);if(cid)S.assignments[d][p].push({specId:sid,classId:cid,roomId:rid||''});save()}
function removeA(d,p,sid){if(S.assignments[d]?.[p]){S.assignments[d][p]=S.assignments[d][p].filter(a=>a.specId!==sid);save()}}
function totalA(){let c=0;for(const d in S.assignments)for(const p in S.assignments[d])c+=S.assignments[d][p].length;return c}
function minUsed(cid,sid){let t=0;for(let d=1;d<=S.school.cycleDays;d++)tPer().forEach(p=>{getA(d,p.num).forEach(a=>{if(a.classId===cid){const sp=S.specialists.find(s=>s.id===a.specId);if(sp?.subjectId===sid)t+=S.school.periodDuration}})});return t}
function specShare(sp){const peers=S.specialists.filter(s=>s.subjectId===sp.subjectId);if(peers.length<=1)return 1;
  const totalPct=peers.reduce((s,p)=>s+(p.taskPercent||100),0);return(sp.taskPercent||100)/totalPct}
function reqToPeriods(req){return S.school.quotaMode==='periods'?req:Math.ceil(req/S.school.periodDuration)}
function totalNeeded(){let t=0;S.specialists.forEach(sp=>{const su=S.subjects.find(s=>s.id===sp.subjectId);if(!su)return;const share=specShare(sp);
  S.classes.forEach(cl=>{const req=su.min[cl.level]||0;if(req>0)t+=Math.max(1,Math.round(reqToPeriods(req)*share))})});return t}
function specDemand(sp){const su=S.subjects.find(s=>s.id===sp.subjectId);if(!su)return[];const d=[];const share=specShare(sp);
  S.classes.forEach(cl=>{const req=su.min[cl.level]||0;if(req<=0)return;const fullNeed=reqToPeriods(req);const myNeed=Math.max(1,Math.round(fullNeed*share));const usedByMe=countPlaced(sp.id,cl.id);const need=Math.max(0,myNeed-usedByMe);if(need>0)d.push({cls:cl,need,req:Math.round(req*share),used:usedByMe})});
  return d.sort((a,b)=>b.need-a.need)}
function countPlaced(specId,classId){let c=0;for(let d=1;d<=S.school.cycleDays;d++)tPer().forEach(p=>{getA(d,p.num).forEach(a=>{if(a.specId===specId&&a.classId===classId)c++})});return c}
function specTotalPlaced(specId){let c=0;for(let d=1;d<=S.school.cycleDays;d++)tPer().forEach(p=>{getA(d,p.num).forEach(a=>{if(a.specId===specId)c++})});return c}
function specMaxPeriods(sp){return Math.round((sp.taskPercent||100)/100*S.school.tache100)}
function specTaskPct(sp){const placed=specTotalPlaced(sp.id);return S.school.tache100?Math.round(placed/S.school.tache100*10000)/100:0}
function canPlace(day,per,sp){
  if(getA(day,per).some(a=>a.specId===sp.id))return false;
  if(specTotalPlaced(sp.id)>=specMaxPeriods(sp))return false;
  if(sp.isItinerant&&sp.travelDays?.includes(+day))return false;
  if(sp.availDays?.length&&!sp.availDays.includes(+day))return false;
  if(sp.amPm==='am'&&!isAM(per))return false;
  if(sp.amPm==='pm'&&isAM(per))return false;
  return true}
function checkH(day,per,sid,cid,rid){const v=[];const sp=S.specialists.find(s=>s.id===sid);if(!sp)return v;
  if(rid){const rm=S.rooms.find(r=>r.id===rid);if(rm&&getA(day,per).filter(a=>a.roomId===rid&&a.specId!==sid).length>=rm.maxSimultaneous)v.push({type:'room'})}
  if(getA(day,per).some(a=>a.specId===sid))v.push({type:'specBusy'});
  if(getA(day,per).some(a=>a.classId===cid&&a.specId!==sid))v.push({type:'classBusy'});
  if(sp.isItinerant&&sp.travelDays?.includes(+day))v.push({type:'itin'});
  if(sp.availDays?.length&&!sp.availDays.includes(+day))v.push({type:'avail'});
  if(sp.amPm==='am'&&!isAM(per))v.push({type:'ampm'});if(sp.amPm==='pm'&&isAM(per))v.push({type:'ampm'});return v}
function checkS(day,per,sid,cid){const w=[];const sp=S.specialists.find(s=>s.id===sid);if(!sp)return w;
  const cl=S.classes.find(c=>c.id===cid),su=S.subjects.find(s=>s.id===sp.subjectId);
  if(su&&cl){[+day-1,+day+1].filter(d=>d>=1&&d<=S.school.cycleDays).forEach(adj=>{tPer().forEach(p=>{getA(adj,p.num).forEach(a=>{if(a.classId===cid){const asp=S.specialists.find(s=>s.id===a.specId);if(asp?.subjectId===sp.subjectId)w.push({type:'spacing'})}})})})}
  if(sp.maxConsecutive){const pn=tPer().map(p=>p.num).sort((a,b)=>a-b);const pi=pn.indexOf(+per);let st=1;for(let i=pi-1;i>=0;i--){if(getA(day,pn[i]).some(a=>a.specId===sid))st++;else break}for(let i=pi+1;i<pn.length;i++){if(getA(day,pn[i]).some(a=>a.specId===sid))st++;else break}if(st>sp.maxConsecutive)w.push({type:'consec'})}
  if(sp.maxPerDay){let c=0;tPer().forEach(p=>{if(getA(day,p.num).some(a=>a.specId===sid))c++});if(c>sp.maxPerDay)w.push({type:'maxDay'})}return w}

// PANEL
function renderPanel(){
  const c=document.getElementById('specList');
  if(!S.specialists.length){c.innerHTML=`<div style="text-align:center;padding:20px;color:var(--muted);cursor:pointer" onclick="openSpecModal()">${t('noSpec')}</div>`;return}
  c.innerHTML='';
  S.specialists.forEach(sp=>{
    const su=S.subjects.find(s=>s.id===sp.subjectId);
    const placed=specTotalPlaced(sp.id);const maxP=specMaxPeriods(sp);const calcPct=specTaskPct(sp);
    const remaining=Math.max(0,maxP-placed);
    const barPct=maxP?Math.min(100,Math.round(placed/maxP*100)):100;
    const card=document.createElement('div');card.className='spec-card'+(activeSpec===sp.id?' active':'');
    card.innerHTML=`<div class="sc-top"><div class="sc-dot" style="background:${sp.color||su?.color||'#ccc'}"></div><span class="sc-name">${sp.shortName}</span><span class="sc-remain">${remaining>0?remaining+' '+t('remaining'):'✅'}</span></div><div class="sc-info">${su?.name||'—'} · ${t('contract')} ${sp.taskPercent}% · <b>${placed}/${maxP}</b> pér. · <b>${calcPct}%</b> ${t('taskCalc')}</div><div class="sc-bar"><div style="width:${barPct}%;background:${barPct>=100?'var(--green)':'var(--cyan)'}"></div></div>`;
    card.onclick=()=>{activeSpec=activeSpec===sp.id?null:sp.id;renderPanel();renderGrid();renderNext()};
    c.appendChild(card)});
}

// NEXT
function renderNext(){
  const c=document.getElementById('nextList');
  if(!activeSpec){c.innerHTML=`<div style="color:var(--muted);padding:10px">← ${t('selectSpec')}</div>`;return}
  const sp=S.specialists.find(s=>s.id===activeSpec);if(!sp){c.innerHTML='';return}

// GRID
function renderGrid(){
  const g=document.getElementById('grid');g.innerHTML='';
  const periods=S.school.periods,cd=S.school.cycleDays;
  const sp=activeSpec?S.specialists.find(s=>s.id===activeSpec):null;
  const cols=cd+1;
  g.style.gridTemplateColumns=`100px repeat(${cd},minmax(150px,1fr))`;
  // Row 0: headers
  let hdr=document.createElement('div');hdr.className='g-hdr';hdr.textContent='⏰';hdr.style.gridColumn='1';hdr.style.gridRow='1';g.appendChild(hdr);
  for(let d=1;d<=cd;d++){hdr=document.createElement('div');hdr.className='g-hdr';hdr.textContent=t('day')+' '+d;hdr.style.gridColumn=''+(d+1);hdr.style.gridRow='1';g.appendChild(hdr)}
  // Rows for periods
  let row=2;
  periods.forEach(p=>{
    if(p.type!=='period'){
      // break row spans all columns
      for(let c=0;c<=cd;c++){const brk=document.createElement('div');brk.className='g-brk '+(p.type==='recess'?'rec':'lun');brk.textContent=c===0?(p.type==='recess'?t('recess'):t('lunch')):'';brk.style.gridColumn=''+(c+1);brk.style.gridRow=''+row;g.appendChild(brk)}
      row++;return}
    // Time cell
    const tc=document.createElement('div');tc.className='g-time';tc.innerHTML=`<span>P${p.num}</span><small>${p.start||''}-${p.end||''}</small>`;tc.style.gridColumn='1';tc.style.gridRow=''+row;g.appendChild(tc);
    // Day cells
    for(let d=1;d<=cd;d++){
      const assigns=getA(d,p.num);const cell=document.createElement('div');cell.className='g-cell';
      if(assigns.length>1)cell.classList.add('multi');
      if(sp){if(canPlace(d,p.num,sp)&&!assigns.some(a=>a.specId===sp.id))cell.classList.add('can-drop');else if(!assigns.some(a=>a.specId===sp.id))cell.classList.add('cant-drop')}
      let hrd=false,sft=false;assigns.forEach(a=>{if(checkH(d,p.num,a.specId,a.classId,a.roomId).filter(v=>v.type!=='specBusy').length)hrd=true;if(checkS(d,p.num,a.specId,a.classId).length)sft=true});
      const rc={};assigns.forEach(a=>{if(a.roomId)rc[a.roomId]=(rc[a.roomId]||0)+1});Object.entries(rc).forEach(([rid,cnt])=>{const rm=S.rooms.find(r=>r.id===rid);if(rm&&cnt>rm.maxSimultaneous)hrd=true});
      if(hrd)cell.classList.add('hard');else if(sft)cell.classList.add('soft');
      assigns.forEach(a=>{const asp=S.specialists.find(s=>s.id===a.specId),cl=S.classes.find(c=>c.id===a.classId);if(!asp)return;
        const ch=document.createElement('div');ch.className='g-chip';ch.style.background=cl?groupColor(cl.id):'#eee';
        ch.innerHTML=`<span style="overflow:hidden;text-overflow:ellipsis"><b>${cl?.group||'?'}</b> <span class="sp-tag">${asp.shortName}</span></span><span class="x" data-d="${d}" data-p="${p.num}" data-s="${a.specId}">✕</span>`;
        ch.querySelector('.x').onclick=e=>{e.stopPropagation();removeA(d,p.num,a.specId);renderAll()};cell.appendChild(ch)});
      if(!cell.children.length)cell.innerHTML='<span class="plus">+</span>';
      cell.style.gridColumn=''+(d+1);cell.style.gridRow=''+row;
      cell.onclick=()=>cellClick(d,p.num);g.appendChild(cell)}
    row++});
}

function cellClick(day,per){
  // BUG FIX: check if classes exist first
  if(!S.classes.length){toast(t('addClassesFirst'));openClassesModal();return}
  if(!activeSpec){openQuickAssign(day,per);return}
  const sp=S.specialists.find(s=>s.id===activeSpec);if(!sp)return;
  if(specTotalPlaced(sp.id)>=specMaxPeriods(sp)){toast('🚫 '+sp.shortName+' — '+t('taskFull')+' ('+specMaxPeriods(sp)+' pér.)');return}
  if(!canPlace(day,per,sp)){toast('❌ '+t('unavailable'));return}
  if(getA(day,per).some(a=>a.specId===sp.id)){removeA(day,per,sp.id);renderAll();return}
  const demand=specDemand(sp);
  if(!demand.length){toast('✅ '+sp.shortName+' — complet!');return}
  if(demand.length===1){const cl=demand[0].cls;if(getA(day,per).some(a=>a.classId===cl.id)){toast('❌ '+cl.group+' '+t('busy'));return}
    setA(day,per,sp.id,cl.id,sp.roomId||'');renderAll();return}
  showClassPicker(day,per,sp,demand);
}

function showClassPicker(day,per,sp,demand){
  closeModals();const ov=document.createElement('div');ov.className='modal';
  let btns=demand.map(d=>{const busy=getA(day,per).some(a=>a.classId===d.cls.id);

  ov.innerHTML=`<div class="mbox" style="max-width:400px"><h3>${t('selectClassFor')} ${sp.shortName}</h3><div class="class-picker">${btns}</div><div class="macts"><button class="btn o" onclick="closeModals()">${t('cancel')}</button></div></div>`;

}

function validateAll(){let hc=0,sc=0;

    assigns.forEach(a=>{if(checkH(d,p.num,a.specId,a.classId,a.roomId).filter(v=>v.type!=='specBusy').length)hc++;if(checkS(d,p.num,a.specId,a.classId).length)sc++});
    const rc={};assigns.forEach(a=>{if(a.roomId)rc[a.roomId]=(rc[a.roomId]||0)+1});Object.entries(rc).forEach(([rid,cnt])=>{const rm=S.rooms.find(r=>r.id===rid);if(rm&&cnt>rm.maxSimultaneous)hc++})})}
  const ph=document.getElementById('pillH'),ps=document.getElementById('pillS');

    <div class="fr" id="eTR" style="${sp.isItinerant?'':'display:none'};flex-direction:column;align-items:flex-start"><label>${t('specTravelDays')}</label><div class="chips">${Array.from({length:cd},(_,d)=>{const dn=d+1;return`<div class="ck ${sp.travelDays?.includes(dn)?'on':''}" data-td="${dn}" onclick="this.classList.toggle('on')">J${dn}</div>`}).join('')}</div></div>
    <hr style="border:none;border-top:2px solid #f0f0f0;margin:10px 0">
    <div style="font-family:'Bangers';color:var(--pink);margin-bottom:6px">⚙️ ${t('specConstraints')}</div>
    <div class="fr"><label>AM/PM</label><select id="eAP"><option value="all" ${sp.amPm==='all'?'selected':''}>${t('specAllDay')}</option><option value="am" ${sp.amPm==='am'?'selected':''}>${t('specAmOnly')}</option><option value="pm" ${sp.amPm==='pm'?'selected':''}>${t('specPmOnly')}</option></select></div>
    <div class="fr"><label>${t('specMaxDay')}</label><input type="number" id="eMD" value="${sp.maxPerDay||6}" min="1" max="8" style="width:55px"><label style="min-width:auto;margin-left:12px">${t('specMaxConsec')}</label><input type="number" id="eMC" value="${sp.maxConsecutive||4}" min="1" max="8" style="width:55px"></div>
    <div class="fr" style="flex-direction:column;align-items:flex-start"><label>${t('specAvailDays')}</label><div class="chips">${Array.from({length:cd},(_,d)=>{const dn=d+1;return`<div class="ck ${!sp.availDays?.length||sp.availDays.includes(dn)?'on':''}" data-ad="${dn}" onclick="this.classList.toggle('on')">J${dn}</div>`}).join('')}</div></div>
    <div class="macts"><button class="btn g" id="eSv">💾 ${t('save')}</button><button class="btn o" id="eX">${t('cancel')}</button></div></div>`;
  document.body.appendChild(ov);

    sp.travelDays=[];ov.querySelectorAll('[data-td]').forEach(c=>{if(c.classList.contains('on'))sp.travelDays.push(+c.dataset.td)});
    const ac=[...ov.querySelectorAll('[data-ad]')];sp.availDays=ac.every(c=>c.classList.contains('on'))?[]:ac.filter(c=>c.classList.contains('on')).map(c=>+c.dataset.ad);
    const su=S.subjects.find(s=>s.id===sp.subjectId);if(su)sp.color=su.color;save();closeModals();renderAll()};
  ov.querySelector('#eX').onclick=()=>closeModals();ov.onclick=e=>{if(e.target===ov)closeModals()}}

function openClassesModal(){
  closeModals();const ov=document.createElement('div');ov.className='modal';
  let rows=S.classes.map((cl,i)=>`<tr><td><select onchange="S.classes[${i}].level=this.value;save()" style="padding:4px;border:1px solid #ddd;border-radius:4px">${['pres','1','2','3','4','5','6'].map(l=>`<option value="${l}" ${cl.level===l?'selected':''}>${l==='pres'?t('presco'):l+'e'}</option>`).join('')}</select></td><td><input type="text" value="${cl.group}" style="width:55px;border:1px solid #ddd;border-radius:4px;padding:4px;font-weight:700" onchange="S.classes[${i}].group=this.value;save()"></td><td><input type="text" value="${cl.titulaire||''}" style="width:120px;border:1px solid #ddd;border-radius:4px;padding:4px" onchange="S.classes[${i}].titulaire=this.value;save()"></td><td><button class="btn r sm" onclick="S.classes.splice(${i},1);save();closeModals();openClassesModal()">✕</button></td></tr>`).join('');
  ov.innerHTML=`<div class="mbox" style="max-width:520px"><h3>🎓 Classes</h3><div style="overflow-x:auto"><table class="dt"><thead><tr><th>${t('classLevel')}</th><th>${t('classGroup')}</th><th>${t('classTitulaire')}</th><th></th></tr></thead><tbody>${rows||`<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:16px">${t('noClass')}</td></tr>`}</tbody></table></div>

// AUTO-FILL
function solveSchedule(){if(!S.classes.length||!S.specialists.length){toast(t('autoAddFirst'));return}
  if(!confirm(t('autoConfirm')))return;const pnums=tPer().map(p=>p.num);let filled=0,rem=0;const demand=[];
  S.classes.forEach(cl=>{S.subjects.forEach(su=>{const req=su.min[cl.level]||0;if(req<=0)return;const u=minUsed(cl.id,su.id);const need=Math.max(0,Math.round((req-u)/S.school.periodDuration));if(need<=0)return;const specs=S.specialists.filter(sp=>sp.subjectId===su.id);if(specs.length)demand.push({cid:cl.id,sid:su.id,need,specs})})});
  demand.sort((a,b)=>a.specs.length-b.specs.length);
  demand.forEach(d=>{for(let att=0;att<d.need;att++){let best=null,bs=-Infinity;const days=Array.from({length:S.school.cycleDays},(_,i)=>i+1);shuf(days);
  for(const day of days)for(const per of pnums)for(const sp of d.specs){if(checkH(day,per,sp.id,d.cid,sp.roomId||'').length)continue;if(getA(day,per).some(a=>a.specId===sp.id||a.classId===d.cid))continue;
  let dc=0;pnums.forEach(pp=>{if(getA(day,pp).some(a=>a.specId===sp.id))dc++});if(dc>=(sp.maxPerDay||6))continue;
  const sv=checkS(day,per,sp.id,d.cid);const sc=100-sv.length*20-dc*5+Math.random()*10;if(sc>bs){bs=sc;best={day,per,specId:sp.id,roomId:sp.roomId||''}}}
  if(best){setA(best.day,best.per,best.specId,d.cid,best.roomId);filled++}else rem++}});
  renderAll();if(!rem&&filled)toast(`✅ ${filled} ${t('autoSuccess')}`);else if(filled)toast(`⚠️ ${filled} ${t('autoPartial')} ${rem} ${t('autoImpossible')}`);else toast(`❌ ${t('autoFailed')}`)}
function shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
function clearSchedule(){if(!confirm(`🗑️ ${t('clearConfirm')}`))return;S.assignments={};save();renderAll()}
function exportPDF(){html2pdf().set({margin:5,filename:'grille_horaire.pdf',image:{type:'jpeg',quality:.98},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:'mm',format:'a3',orientation:'landscape'}}).from(document.getElementById('grid')).save()}
function renderAll(){resetGroupColors();applyI18n();renderPanel();renderGrid();renderNext();updateProgress()}

document.addEventListener('DOMContentLoaded',()=>{load();applyI18n();renderAll();showWelcome()});
