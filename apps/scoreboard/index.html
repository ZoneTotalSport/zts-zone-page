<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://zonetotalsport.ca/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basketball Scoreboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=DynaPuff:wght@400..700&display=swap" rel="stylesheet">
    <style>body{font-family:'DynaPuff',cursive}</style>
    <link rel="stylesheet" href="../../zts-ultra.css">
    <script type="module" crossorigin src="./assets/index-kE5_Qgre.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-EqsiB2Sq.css">
    <style>
.zts-app-header{position:sticky;top:0;z-index:9999;background:linear-gradient(135deg,#00C4FF 0%,#0086AD 100%);border-bottom:5px solid #000;box-shadow:0 6px 0 rgba(0,0,0,.2);padding-top:env(safe-area-inset-top,0)}
.zts-app-header-inner{max-width:1800px;margin:0 auto;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.zts-app-brand{display:flex;flex-direction:column;align-items:flex-start;text-decoration:none;line-height:1;flex-shrink:0}
.zts-app-brand-main{font-family:'Luckiest Guy',cursive;letter-spacing:.05em;font-size:48px;color:#fff;text-shadow:3px 3px 0 rgba(0,0,0,.3);line-height:1}
.zts-app-brand-accent{color:#FFFA00}
.zts-app-brand-sub{font-family:'Luckiest Guy',cursive;font-size:16px;letter-spacing:.25em;text-transform:uppercase;color:#FFFC00;margin-top:6px;line-height:1;text-shadow:2px 2px 0 rgba(0,0,0,.25)}
@media (max-width:640px){.zts-app-brand-sub{display:none}.zts-app-brand-main{font-size:30px}}
.zts-app-header-right{display:flex;align-items:center;gap:14px}
.zts-app-clock{font-family:'Luckiest Guy',cursive;letter-spacing:.1em;font-size:42px;color:#fff;text-shadow:3px 3px 0 rgba(0,0,0,.3);background:rgba(0,0,0,.25);padding:8px 22px;border-radius:18px;border:3px solid #000;box-shadow:5px 5px 0 #000}
.zts-app-home-btn{font-family:'Luckiest Guy',cursive;letter-spacing:.05em;text-transform:uppercase;font-size:30px;background:#FFFA00;color:#004A61;padding:14px 28px;border-radius:18px;display:inline-flex;align-items:center;gap:10px;text-decoration:none;border:3px solid #000;box-shadow:5px 5px 0 #000;transition:transform .12s,box-shadow .12s}
.zts-app-home-btn:active{transform:translate(3px,3px);box-shadow:1px 1px 0 #000}
.zts-app-home-btn svg{width:28px;height:28px}
@media (max-width:640px){.zts-app-clock{font-size:24px;padding:6px 14px}.zts-app-home-btn{font-size:20px;padding:10px 18px}.zts-app-home-btn svg{width:20px;height:20px}}
    </style>
  </head>
  <body>
    <header class="zts-app-header">
      <div class="zts-app-header-inner">
        <a href="../../" class="zts-app-brand">
          <span class="zts-app-brand-main">ZONE <span class="zts-app-brand-accent">TOTAL</span> SPORT</span>
          <span class="zts-app-brand-sub">Tableau de pointage</span>
        </a>
        <div class="zts-app-header-right">
          <span id="ztsClock" class="zts-app-clock">09:41</span>
          <a href="../../" class="zts-app-home-btn">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l9-9 9 9M5 10v10h14V10"/></svg>
            Accueil
          </a>
        </div>
      </div>
    </header>
    <script>(function(){function t(){var e=document.getElementById('ztsClock');if(!e)return;var d=new Date();e.textContent=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}t();setInterval(t,15000);})();</script>
    <div id="root"></div>
    
      <script src="../../analytics.js"></script>
  <script src="../../cookie-consent.js" defer></script>
</body>
</html>
