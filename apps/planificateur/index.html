<!DOCTYPE html>
<html lang="fr-CA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificateur Pedagogique — Zone Total Sport</title>
    <meta name="description" content="Planificateur pedagogique pour enseignants EPS au Quebec. Calendrier scolaire, cycles, planifications et notes.">
    <link rel="icon" type="image/png" href="/logo-zts.png">
    <link rel="apple-touch-icon" href="/logo-zts.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Patrick+Hand&family=Fredoka+One&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyan: { electric: '#00E5FF' },
                        yellow: { sun: '#FFD700' },
                        pink: { fuchsia: '#FF2A7A' },
                        violet: { pop: '#8B5CF6' },
                        dark: '#0F0F2E',
                        card: '#1a1a3e',
                        carddark: '#24244a',
                    },
                    fontFamily: {
                        bangers: ['"Luckiest Guy"', 'cursive'],
                        baloo: ['"Patrick Hand"', 'cursive'],
                        fredoka: ['"Fredoka One"', 'cursive'],
                    },
                }
            }
        }
    </script>

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; overflow-x: hidden; }

        body {
            font-family: 'Patrick Hand', cursive;
            font-size: 1.1rem;
            background-color: #0F0F2E;
            color: #fff;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 120%;
            background-image: url('/gym-bg.jpg');
            background-size: cover;
            background-position: center;
            opacity: 1;
            z-index: 0;
            pointer-events: none;
        }
        body > * { position: relative; z-index: 1; }

        /* Calendar grid */
        .cal-grid {
            display: grid;
            grid-template-columns: 40px repeat(5, 1fr);
            gap: 2px;
        }
        @media (max-width: 640px) {
            .cal-grid { grid-template-columns: 30px repeat(5, 1fr); gap: 1px; }
        }

        .cal-cell {
            background: #1a1a3e;
            border: 1px solid rgba(0,229,255,0.1);
            padding: 4px;
            min-height: 90px;
            border-radius: 8px;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }
        .cal-cell:hover { border-color: rgba(0,229,255,0.3); background: #1f1f4a; }
        .cal-cell.other-month { opacity: 0.35; background: #14142e; }
        .cal-cell.selected { border-color: #00E5FF; box-shadow: 0 0 12px rgba(0,229,255,0.3); }
        .cal-cell.today { border-color: #FFD700; box-shadow: 0 0 8px rgba(255,215,0,0.3); }

        .cal-header {
            background: linear-gradient(135deg, #1a1a3e, #24244a);
            color: #00E5FF;
            font-family: 'Fredoka One', cursive;
            font-size: 0.85rem;
            text-align: center;
            padding: 8px 4px;
            border-radius: 8px 8px 0 0;
            border: 1px solid rgba(0,229,255,0.15);
        }

        .week-num {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fredoka One', cursive;
            font-size: 0.75rem;
            color: #00E5FF;
            opacity: 0.7;
        }

        /* Special event pills */
        .event-ped {
            background: rgba(255,215,0,0.2);
            border: 1px solid #FFD700;
            color: #FFD700;
            font-size: 0.65rem;
            padding: 1px 6px;
            border-radius: 9999px;
            display: inline-block;
            margin-top: 2px;
        }
        .event-conge {
            background: rgba(0,229,255,0.2);
            border: 1px solid #00E5FF;
            color: #00E5FF;
            font-size: 0.65rem;
            padding: 1px 6px;
            border-radius: 9999px;
            display: inline-block;
            margin-top: 2px;
        }
        .event-custom {
            background: rgba(255,42,122,0.15);
            border: 1px solid #FF2A7A;
            color: #FF2A7A;
            font-size: 0.65rem;
            padding: 1px 6px;
            border-radius: 9999px;
            display: inline-block;
            margin-top: 2px;
            position: relative;
        }
        .event-custom .delete-event {
            cursor: pointer;
            margin-left: 3px;
            font-weight: bold;
            opacity: 0.7;
        }
        .event-custom .delete-event:hover { opacity: 1; }

        /* Cycle dots */
        .cycle-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 2px;
        }

        /* Voir Planif buttons */
        .voir-planif-btn {
            font-family: 'Fredoka One', cursive;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 9999px;
            border: none;
            cursor: pointer;
            color: #fff;
            transition: all 0.2s;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .voir-planif-btn:hover { transform: scale(1.05); filter: brightness(1.15); }

        /* Inputs dark */
        input[type="text"], textarea, select {
            background: #24244a !important;
            color: #fff !important;
            border: 1px solid rgba(0,229,255,0.2) !important;
            border-radius: 12px !important;
            padding: 8px 12px;
            font-family: 'Patrick Hand', cursive;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, textarea:focus, select:focus {
            border-color: #00E5FF !important;
            outline: none;
            box-shadow: 0 0 8px rgba(0,229,255,0.2);
        }

        /* Checkbox custom */
        .zts-checkbox {
            appearance: none;
            width: 20px; height: 20px;
            border: 2px solid rgba(0,229,255,0.4);
            border-radius: 6px;
            background: #24244a;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }
        .zts-checkbox:checked {
            background: #00E5FF;
            border-color: #00E5FF;
        }
        .zts-checkbox:checked::after {
            content: '\2713';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #0F0F2E;
            font-weight: bold;
            font-size: 14px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15,15,46,0.9);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: #1a1a3e;
            border-radius: 24px;
            border: 1px solid rgba(0,229,255,0.2);
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,229,255,0.15);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0F0F2E; }
        ::-webkit-scrollbar-thumb { background: #1a1a3e; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #24244a; }

        /* Animations */
        .fade-in { opacity: 0; transform: translateY(20px); }
    </style>
</head>
<body class="font-baloo">

    <!-- ========== HEADER ========== -->
    <header class="sticky top-0 z-50 bg-gradient-to-r from-[#0a0a25] via-[#0F0F2E] to-[#0a0a25] border-b border-cyan-electric/20 backdrop-blur-sm">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="https://zonetotalsport.ca" class="flex items-center gap-2 text-cyan-electric hover:opacity-80 transition font-fredoka text-sm">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                <span class="hidden sm:inline">Zone Total Sport</span>
            </a>
            <h1 class="font-bangers text-xl sm:text-2xl md:text-3xl text-center tracking-wider">
                <span class="text-cyan-electric">PLANIFICATEUR</span>
                <span class="text-yellow-sun"> PEDAGOGIQUE</span>
            </h1>
            <div class="flex gap-1" id="langButtons">
                <button onclick="setLang('fr')" class="lang-btn px-3 py-1 rounded-full text-xs font-fredoka transition" data-lang="fr">FR</button>
                <button onclick="setLang('en')" class="lang-btn px-3 py-1 rounded-full text-xs font-fredoka transition" data-lang="en">EN</button>
            </div>
        </div>
    </header>

    <!-- ========== CONTROLS ========== -->
    <div class="max-w-7xl mx-auto px-4 py-4 flex flex-wrap items-center justify-center gap-3">
        <button onclick="changeMonth(-1)" class="bg-cyan-electric/20 hover:bg-cyan-electric/30 text-cyan-electric px-4 py-2 rounded-full font-fredoka transition hover:scale-105">
            <i data-lucide="chevron-left" class="w-5 h-5 inline"></i>
        </button>
        <select id="monthSelect" onchange="goToMonth()" class="font-fredoka text-sm px-4 py-2 rounded-full">
        </select>
        <button onclick="changeMonth(1)" class="bg-cyan-electric/20 hover:bg-cyan-electric/30 text-cyan-electric px-4 py-2 rounded-full font-fredoka transition hover:scale-105">
            <i data-lucide="chevron-right" class="w-5 h-5 inline"></i>
        </button>
        <button onclick="goToToday()" class="bg-yellow-sun/20 hover:bg-yellow-sun/30 text-yellow-sun px-4 py-2 rounded-full font-fredoka text-sm transition hover:scale-105" id="todayBtn">
            <i data-lucide="calendar-check" class="w-4 h-4 inline mr-1"></i> <span data-i18n="today">Aujourd'hui</span>
        </button>
    </div>

    <!-- ========== MONTH TITLE ========== -->
    <div class="text-center mb-4">
        <h2 id="monthTitle" class="font-bangers text-3xl sm:text-4xl md:text-5xl tracking-wide text-white"></h2>
    </div>

    <!-- ========== CALENDAR ========== -->
    <div class="max-w-7xl mx-auto px-2 sm:px-4 mb-6">
        <div id="calendarGrid" class="cal-grid"></div>
    </div>

    <!-- ========== LEGEND ========== -->
    <div class="max-w-7xl mx-auto px-4 mb-6 fade-in">
        <div class="bg-card rounded-3xl p-4 border border-cyan-electric/10">
            <h3 class="font-fredoka text-cyan-electric mb-3 text-sm" data-i18n="legend">Legende</h3>
            <div class="flex flex-wrap gap-4 text-sm text-white/70">
                <div class="flex items-center gap-2"><span class="cycle-dot" style="background:#22c55e"></span> <span data-i18n="cycle1">Cycle 1</span></div>
                <div class="flex items-center gap-2"><span class="cycle-dot" style="background:#3b82f6"></span> <span data-i18n="cycle2">Cycle 2</span></div>
                <div class="flex items-center gap-2"><span class="cycle-dot" style="background:#a855f7"></span> <span data-i18n="cycle3">Cycle 3</span></div>
                <div class="flex items-center gap-2"><span class="event-ped" style="font-size:0.7rem">Ped</span> <span data-i18n="pedDay">Pedagogique</span></div>
                <div class="flex items-center gap-2"><span class="event-conge" style="font-size:0.7rem">Conge</span> <span data-i18n="holiday">Conge</span></div>
                <div class="flex items-center gap-2"><span class="event-custom" style="font-size:0.7rem">Note</span> <span data-i18n="customEvent">Evenement perso</span></div>
            </div>
        </div>
    </div>

    <!-- ========== ADD NOTE SECTION ========== -->
    <div id="noteSection" class="max-w-7xl mx-auto px-4 mb-6 hidden fade-in">
        <div class="bg-card rounded-3xl p-5 border border-cyan-electric/10">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-fredoka text-lg">
                    <span class="text-cyan-electric" data-i18n="noteFor">Notes pour</span>
                    <span id="noteDateLabel" class="text-yellow-sun ml-2"></span>
                </h3>
                <button onclick="closeNoteSection()" class="text-white/50 hover:text-white transition">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- Quick tags -->
            <div class="flex flex-wrap gap-3 mb-4">
                <label class="flex items-center gap-2 text-sm text-white/80 cursor-pointer">
                    <input type="checkbox" class="zts-checkbox" data-tag="Comite"> Comite
                </label>
                <label class="flex items-center gap-2 text-sm text-white/80 cursor-pointer">
                    <input type="checkbox" class="zts-checkbox" data-tag="Statutaire"> Statutaire
                </label>
                <label class="flex items-center gap-2 text-sm text-white/80 cursor-pointer">
                    <input type="checkbox" class="zts-checkbox" data-tag="Photo"> Photo
                </label>
                <label class="flex items-center gap-2 text-sm text-white/80 cursor-pointer">
                    <input type="checkbox" class="zts-checkbox" data-tag="Sortie"> Sortie
                </label>
                <label class="flex items-center gap-2 text-sm text-white/80 cursor-pointer">
                    <input type="checkbox" class="zts-checkbox" data-tag="Tournoi"> Tournoi
                </label>
                <label class="flex items-center gap-2 text-sm text-white/80 cursor-pointer">
                    <input type="checkbox" class="zts-checkbox" data-tag="Direction"> Direction
                </label>
            </div>

            <!-- Custom event input -->
            <div class="flex gap-2 mb-4">
                <input type="text" id="customEventInput" class="flex-1 text-sm" data-i18n-placeholder="addEvent" placeholder="Ajouter un evenement...">
                <button onclick="addCustomEvent()" class="bg-gradient-to-r from-cyan-electric to-blue-500 text-dark font-fredoka px-5 py-2 rounded-2xl text-sm hover:scale-105 transition shadow-lg shadow-cyan-electric/20">
                    <i data-lucide="pin" class="w-4 h-4 inline mr-1"></i> <span data-i18n="pin">Epingler</span>
                </button>
            </div>

            <!-- Notes textarea -->
            <div class="mb-4">
                <label class="text-sm text-white/60 mb-1 block font-fredoka" data-i18n="detailedNotes">Notes detaillees</label>
                <textarea id="notesTextarea" rows="4" class="w-full text-sm" data-i18n-placeholder="writeNotes" placeholder="Ecrire vos notes ici..."></textarea>
            </div>

            <!-- Action buttons -->
            <div class="flex flex-wrap gap-3">
                <button onclick="saveNotes()" class="bg-gradient-to-r from-yellow-sun to-amber-500 text-dark font-fredoka px-5 py-2 rounded-2xl text-sm hover:scale-105 transition shadow-lg shadow-yellow-sun/20">
                    <i data-lucide="save" class="w-4 h-4 inline mr-1"></i> <span data-i18n="save">Sauvegarder</span>
                </button>
                <button onclick="exportPDF()" class="bg-gradient-to-r from-pink-fuchsia to-rose-500 text-white font-fredoka px-5 py-2 rounded-2xl text-sm hover:scale-105 transition shadow-lg shadow-pink-fuchsia/20">
                    <i data-lucide="file-text" class="w-4 h-4 inline mr-1"></i> PDF
                </button>
                <button onclick="emailNotes()" class="bg-gradient-to-r from-cyan-electric to-blue-500 text-dark font-fredoka px-5 py-2 rounded-2xl text-sm hover:scale-105 transition shadow-lg shadow-cyan-electric/20">
                    <i data-lucide="mail" class="w-4 h-4 inline mr-1"></i> Email
                </button>
            </div>
        </div>
    </div>

    <!-- ========== WEEKEND NOTES ========== -->
    <div id="weekendNotes" class="max-w-7xl mx-auto px-4 mb-6 hidden fade-in">
        <div class="bg-card rounded-3xl p-5 border border-pink-fuchsia/20">
            <h3 class="font-fredoka text-lg mb-3">
                <span class="text-pink-fuchsia" data-i18n="weekendNotes">Notes de fin de semaine</span>
                <span id="weekendDateLabel" class="text-white/60 text-sm ml-2"></span>
            </h3>
            <textarea id="weekendTextarea" rows="3" class="w-full text-sm" data-i18n-placeholder="weekendPlaceholder" placeholder="Notes pour la fin de semaine..."></textarea>
            <button onclick="saveWeekendNotes()" class="mt-3 bg-gradient-to-r from-orange-400 to-pink-fuchsia text-white font-fredoka px-5 py-2 rounded-2xl text-sm hover:scale-105 transition shadow-lg">
                <i data-lucide="save" class="w-4 h-4 inline mr-1"></i> <span data-i18n="save">Sauvegarder</span>
            </button>
        </div>
    </div>

    <!-- ========== MODAL ========== -->
    <div id="previewModal" class="modal-overlay hidden" onclick="closeModal(event)">
        <div class="modal-content flex flex-col" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between p-4 border-b border-cyan-electric/10">
                <h3 id="modalTitle" class="font-fredoka text-cyan-electric text-lg"></h3>
                <button onclick="document.getElementById('previewModal').classList.add('hidden')" class="text-white/50 hover:text-white transition">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <div class="flex-1 overflow-auto p-2">
                <iframe id="previewFrame" class="w-full rounded-xl" style="height:70vh; border:none; background:#fff;"></iframe>
            </div>
        </div>
    </div>

    <!-- ========== FOOTER ========== -->
    <footer class="text-center py-8 opacity-60">
        <img src="/logo-zts.png" alt="Zone Total Sport" class="h-12 mx-auto mb-2">
        <p class="text-xs text-white/40 font-fredoka">&copy; 2026 Zone Total Sport</p>
    </footer>

    <!-- ========== JAVASCRIPT ========== -->
    <script>
    // ==========================================
    // i18n translations
    // ==========================================
    const translations = {
        fr: {
            today: "Aujourd'hui",
            legend: "Legende",
            cycle1: "Cycle 1",
            cycle2: "Cycle 2",
            cycle3: "Cycle 3",
            pedDay: "Pedagogique",
            holiday: "Conge",
            customEvent: "Evenement perso",
            noteFor: "Notes pour",
            addEvent: "Ajouter un evenement...",
            pin: "Epingler",
            detailedNotes: "Notes detaillees",
            writeNotes: "Ecrire vos notes ici...",
            save: "Sauvegarder",
            weekendNotes: "Notes de fin de semaine",
            weekendPlaceholder: "Notes pour la fin de semaine...",
            voirPlanif: "Voir Planif",
            months: ["Janvier","Fevrier","Mars","Avril","Mai","Juin","Juillet","Aout","Septembre","Octobre","Novembre","Decembre"],
            days: ["Lun","Mar","Mer","Jeu","Ven"],
            week: "Sem",
            ped: "Ped",
            conge: "Conge",
            savedOk: "Sauvegarde!",
            noNotes: "Aucune note pour cette date.",
            pdfTitle: "Notes du planificateur",
            emailSubject: "Notes - Planificateur Pedagogique",
            closedMsg: "Ferme",
            previewTitle: "Planification",
            jour: "Jour",
            semaine: "Semaine",
            planMatch: "Plan de Match",
            deleteConfirm: "Supprimer cet evenement?"
        },
        en: {
            today: "Today",
            legend: "Legend",
            cycle1: "Cycle 1",
            cycle2: "Cycle 2",
            cycle3: "Cycle 3",
            pedDay: "Pedagogical",
            holiday: "Holiday",
            customEvent: "Custom Event",
            noteFor: "Notes for",
            addEvent: "Add an event...",
            pin: "Pin",
            detailedNotes: "Detailed Notes",
            writeNotes: "Write your notes here...",
            save: "Save",
            weekendNotes: "Weekend Notes",
            weekendPlaceholder: "Weekend notes...",
            voirPlanif: "View Plan",
            months: ["January","February","March","April","May","June","July","August","September","October","November","December"],
            days: ["Mon","Tue","Wed","Thu","Fri"],
            week: "Wk",
            ped: "Ped",
            conge: "Holiday",
            savedOk: "Saved!",
            noNotes: "No notes for this date.",
            pdfTitle: "Planner Notes",
            emailSubject: "Notes - Pedagogical Planner",
            closedMsg: "Closed",
            previewTitle: "Planning",
            jour: "Day",
            semaine: "Week",
            planMatch: "Game Plan",
            deleteConfirm: "Delete this event?"
        }
    };

    let currentLang = 'fr';

    function t(key) {
        return (translations[currentLang] && translations[currentLang][key]) || key;
    }

    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(btn => {
            if (btn.dataset.lang === lang) {
                btn.classList.add('bg-cyan-electric', 'text-dark');
                btn.classList.remove('bg-cyan-electric/20', 'text-cyan-electric');
            } else {
                btn.classList.remove('bg-cyan-electric', 'text-dark');
                btn.classList.add('bg-cyan-electric/20', 'text-cyan-electric');
            }
        });
        document.querySelectorAll('[data-i18n]').forEach(el => {
            el.textContent = t(el.dataset.i18n);
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
            el.placeholder = t(el.dataset['i18nPlaceholder']);
        });
        populateMonthSelect();
        renderCalendar();
        localStorage.setItem('zts-planif-lang', lang);
    }

    // ==========================================
    // State
    // ==========================================
    let currentYear = 2025;
    let currentMonth = 8; // September (0-indexed)
    let selectedDate = null;
    let userEvents = JSON.parse(localStorage.getItem('zts-planif-events') || '{}');
    let userNotes = JSON.parse(localStorage.getItem('zts-planif-notes') || '{}');
    let weekendNotesData = JSON.parse(localStorage.getItem('zts-planif-weekend') || '{}');

    // ==========================================
    // Special Events (Aug 2025 - June 2026)
    // ==========================================
    const specialEvents = {
        // Aout 2025
        '2025-08-25': { type: 'ped', label: 'Ped - Accueil' },
        '2025-08-26': { type: 'ped', label: 'Ped - Planification' },
        '2025-08-27': { type: 'ped', label: 'Ped - Preparation' },
        '2025-08-28': { type: 'ped', label: 'Rentree scolaire' },
        // Septembre 2025
        '2025-09-01': { type: 'conge', label: 'Fete du travail' },
        '2025-09-29': { type: 'conge', label: 'Verite et reconciliation' },
        // Octobre 2025
        '2025-10-13': { type: 'conge', label: 'Action de grace' },
        '2025-10-17': { type: 'ped', label: 'Ped - Bulletin' },
        '2025-10-31': { type: 'ped', label: 'Ped - Evaluation' },
        // Novembre 2025
        '2025-11-21': { type: 'ped', label: 'Ped - Suivi' },
        // Decembre 2025
        '2025-12-19': { type: 'ped', label: 'Ped - Bilan trim. 1' },
        '2025-12-22': { type: 'conge', label: 'Debut vacances Noel' },
        '2025-12-23': { type: 'conge', label: 'Vacances Noel' },
        '2025-12-24': { type: 'conge', label: 'Vacances Noel' },
        '2025-12-25': { type: 'conge', label: 'Noel' },
        '2025-12-26': { type: 'conge', label: 'Vacances Noel' },

    // School day counter: first school day is Aug 28, 2025
    const schoolStartDate = new Date(2025, 7, 28); // Aug 28, 2025

    function getSchoolDayNumber(dateStr) {
        const d = new Date(dateStr + 'T00:00:00');
        if (d < schoolStartDate) return null;
        if (d.getDay() === 0 || d.getDay() === 6) return null; // weekend
        if (specialEvents[dateStr] && specialEvents[dateStr].type === 'conge') return null;

        let count = 0;
        let cur = new Date(schoolStartDate);
        while (cur <= d) {
            const key = formatDate(cur);
            const dayOfWeek = cur.getDay();
            if (dayOfWeek !== 0 && dayOfWeek !== 6) {
                if (!(specialEvents[key] && specialEvents[key].type === 'conge')) {
                    count++;
                }
            }
            cur.setDate(cur.getDate() + 1);
        }
        return count;
    }

    function getJourNumber(dateStr) {
        const schoolDay = getSchoolDayNumber(dateStr);
        if (!schoolDay) return null;
        return ((schoolDay - 1) % 6) + 1;
    }

    function getWeekNumber(dateStr) {
        const d = new Date(dateStr + 'T00:00:00');
        const startOfYear = new Date(d.getFullYear(), 0, 1);
        const diff = d - startOfYear;
        const oneWeek = 7 * 24 * 60 * 60 * 1000;
        return Math.ceil((diff / oneWeek) + 1);
    }

    // Semaine 40 countdown
    function getSemaine40(dateStr) {
        const schoolDay = getSchoolDayNumber(dateStr);
        if (!schoolDay) return null;
        // Calculate school week (5-day weeks)
        return Math.ceil(schoolDay / 5);
    }

    // ==========================================
    // Calendar Rendering
    // ==========================================
    function formatDate(d) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${dd}`;
    }

    function populateMonthSelect() {
        const sel = document.getElementById('monthSelect');
        sel.innerHTML = '';
        // Aug 2025 to June 2026
        const months = [];
        for (let m = 7; m <= 11; m++) months.push({ year: 2025, month: m });
        for (let m = 0; m <= 5; m++) months.push({ year: 2026, month: m });

        months.forEach(({ year, month }) => {
            const opt = document.createElement('option');
            opt.value = `${year}-${month}`;
            opt.textContent = `${t('months')[month]} ${year}`;
            if (year === currentYear && month === currentMonth) opt.selected = true;
            sel.appendChild(opt);
        });
    }

    function goToMonth() {
        const val = document.getElementById('monthSelect').value.split('-');
        currentYear = parseInt(val[0]);
        currentMonth = parseInt(val[1]);
        renderCalendar();
    }

    function changeMonth(dir) {
        currentMonth += dir;
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        populateMonthSelect();
        renderCalendar();
    }

    function goToToday() {
        const now = new Date();
        currentYear = now.getFullYear();
        currentMonth = now.getMonth();
        populateMonthSelect();
        renderCalendar();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';

        const monthTitle = document.getElementById('monthTitle');
        monthTitle.textContent = `${t('months')[currentMonth]} ${currentYear}`;

        const today = new Date();
        const todayStr = formatDate(today);

        // Day headers
        const weekLabel = document.createElement('div');
        weekLabel.className = 'cal-header';
        weekLabel.textContent = t('week');
        grid.appendChild(weekLabel);

        t('days').forEach(day => {
            const dh = document.createElement('div');
            dh.className = 'cal-header';
            dh.textContent = day;
            grid.appendChild(dh);
        });

        // Find first Monday of the calendar view
        const firstDay = new Date(currentYear, currentMonth, 1);
        let startDay = new Date(firstDay);
        const dayOfWeek = startDay.getDay();
        // Adjust to Monday
        const diff = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
        startDay.setDate(startDay.getDate() + diff);

        // Render 6 weeks
        for (let week = 0; week < 6; week++) {
            const weekStart = new Date(startDay);
            weekStart.setDate(weekStart.getDate() + week * 7);

            // Check if this week has any days in current month
            let hasCurrentMonth = false;
            for (let d = 0; d < 5; d++) {
                const checkDate = new Date(weekStart);
                checkDate.setDate(checkDate.getDate() + d);
                if (checkDate.getMonth() === currentMonth) hasCurrentMonth = true;
            }
            if (!hasCurrentMonth && week > 0) continue;

            // Week number cell
            const weekNum = document.createElement('div');
            weekNum.className = 'week-num';
            const sem40 = getSemaine40(formatDate(weekStart));
            weekNum.textContent = sem40 ? `S${sem40}` : '';
            grid.appendChild(weekNum);

            // 5 day cells (Mon-Fri)
            for (let d = 0; d < 5; d++) {
                const cellDate = new Date(weekStart);
                cellDate.setDate(cellDate.getDate() + d);
                const dateStr = formatDate(cellDate);
                const isCurrentMonth = cellDate.getMonth() === currentMonth;
                const isToday = dateStr === todayStr;

                const cell = document.createElement('div');
                cell.className = 'cal-cell';
                if (!isCurrentMonth) cell.classList.add('other-month');
                if (isToday) cell.classList.add('today');
                if (selectedDate === dateStr) cell.classList.add('selected');
                cell.onclick = () => selectDate(dateStr);

                // Date number
                const dateNum = document.createElement('div');
                dateNum.className = 'flex items-center justify-between mb-1';

                const numSpan = document.createElement('span');
                numSpan.className = 'text-sm font-fredoka ' + (isToday ? 'text-yellow-sun' : 'text-white/80');
                numSpan.textContent = cellDate.getDate();
                dateNum.appendChild(numSpan);

                // Jour number and cycle dots
                const jourNum = getJourNumber(dateStr);
                if (jourNum && isCurrentMonth) {
                    const jourBadge = document.createElement('span');
                    jourBadge.className = 'text-xs font-fredoka px-1.5 py-0.5 rounded-full';
                    jourBadge.style.background = scheduleData[jourNum].color + '33';
                    jourBadge.style.color = scheduleData[jourNum].color;
                    jourBadge.textContent = `J${jourNum}`;
                    dateNum.appendChild(jourBadge);
                }

                cell.appendChild(dateNum);

                // Cycle dots
                if (jourNum && isCurrentMonth) {
                    const dotsDiv = document.createElement('div');
                    dotsDiv.className = 'flex gap-0.5 mb-1';
                    const colors = ['#22c55e', '#3b82f6', '#a855f7'];
                    colors.forEach(c => {
                        const dot = document.createElement('span');
                        dot.className = 'cycle-dot';
                        dot.style.background = c;
                        dotsDiv.appendChild(dot);
                    });
                    cell.appendChild(dotsDiv);
                }

                // Special events
                const evt = specialEvents[dateStr];
                if (evt) {
                    const evtSpan = document.createElement('span');
                    evtSpan.className = evt.type === 'ped' ? 'event-ped' : 'event-conge';
                    evtSpan.textContent = evt.type === 'ped' ? t('ped') : t('conge');
                    evtSpan.title = evt.label;
                    cell.appendChild(evtSpan);
                }

                // User events
                const uEvents = userEvents[dateStr] || [];
                uEvents.forEach((ue, idx) => {
                    const ueSpan = document.createElement('span');
                    ueSpan.className = 'event-custom';
                    ueSpan.textContent = ue;
                    const del = document.createElement('span');
                    del.className = 'delete-event';
                    del.textContent = 'x';
                    del.onclick = (e) => { e.stopPropagation(); deleteEvent(dateStr, idx); };
                    ueSpan.appendChild(del);
                    cell.appendChild(ueSpan);
                });

                // Voir Planif button
                if (jourNum && isCurrentMonth) {
                    const btn = document.createElement('button');
                    btn.className = 'voir-planif-btn mt-1';
                    btn.style.background = scheduleData[jourNum].color;
                    btn.textContent = t('voirPlanif');
                    btn.onclick = (e) => { e.stopPropagation(); openPlanifPreview(dateStr, jourNum); };
                    cell.appendChild(btn);
                }

                // Note indicator
                if (userNotes[dateStr]) {
                    const noteInd = document.createElement('div');
                    noteInd.className = 'absolute top-1 right-1';
                    noteInd.innerHTML = '<span style="color:#FFD700;font-size:10px;">&#9733;</span>';
                    cell.appendChild(noteInd);
                }

                grid.appendChild(cell);
            }
        }

        // Re-init Lucide icons
        if (window.lucide) lucide.createIcons();
    }

    // ==========================================
    // Date Selection & Notes
    // ==========================================
    function selectDate(dateStr) {
        selectedDate = dateStr;
        renderCalendar();

        const noteSection = document.getElementById('noteSection');
        noteSection.classList.remove('hidden');
        document.getElementById('noteDateLabel').textContent = dateStr;

        // Load existing notes
        document.getElementById('notesTextarea').value = userNotes[dateStr] || '';

        // Reset checkboxes
        document.querySelectorAll('.zts-checkbox').forEach(cb => { cb.checked = false; });

        // Load existing tags
        const existingEvents = userEvents[dateStr] || [];
        document.querySelectorAll('.zts-checkbox').forEach(cb => {
            if (existingEvents.includes(cb.dataset.tag)) cb.checked = true;
        });

        // Scroll to note section
        noteSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        // Show weekend notes if Friday
        const d = new Date(dateStr + 'T00:00:00');
        const weekendSection = document.getElementById('weekendNotes');
        if (d.getDay() === 5) {
            weekendSection.classList.remove('hidden');
            document.getElementById('weekendDateLabel').textContent = dateStr;
            document.getElementById('weekendTextarea').value = weekendNotesData[dateStr] || '';
        } else {
            weekendSection.classList.add('hidden');
        }
    }

    function closeNoteSection() {
        document.getElementById('noteSection').classList.add('hidden');
        document.getElementById('weekendNotes').classList.add('hidden');
        selectedDate = null;
        renderCalendar();
    }

    function addCustomEvent() {
        if (!selectedDate) return;
        const input = document.getElementById('customEventInput');
        const text = input.value.trim();
        if (!text) return;

        if (!userEvents[selectedDate]) userEvents[selectedDate] = [];
        userEvents[selectedDate].push(text);
        localStorage.setItem('zts-planif-events', JSON.stringify(userEvents));
        input.value = '';
        renderCalendar();
    }

    function deleteEvent(dateStr, idx) {
        if (!confirm(t('deleteConfirm'))) return;
        userEvents[dateStr].splice(idx, 1);
        if (userEvents[dateStr].length === 0) delete userEvents[dateStr];
        localStorage.setItem('zts-planif-events', JSON.stringify(userEvents));
        renderCalendar();
    }

    function saveNotes() {
        if (!selectedDate) return;
        const text = document.getElementById('notesTextarea').value;
        if (text.trim()) {
            userNotes[selectedDate] = text;
        } else {
            delete userNotes[selectedDate];
        }
        localStorage.setItem('zts-planif-notes', JSON.stringify(userNotes));

        // Save checked tags as events
        document.querySelectorAll('.zts-checkbox').forEach(cb => {
            const tag = cb.dataset.tag;
            if (!userEvents[selectedDate]) userEvents[selectedDate] = [];
            const idx = userEvents[selectedDate].indexOf(tag);
            if (cb.checked && idx === -1) {
                userEvents[selectedDate].push(tag);
            } else if (!cb.checked && idx !== -1) {
                userEvents[selectedDate].splice(idx, 1);
            }
        });
        if (userEvents[selectedDate] && userEvents[selectedDate].length === 0) delete userEvents[selectedDate];
        localStorage.setItem('zts-planif-events', JSON.stringify(userEvents));

        showToast(t('savedOk'));
        renderCalendar();
    }

    function saveWeekendNotes() {
        if (!selectedDate) return;
        const text = document.getElementById('weekendTextarea').value;
        if (text.trim()) {
            weekendNotesData[selectedDate] = text;
        } else {
            delete weekendNotesData[selectedDate];
        }
        localStorage.setItem('zts-planif-weekend', JSON.stringify(weekendNotesData));
        showToast(t('savedOk'));
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-6 right-6 bg-gradient-to-r from-cyan-electric to-blue-500 text-dark font-fredoka px-6 py-3 rounded-2xl shadow-lg shadow-cyan-electric/30 z-[2000] transition-all';
        toast.textContent = msg;
        document.body.appendChild(toast);
        gsap.fromTo(toast, { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.3 });
        setTimeout(() => {
            gsap.to(toast, { opacity: 0, y: 20, duration: 0.3, onComplete: () => toast.remove() });
        }, 2000);
    }

    function getSemaine40HtmlContent(dateStr) {
        const sem = getSemaine40(dateStr);
        const schoolDay = getSchoolDayNumber(dateStr);

        // Build the 5-day week view
        const d = new Date(dateStr + 'T00:00:00');
        const dayOfWeek = d.getDay();
        const monday = new Date(d);
        monday.setDate(d.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));

        let weekDays = '';
        for (let i = 0; i < 5; i++) {
            const wd = new Date(monday);
            wd.setDate(monday.getDate() + i);
            const wdStr = formatDate(wd);
            const jour = getJourNumber(wdStr);
            const evt = specialEvents[wdStr];

            let cellBg = '#f8f9fa';

            if (evt) {
                cellBg = evt.type === 'ped' ? '#FFF8E1' : '#E0F7FA';
                cellContent = `<div style="font-size:0.85rem;color:#666;">${evt.label}</div>`;
            } else if (jour) {
                cellBg = scheduleData[jour].color + '11';
                cellContent = `<div style="font-family:'Fredoka One';color:${scheduleData[jour].color};font-size:1.1rem;">${scheduleData[jour].label}</div>
                    <div style="font-size:0.85rem;color:#666;margin-top:4px;">${scheduleData[jour].content.split(' / ')[0]}</div>`;
            }

            const dayNames = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
            weekDays += `<div style="background:${cellBg};border-radius:12px;padding:10px;text-align:center;min-height:80px;">
                <div style="font-family:'Fredoka One';font-size:0.8rem;color:#0F0F2E;margin-bottom:5px;">${dayNames[wd.getDay()]} ${wd.getDate()}</div>
                ${cellContent}
            </div>`;
        }

        return `<!DOCTYPE html><html><head>${commonStyles}
        <style>
            .week-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
            @media (max-width: 500px) { .week-grid { grid-template-columns: repeat(2, 1fr); } }
        </style>
        </head><body>
            <div class="header-bar">
                <h1>Semaine ${sem || '?'} / 40</h1>
                <p style="font-family:'Fredoka One';color:#FFD700;">Vue hebdomadaire</p>
            </div>

            <div class="card">
                <h2>Apercu de la semaine</h2>
                <div class="week-grid">${weekDays}</div>
            </div>

            <div class="card">
                <h2>Objectifs de la semaine</h2>
                <div contenteditable="true" style="min-height:60px;border:1px dashed #ccc;border-radius:8px;padding:10px;">
                    <p style="color:#999;font-style:italic;">Definir vos objectifs...</p>
                </div>
            </div>

            <div class="separator"></div>
            <div style="text-align:center;" class="no-print">
                <button class="btn btn-print" onclick="printPage()">Imprimer</button>
            </div>
            ${scriptsCommon}
        </body></html>`;
    }

    function getPlanDeMatchContent(jourNum, dateStr) {
        const jour = scheduleData[jourNum];
        const sem = getSemaine40(dateStr);
        const parts = jour.content.split(' / ');

        return `<!DOCTYPE html><html><head>${commonStyles}
        <style>
            .plan-section { border-left: 4px solid; padding-left: 15px; margin: 15px 0; }
            .plan-section.s1 { border-color: #22c55e; }
            .plan-section.s2 { border-color: #3b82f6; }
            .plan-section.s3 { border-color: #a855f7; }
        </style>
        </head><body>
            <div class="header-bar">
                <h1>Plan de Match &mdash; ${jour.label}</h1>
                <p style="font-family:'Fredoka One';color:#FFD700;">Semaine ${sem || '?'} &mdash; ${dateStr}</p>
            </div>

            ${parts.map((p, i) => {
                const cls = i === 0 ? 's1' : i === 1 ? 's2' : 's3';
                const label = i === 0 ? 'Cycle 1' : i === 1 ? 'Cycle 2' : 'Cycle 3';
                const activity = p.split(' - ')[1] || p;
                return `<div class="plan-section ${cls}">
                    <h2>${label} &mdash; ${activity.trim()}</h2>
                    <div class="card">
                        <table>
                            <tr><th>Phase</th><th>Durée</th><th>Description</th></tr>
                            <tr><td>Échauffement</td><td>10 min</td><td contenteditable="true" style="border:1px dashed #ccc;border-radius:4px;padding:4px;">...</td></tr>
                            <tr><td>Activité principale</td><td>35 min</td><td contenteditable="true" style="border:1px dashed #ccc;border-radius:4px;padding:4px;">...</td></tr>
                            <tr><td>Retour au calme</td><td>10 min</td><td contenteditable="true" style="border:1px dashed #ccc;border-radius:4px;padding:4px;">...</td></tr>
                            <tr><td>Retour en classe</td><td>5 min</td><td contenteditable="true" style="border:1px dashed #ccc;border-radius:4px;padding:4px;">...</td></tr>
                        </table>
                    </div>
                    <div style="margin-top:8px;">
                        <strong>Matériel:</strong>
                        <span contenteditable="true" style="display:inline-block;border:1px dashed #ccc;border-radius:4px;padding:2px 8px;min-width:200px;">-</span>
                    </div>
                </div>`;
            }).join('')}

            <div class="card">
                <h2>Notes générales</h2>
                <div contenteditable="true" style="min-height:80px;border:1px dashed #ccc;border-radius:8px;padding:10px;">
                    <p style="color:#999;font-style:italic;">Notes, observations, ajustements...</p>
                </div>
            </div>

            <div class="separator"></div>
            <div style="text-align:center;" class="no-print">
                <button class="btn btn-print" onclick="printPage()">Imprimer</button>
            </div>
            ${scriptsCommon}
        </body></html>`;
    }

    // ==========================================
    // Preview Modal
    // ==========================================
    function openPlanifPreview(dateStr, jourNum) {
        const modal = document.getElementById('previewModal');
        const frame = document.getElementById('previewFrame');
        const title = document.getElementById('modalTitle');

        // Show tab-like buttons in title area
        title.innerHTML = `
            <div class="flex flex-wrap gap-2">
                <button onclick="loadPreview('jour', '${dateStr}', ${jourNum})" class="preview-tab bg-cyan-electric/20 text-cyan-electric px-3 py-1 rounded-full text-sm font-fredoka hover:bg-cyan-electric/30 transition" id="tabJour">
                    ${t('jour')} ${jourNum}
                </button>
                <button onclick="loadPreview('semaine', '${dateStr}', ${jourNum})" class="preview-tab bg-yellow-sun/20 text-yellow-sun px-3 py-1 rounded-full text-sm font-fredoka hover:bg-yellow-sun/30 transition" id="tabSemaine">
                    ${t('semaine')}
                </button>
                <button onclick="loadPreview('plan', '${dateStr}', ${jourNum})" class="preview-tab bg-pink-fuchsia/20 text-pink-fuchsia px-3 py-1 rounded-full text-sm font-fredoka hover:bg-pink-fuchsia/30 transition" id="tabPlan">
                    ${t('planMatch')}
                </button>
            </div>
        `;

        loadPreview('jour', dateStr, jourNum);
        modal.classList.remove('hidden');

        // Re-init Lucide
        if (window.lucide) lucide.createIcons();
    }

    function loadPreview(type, dateStr, jourNum) {
        const frame = document.getElementById('previewFrame');
        let content = '';

        if (type === 'jour') {
            content = getJour1HtmlContent(jourNum, dateStr);
        } else if (type === 'semaine') {
            content = getSemaine40HtmlContent(dateStr);
        } else if (type === 'plan') {
            content = getPlanDeMatchContent(jourNum, dateStr);
        }

        frame.srcdoc = content;

        // Highlight active tab
        document.querySelectorAll('.preview-tab').forEach(tab => {
            tab.classList.remove('ring-2', 'ring-white/30');
        });
        const activeMap = { jour: 'tabJour', semaine: 'tabSemaine', plan: 'tabPlan' };
        const active = document.getElementById(activeMap[type]);
        if (active) active.classList.add('ring-2', 'ring-white/30');
    }

    function closeModal(e) {
        if (e.target === e.currentTarget) {
            document.getElementById('previewModal').classList.add('hidden');
        }
    }

    // ==========================================
    // Init
    // ==========================================
    function init() {
        // Load saved language
        const savedLang = localStorage.getItem('zts-planif-lang');
        if (savedLang) currentLang = savedLang;

        // Set initial month to current
        const now = new Date();
        currentYear = now.getFullYear();
        currentMonth = now.getMonth();

        setLang(currentLang);
        populateMonthSelect();
        renderCalendar();

        // Lucide icons
        if (window.lucide) lucide.createIcons();

        // GSAP animations
        gsap.registerPlugin(ScrollTrigger);
        document.querySelectorAll('.fade-in').forEach(el => {
            gsap.to(el, {
                opacity: 1, y: 0, duration: 0.6,
                scrollTrigger: { trigger: el, start: 'top 90%' }
            });
        });
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            document.getElementById('previewModal').classList.add('hidden');
            closeNoteSection();
        }
        if (e.key === 'ArrowLeft' && !e.target.matches('input, textarea')) changeMonth(-1);
        if (e.key === 'ArrowRight' && !e.target.matches('input, textarea')) changeMonth(1);
    });

    // Custom event on Enter
    document.addEventListener('DOMContentLoaded', () => {
        const input = document.getElementById('customEventInput');
        if (input) {
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') addCustomEvent();
            });
        }
    });

    // Run init
    document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
