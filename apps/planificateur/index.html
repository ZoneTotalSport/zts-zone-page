<!DOCTYPE html>
<html lang="fr-CA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificateur Pedagogique — Zone Total Sport</title>
    <meta name="description" content="Planificateur pedagogique pour enseignants EPS au Quebec. Calendrier scolaire, cycles, planifications et notes.">
    <link rel="icon" type="image/png" href="/logo-zts.png">
    <link rel="apple-touch-icon" href="/logo-zts.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Schoolbell&family=Fredoka+One&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyan: { electric: '#00E5FF' },
                        yellow: { sun: '#FFD700' },
                        pink: { fuchsia: '#FF2A7A' },
                        violet: { pop: '#8B5CF6' },
                    },
                    fontFamily: {
                        bangers: ['"Luckiest Guy"', 'cursive'],
                        schoolbell: ['"Schoolbell"', 'cursive'],
                        fredoka: ['"Fredoka One"', 'cursive'],
                    },
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- SheetJS -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; overflow-x: hidden; }

        body {
            font-family: 'Schoolbell', cursive;
            font-size: 1.2rem;
            background-color: #1a1a2e;
            color: #fff;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('/gym-bg.jpg');
            background-size: cover;
            background-position: center;
            opacity: 1;
            z-index: 0;
            pointer-events: none;
        }
        body > * { position: relative; z-index: 1; }

        /* Calendar grid */
        .cal-grid {
            display: grid;
            grid-template-columns: 44px repeat(5, 1fr);
            gap: 3px;
        }
        @media (max-width: 640px) {
            .cal-grid { grid-template-columns: 28px repeat(5, 1fr); gap: 1px; }
        }

        .cal-cell {
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 2px solid rgba(0,0,0,0.08);
            padding: 4px;
            min-height: 110px;
            border-radius: 10px;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
            color: #1a1a2e;
        }
        @media (max-width: 640px) {
            .cal-cell { min-height: 80px; padding: 2px; border-radius: 6px; }
        }
        .cal-cell:hover { border-color: #00E5FF; background: rgba(255,255,255,0.92); box-shadow: 0 2px 12px rgba(0,229,255,0.18); }
        .cal-cell.other-month { opacity: 0.32; background: rgba(180,180,180,0.35); pointer-events: none; }
        .cal-cell.selected { border-color: #00E5FF; box-shadow: 0 0 16px rgba(0,229,255,0.45); background: rgba(255,255,255,0.97); }
        .cal-cell.today { border-color: #FFD700; box-shadow: 0 0 10px rgba(255,215,0,0.5); }

        .cal-cell .cell-input {
            display: block;
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px dashed rgba(0,0,0,0.18);
            font-family: 'Schoolbell', cursive;
            font-size: 0.72rem;
            color: #1a1a2e;
            outline: none;
            padding: 1px 2px;
            margin-bottom: 1px;
            transition: border-color 0.2s;
        }
        .cal-cell .cell-input:focus {
            border-bottom-color: #00E5FF;
            background: rgba(0,229,255,0.06);
        }
        .cal-cell .cell-input::placeholder {
            color: rgba(0,0,0,0.28);
            font-style: italic;
        }
        @media (max-width: 640px) {
            .cal-cell .cell-input { font-size: 0.6rem; }
        }

        .week-num {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fredoka One', cursive;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.35);
            border-radius: 6px;
            min-height: 110px;
        }
        @media (max-width: 640px) {
            .week-num { font-size: 0.6rem; min-height: 80px; }
        }

        .day-header {
            text-align: center;
            font-family: 'Fredoka One', cursive;
            font-size: 0.85rem;
            padding: 6px 2px;
            background: rgba(0,0,0,0.55);
            color: #fff;
            border-radius: 8px;
            backdrop-filter: blur(4px);
        }
        @media (max-width: 640px) {
            .day-header { font-size: 0.65rem; padding: 4px 1px; border-radius: 5px; }
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            font-family: 'Fredoka One', cursive;
            font-size: 0.55rem;
            padding: 1px 5px;
            border-radius: 999px;
            color: #fff;
            cursor: default;
            white-space: nowrap;
            margin: 1px;
            line-height: 1.4;
        }
        .badge .badge-x {
            cursor: pointer;
            margin-left: 2px;
            font-weight: bold;
            opacity: 0.7;
            font-size: 0.6rem;
        }
        .badge .badge-x:hover { opacity: 1; }

        .badge-ped { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .badge-conge { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .badge-tournoi { background: linear-gradient(135deg, #ec4899, #db2777); }
        .badge-photo { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .badge-sortie { background: linear-gradient(135deg, #10b981, #059669); }
        .badge-custom { background: linear-gradient(135deg, #6b7280, #4b5563); }

        .cycle-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 2px;
        }
        .cycle-dot.c1 { background: #22c55e; }
        .cycle-dot.c2 { background: #3b82f6; }
        .cycle-dot.c3 { background: #8b5cf6; }

        /* Detail panel */
        .detail-panel {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(0,229,255,0.2);
        }

        .btn-action {
            font-family: 'Fredoka One', cursive;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            color: #fff;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn-action:hover { transform: scale(1.05); }
        .btn-action:active { transform: scale(0.97); }

        .btn-cyan { background: linear-gradient(135deg, #00E5FF, #0097A7); }
        .btn-pink { background: linear-gradient(135deg, #FF2A7A, #C2185B); }
        .btn-yellow { background: linear-gradient(135deg, #FFD700, #F9A825); color: #1a1a2e; }
        .btn-green { background: linear-gradient(135deg, #22c55e, #16a34a); }
        .btn-violet { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .btn-gray { background: linear-gradient(135deg, #6b7280, #4b5563); }

        .detail-textarea {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 10px;
            color: #fff;
            font-family: 'Schoolbell', cursive;
            font-size: 1rem;
            resize: vertical;
            min-height: 80px;
            outline: none;
        }
        .detail-textarea:focus { border-color: #00E5FF; }
        .detail-textarea::placeholder { color: rgba(255,255,255,0.35); }

        /* Lang pills */
        .lang-pill {
            font-family: 'Fredoka One', cursive;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.75rem;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: #fff;
            transition: all 0.2s;
        }
        .lang-pill:hover { background: rgba(255,255,255,0.2); }
        .lang-pill.active { background: #00E5FF; color: #1a1a2e; border-color: #00E5FF; }

        /* Print styles */
        @media print {
            body::before { display: none; }
            body { background: #fff; color: #000; font-size: 10pt; }
            .no-print { display: none !important; }
            .cal-cell { background: #fff !important; border: 1px solid #ccc !important; color: #000 !important; min-height: 60px !important; }
            .cal-cell .cell-input { border-bottom: 1px solid #ddd; color: #000; }
            .day-header { background: #333 !important; color: #fff !important; }
            .week-num { background: #eee !important; color: #333 !important; }
            .detail-panel { background: #f5f5f5 !important; color: #000 !important; border: 1px solid #ccc !important; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.3); border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen">

    <!-- ==================== HEADER ==================== -->
    <header class="no-print sticky top-0 z-50 bg-black/60 backdrop-blur-lg border-b border-white/10">
        <div class="max-w-7xl mx-auto px-3 py-3 flex flex-wrap items-center justify-between gap-2">
            <!-- Logo -->
            <a href="/" class="text-cyan-electric font-bangers text-lg sm:text-xl hover:opacity-80 transition shrink-0">
                Zone Total Sport
            </a>
            <!-- Title -->
            <h1 class="font-bangers text-2xl sm:text-3xl md:text-4xl text-white text-center flex-1 tracking-wide" style="text-shadow: 2px 2px 6px rgba(0,0,0,0.6);">
                <span data-i18n="title">PLANIFICATEUR P&Eacute;DAGOGIQUE</span>
            </h1>
            <!-- Lang pills -->
            <div class="flex gap-1 shrink-0">
                <button class="lang-pill active" onclick="setLang('fr')">FR</button>
                <button class="lang-pill" onclick="setLang('en')">EN</button>
                <button class="lang-pill" onclick="setLang('es')">ES</button>
                <button class="lang-pill" onclick="setLang('zh')">ZH</button>
            </div>
        </div>
    </header>

    <!-- ==================== CONTROLS ==================== -->
    <div class="no-print max-w-7xl mx-auto px-3 py-3 flex flex-wrap items-center justify-center gap-2">
        <button onclick="prevMonth()" class="btn-action btn-cyan" aria-label="Previous month">
            <i data-lucide="chevron-left" class="w-5 h-5"></i>
        </button>
        <select id="monthSelect" onchange="jumpToMonth(this.value)" class="bg-black/50 text-white border border-white/20 rounded-full px-3 py-1.5 font-fredoka text-sm outline-none cursor-pointer">
        </select>
        <button onclick="nextMonth()" class="btn-action btn-cyan" aria-label="Next month">
            <i data-lucide="chevron-right" class="w-5 h-5"></i>
        </button>
        <button onclick="goToday()" class="btn-action btn-yellow text-sm">
            <i data-lucide="calendar" class="w-4 h-4"></i>
            <span data-i18n="today">Aujourd'hui</span>
        </button>
    </div>

    <!-- ==================== MONTH TITLE ==================== -->
    <div class="max-w-7xl mx-auto px-3 pb-2 text-center">
        <h2 id="monthTitle" class="font-bangers text-4xl sm:text-5xl md:text-6xl text-white drop-shadow-lg" style="text-shadow: 3px 3px 8px rgba(0,0,0,0.7);"></h2>
    </div>

    <!-- ==================== CALENDAR ==================== -->
    <div class="max-w-7xl mx-auto px-2 sm:px-3 pb-4">
        <div id="calendarGrid" class="cal-grid"></div>
    </div>

    <!-- ==================== DETAIL PANEL ==================== -->
    <div id="detailPanel" class="hidden max-w-7xl mx-auto px-3 pb-6">
        <div class="detail-panel p-4 sm:p-6">
            <!-- Date title -->
            <h3 id="detailDate" class="font-bangers text-2xl sm:text-3xl text-cyan-electric mb-4"></h3>

            <!-- Quick-add badges -->
            <div class="flex flex-wrap gap-2 mb-4">
                <button onclick="addTag('ped')" class="btn-action btn-yellow text-xs">
                    <span>&#x1F4DA;</span> <span data-i18n="pedagogical">P&eacute;dagogique</span>
                </button>
                <button onclick="addTag('conge')" class="btn-action btn-cyan text-xs">
                    <span>&#x1F3D6;&#xFE0F;</span> <span data-i18n="holiday">Cong&eacute;</span>
                </button>
                <button onclick="addTag('tournoi')" class="btn-action btn-pink text-xs">
                    <span>&#x1F3C6;</span> <span data-i18n="tournament">Tournoi</span>
                </button>
                <button onclick="addTag('photo')" class="btn-action btn-violet text-xs">
                    <span>&#x1F4F8;</span> <span data-i18n="photo">Photo</span>
                </button>
                <button onclick="addTag('sortie')" class="btn-action btn-green text-xs">
                    <span>&#x1F68C;</span> <span data-i18n="outing">Sortie</span>
                </button>
                <button onclick="showCustomTagInput()" class="btn-action btn-gray text-xs" id="btnCustomTag">
                    <span>&#x2795;</span> <span data-i18n="custom">Personnalis&eacute;</span>
                </button>
            </div>

            <!-- Custom tag input (hidden by default) -->
            <div id="customTagRow" class="hidden flex gap-2 mb-4 items-center">
                <input id="customTagInput" type="text" placeholder="Nom du badge..." class="bg-white/10 border border-white/20 rounded-full px-3 py-1 text-white font-schoolbell text-sm outline-none flex-1 max-w-xs" onkeydown="if(event.key==='Enter')addCustomTag()">
                <button onclick="addCustomTag()" class="btn-action btn-cyan text-xs" data-i18n="add">Ajouter</button>
                <button onclick="hideCustomTagInput()" class="btn-action btn-gray text-xs">X</button>
            </div>

            <!-- Current tags -->
            <div id="detailTags" class="flex flex-wrap gap-1 mb-4"></div>

            <!-- Notes -->
            <div class="mb-3">
                <label class="font-fredoka text-sm text-white/70 mb-1 block"><span data-i18n="detailedNotes">Notes d&eacute;taill&eacute;es</span></label>
                <textarea id="detailNotes" class="detail-textarea" rows="4" data-placeholder-i18n="notesPlaceholder" placeholder="Notes pour cette journ&eacute;e..."></textarea>
            </div>

            <!-- Weekend notes (shown conditionally) -->
            <div id="weekendNotesWrap" class="hidden mb-3">
                <label class="font-fredoka text-sm text-white/70 mb-1 block"><span data-i18n="weekendNotes">Notes fin de semaine</span></label>
                <textarea id="weekendNotes" class="detail-textarea" rows="3" data-placeholder-i18n="weekendPlaceholder" placeholder="Notes pour la fin de semaine..."></textarea>
            </div>

            <!-- Action buttons -->
            <div class="flex flex-wrap gap-2 mt-4">
                <button onclick="saveAll()" class="btn-action btn-green text-sm">
                    <span>&#x1F4BE;</span> <span data-i18n="save">Sauvegarder</span>
                </button>
                <button onclick="printCal()" class="btn-action btn-gray text-sm">
                    <span>&#x1F5A8;&#xFE0F;</span> <span data-i18n="print">Imprimer</span>
                </button>
                <button onclick="exportPDF()" class="btn-action btn-pink text-sm">
                    <span>&#x1F4C4;</span> PDF
                </button>
                <button onclick="exportXLS()" class="btn-action btn-cyan text-sm">
                    <span>&#x1F4CA;</span> Excel
                </button>
                <button onclick="exportCSV()" class="btn-action btn-violet text-sm">
                    <span>&#x1F4CB;</span> CSV
                </button>
            </div>
        </div>
    </div>

    <!-- ==================== GLOBAL EXPORT BAR ==================== -->
    <div class="no-print max-w-7xl mx-auto px-3 pb-8">
        <div class="bg-black/50 backdrop-blur-md rounded-2xl p-4 flex flex-wrap items-center justify-center gap-3 border border-white/10">
            <span class="font-fredoka text-white/70 text-sm" data-i18n="exportMonth">Exporter le mois complet :</span>
            <button onclick="exportMonthPDF()" class="btn-action btn-pink text-sm">
                <span>&#x1F4C4;</span> PDF
            </button>
            <button onclick="exportMonthXLS()" class="btn-action btn-cyan text-sm">
                <span>&#x1F4CA;</span> Excel
            </button>
            <button onclick="exportMonthCSV()" class="btn-action btn-violet text-sm">
                <span>&#x1F4CB;</span> CSV
            </button>
        </div>
    </div>

                tagNames: { ped: '\u6559\u5B66', conge: '\u5047\u671F', tournoi: '\u6BD4\u8D5B', photo: '\u7167\u7247', sortie: '\u90CA\u6E38' }
            }
        };

        // ===== State =====
        const STORAGE_KEY = 'zts-planificateur';
        let currentLang = 'fr';
        let currentYear = 2025;
        let currentMonth = 7; // 0-indexed: 7 = August
        let selectedDate = null;
        let data = { lang: 'fr', cells: {} };

        // ===== Init =====
        function init() {
            loadData();
            currentLang = data.lang || 'fr';
            // Start at current month
            const now = new Date();
            currentYear = now.getFullYear();
            currentMonth = now.getMonth();
            // Clamp to school year range (Aug prev year - June next year)
            buildMonthSelect();
            renderCalendar();
            updateLangUI();
            lucide.createIcons();
        }

        // ===== localStorage =====
        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) data = JSON.parse(raw);
            } catch(e) {
                data = { lang: 'fr', cells: {} };
            }
            if (!data.cells) data.cells = {};
        }

        function saveData() {
            data.lang = currentLang;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function getCellData(dateStr) {
            if (!data.cells[dateStr]) {
                data.cells[dateStr] = { jour: '', periodes: '', groupes: '', planif: '', tags: [], notes: '', weekend: '' };
            }
            return data.cells[dateStr];
        }

        // ===== Language =====
        window.setLang = function(lang) {
            currentLang = lang;
            data.lang = lang;
            saveData();
            updateLangUI();
            buildMonthSelect();
            renderCalendar();
            if (selectedDate) renderDetail();
        };

        function t(key) {
            return (I18N[currentLang] && I18N[currentLang][key]) || (I18N.fr[key]) || key;
        }

        function updateLangUI() {
            // Update lang pills
            document.querySelectorAll('.lang-pill').forEach(function(btn) {
                btn.classList.toggle('active', btn.textContent.trim().toLowerCase() === currentLang);
            });
            // Update data-i18n elements
            document.querySelectorAll('[data-i18n]').forEach(function(el) {
                const key = el.getAttribute('data-i18n');
                if (I18N[currentLang] && I18N[currentLang][key] !== undefined) {
                    el.textContent = I18N[currentLang][key];
                }
            });
            // Update placeholders
            document.querySelectorAll('[data-placeholder-i18n]').forEach(function(el) {
                const key = el.getAttribute('data-placeholder-i18n');
                if (I18N[currentLang] && I18N[currentLang][key]) {
                    el.placeholder = I18N[currentLang][key];
                }
            });
        }

        // ===== Month navigation =====
        function buildMonthSelect() {
            const sel = document.getElementById('monthSelect');
            sel.innerHTML = '';
            // School year: August 2025 to June 2026
            const ranges = [
                [2025, 7], [2025, 8], [2025, 9], [2025, 10], [2025, 11],
                [2026, 0], [2026, 1], [2026, 2], [2026, 3], [2026, 4], [2026, 5]
            ];
            const months = t('months');
            ranges.forEach(function(r) {
                const opt = document.createElement('option');
                opt.value = r[0] + '-' + r[1];
                const mName = (typeof months === 'object' && months[r[1]]) ? months[r[1]] : (I18N.fr.months[r[1]]);
                opt.textContent = mName + ' ' + r[0];
                if (r[0] === currentYear && r[1] === currentMonth) opt.selected = true;
                sel.appendChild(opt);
            });
        }

        window.jumpToMonth = function(val) {
            const parts = val.split('-');
            currentYear = parseInt(parts[0]);
            currentMonth = parseInt(parts[1]);
            renderCalendar();
        };

        window.prevMonth = function() {
            currentMonth--;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            document.getElementById('monthSelect').value = currentYear + '-' + currentMonth;
            renderCalendar();
        };

        window.nextMonth = function() {
            currentMonth++;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            document.getElementById('monthSelect').value = currentYear + '-' + currentMonth;
            renderCalendar();
        };

        window.goToday = function() {
            const now = new Date();
            currentYear = now.getFullYear();
            currentMonth = now.getMonth();
            document.getElementById('monthSelect').value = currentYear + '-' + currentMonth;
            renderCalendar();
        };

        // ===== Calendar rendering =====
        function getWeekNumber(d) {
            var date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
            var yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
            return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
        }

        function formatDateStr(y, m, d) {
            return y + '-' + String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            // Month title
            const monthNames = I18N[currentLang] ? I18N[currentLang].months : I18N.fr.months;
            document.getElementById('monthTitle').textContent = monthNames[currentMonth] + ' ' + currentYear;

            // Day headers: week col + 5 days
            const dayNames = t('days');
            // Week header
            var wh = document.createElement('div');
            wh.className = 'day-header';
            wh.textContent = t('week');
            grid.appendChild(wh);
            for (var di = 0; di < 5; di++) {
                var dh = document.createElement('div');
                dh.className = 'day-header';
                dh.textContent = (typeof dayNames === 'object') ? dayNames[di] : dayNames;
                grid.appendChild(dh);
            }

            // Find first day of month
            var firstDay = new Date(currentYear, currentMonth, 1);
            var lastDay = new Date(currentYear, currentMonth + 1, 0);
            var daysInMonth = lastDay.getDate();

            // Day of week (0=Sun, 1=Mon, ...). We want Mon=0
            var startDow = firstDay.getDay(); // 0=Sun
            startDow = (startDow === 0) ? 6 : startDow - 1; // Convert: Mon=0, Tue=1, ..., Sun=6

            // We only show Mon-Fri, so startDow capped to 0-4
            // Fill weeks
            var today = new Date();
            var todayStr = formatDateStr(today.getFullYear(), today.getMonth(), today.getDate());

            // Calculate prev month days for padding
            var prevMonthLast = new Date(currentYear, currentMonth, 0).getDate();

            // Build array of weeks
            var weeks = [];
            var dayNum = 1;
            var prevDayNum = prevMonthLast - startDow + 1; // If startDow > 4, we handle
            var nextDayNum = 1;
            var done = false;

            // We need rows. Start from the Monday of the week containing day 1
            // If startDow > 4 (Sat or Sun), first weekday is next Monday
            var actualStart = 1;
            if (startDow > 4) {
                // Month starts on Sat(5) or Sun(6), first Mon is day (8 - startDow)
                actualStart = 8 - startDow;
                startDow = 0;
            }

            // Build week rows
            dayNum = actualStart - startDow; // Could be negative for prev month days

            while (!done) {
                var week = [];
                for (var wd = 0; wd < 5; wd++) { // Mon-Fri only
                    if (dayNum < 1) {
                        // Previous month
                        week.push({ day: prevMonthLast + dayNum, inMonth: false, dateStr: null });
                    } else if (dayNum > daysInMonth) {
                        // Next month
                        week.push({ day: nextDayNum, inMonth: false, dateStr: null });
                        nextDayNum++;
                    } else {
                        var ds = formatDateStr(currentYear, currentMonth, dayNum);
                        week.push({ day: dayNum, inMonth: true, dateStr: ds });
                    }
                    dayNum++;
                }
                weeks.push(week);
                // Skip weekend
                dayNum += 2;
                if (dayNum > daysInMonth + 7) done = true;
                if (weeks.length >= 6) done = true;
                // Check if all in-month days are accounted for
                var hasInMonth = false;
                for (var c = 0; c < week.length; c++) {
                    if (week[c].inMonth) hasInMonth = true;
                }
                if (!hasInMonth && dayNum > daysInMonth) done = true;
            }

            // Remove trailing weeks that are all out-of-month
            while (weeks.length > 0) {
                var lastWeek = weeks[weeks.length - 1];
                var anyIn = false;
                for (var j = 0; j < lastWeek.length; j++) {
                    if (lastWeek[j].inMonth) anyIn = true;
                }
                if (!anyIn) weeks.pop();
                else break;
            }

            // Render weeks
            for (var wi = 0; wi < weeks.length; wi++) {
                var weekRow = weeks[wi];
                // Find a valid in-month date for week number
                var weekDate = null;
                for (var k = 0; k < weekRow.length; k++) {
                    if (weekRow[k].inMonth) {
                        weekDate = new Date(currentYear, currentMonth, weekRow[k].day);
                        break;
                    }
                }
                // Week number cell
                var wnCell = document.createElement('div');
                wnCell.className = 'week-num';
                wnCell.textContent = weekDate ? getWeekNumber(weekDate) : '';
                grid.appendChild(wnCell);

                // Day cells
                for (var ci = 0; ci < 5; ci++) {
                    var info = weekRow[ci];
                    var cell = document.createElement('div');
                    cell.className = 'cal-cell';

                    if (!info.inMonth) {
                        cell.classList.add('other-month');
                        cell.innerHTML = '<div class="font-bold text-xs opacity-50">' + info.day + '</div>';
                        grid.appendChild(cell);
                        continue;
                    }

                    var ds = info.dateStr;
                    var cellData = getCellData(ds);

                    // Today highlight
                    if (ds === todayStr) cell.classList.add('today');
                    // Selected highlight
                    if (ds === selectedDate) cell.classList.add('selected');

                    // Build cell content
                    var html = '';
                    // Day number + cycle dots
                    html += '<div class="flex items-center justify-between mb-0.5">';
                    html += '<span class="font-bold text-sm leading-none">' + info.day + '</span>';
                    html += '<span class="cycle-dots" data-date="' + ds + '"></span>';
                    html += '</div>';

                    // Jour input
                    html += '<input type="text" class="cell-input" data-field="jour" data-date="' + ds + '" value="' + escHtml(cellData.jour) + '" placeholder="' + t('day') + ' #">';
                    // Periodes input
                    html += '<input type="text" class="cell-input" data-field="periodes" data-date="' + ds + '" value="' + escHtml(cellData.periodes) + '" placeholder="' + t('periods') + '">';
                    // Groupes input
                    html += '<input type="text" class="cell-input" data-field="groupes" data-date="' + ds + '" value="' + escHtml(cellData.groupes) + '" placeholder="' + t('groups') + '">';
                    // Planif input
                    html += '<input type="text" class="cell-input" data-field="planif" data-date="' + ds + '" value="' + escHtml(cellData.planif) + '" placeholder="' + t('plan') + '">';

                    // Tags / badges
                    html += '<div class="tags-container flex flex-wrap gap-0.5 mt-0.5" data-date="' + ds + '">';
                    if (cellData.tags && cellData.tags.length > 0) {
                        cellData.tags.forEach(function(tag, idx) {
                            html += renderBadgeHtml(tag, ds, idx);
                        });
                    }
                    html += '</div>';

                    cell.innerHTML = html;

                    // Click handler on cell (select day)
                    cell.addEventListener('click', (function(dateStr) {
                        return function(e) {
                            // Don't select if clicking inside an input
                            if (e.target.tagName === 'INPUT' || e.target.classList.contains('badge-x')) return;
                            selectDay(dateStr);
                        };
                    })(ds));

                    grid.appendChild(cell);
                }
            }

            // Bind input events
            grid.querySelectorAll('.cell-input').forEach(function(inp) {
                inp.addEventListener('input', function(e) {
                    var dateStr = this.getAttribute('data-date');
                    var field = this.getAttribute('data-field');
                    var cd = getCellData(dateStr);
                    cd[field] = this.value;
                    saveData();
                    // Update cycle dots if groupes changed
                    if (field === 'groupes') {
                        updateCycleDots(dateStr, this.value);
                    }
                });
                inp.addEventListener('click', function(e) {
                    e.stopPropagation();
                });
                inp.addEventListener('focus', function(e) {
                    e.stopPropagation();
                });
            });

            // Render cycle dots
            grid.querySelectorAll('.cycle-dots').forEach(function(span) {
                var dateStr = span.getAttribute('data-date');
                var cd = getCellData(dateStr);
                updateCycleDots(dateStr, cd.groupes);
            });

            // Re-init lucide
            lucide.createIcons();
        }

        function updateCycleDots(dateStr, groupes) {
            var span = document.querySelector('.cycle-dots[data-date="' + dateStr + '"]');
            if (!span) return;
            var html = '';
            var g = (groupes || '').toLowerCase();
            if (g.indexOf('cycle 1') !== -1 || g.indexOf('c1') !== -1) html += '<span class="cycle-dot c1"></span>';
            if (g.indexOf('cycle 2') !== -1 || g.indexOf('c2') !== -1) html += '<span class="cycle-dot c2"></span>';
            if (g.indexOf('cycle 3') !== -1 || g.indexOf('c3') !== -1) html += '<span class="cycle-dot c3"></span>';
            span.innerHTML = html;
        }

        function escHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function renderBadgeHtml(tag, dateStr, idx) {
            var cls = 'badge-custom';
            var label = tag;
            var knownTags = { ped: 'badge-ped', conge: 'badge-conge', tournoi: 'badge-tournoi', photo: 'badge-photo', sortie: 'badge-sortie' };
            var tagKey = tag.toLowerCase().replace(/[^a-z]/g, '');
            // Check known tags by key
            var tagNames = I18N[currentLang] ? I18N[currentLang].tagNames : I18N.fr.tagNames;
            for (var k in knownTags) {
                if (tagKey === k || tag === tagNames[k]) {
                    cls = knownTags[k];
                    label = tagNames[k];
                    break;
                }
            }
            return '<span class="badge ' + cls + '">' + escHtml(label) + '<span class="badge-x" onclick="event.stopPropagation(); removeTag(\'' + dateStr + '\',' + idx + ')">x</span></span>';
        }

        // ===== Day selection =====
        function selectDay(dateStr) {
            selectedDate = dateStr;
            // Update selected class
            document.querySelectorAll('.cal-cell.selected').forEach(function(c) { c.classList.remove('selected'); });
            // Find the cell
            document.querySelectorAll('.cell-input[data-date="' + dateStr + '"]').forEach(function(inp) {
                inp.closest('.cal-cell').classList.add('selected');
            });
            renderDetail();
            // Scroll to detail
            document.getElementById('detailPanel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function renderDetail() {
            if (!selectedDate) return;
            var panel = document.getElementById('detailPanel');
            panel.classList.remove('hidden');

            var d = new Date(selectedDate + 'T12:00:00');
            var dayNames = I18N[currentLang] ? I18N[currentLang].daysFull : I18N.fr.daysFull;
            var monthNames = I18N[currentLang] ? I18N[currentLang].months : I18N.fr.months;
            var dow = d.getDay(); // 0=Sun
            var dowIdx = (dow === 0) ? 6 : dow - 1;
            var dayName = (dowIdx >= 0 && dowIdx < 5) ? dayNames[dowIdx] : '';
            document.getElementById('detailDate').textContent = dayName + ' ' + d.getDate() + ' ' + monthNames[d.getMonth()] + ' ' + d.getFullYear();

            var cd = getCellData(selectedDate);

            // Tags
            var tagsHtml = '';
            if (cd.tags && cd.tags.length > 0) {
                cd.tags.forEach(function(tag, idx) {
                    tagsHtml += renderBadgeHtml(tag, selectedDate, idx);
                });
            }
            document.getElementById('detailTags').innerHTML = tagsHtml;

            // Notes
            document.getElementById('detailNotes').value = cd.notes || '';

            // Weekend notes (show if Friday, dow=5)
            var isFriday = (dow === 5);
            var weekendWrap = document.getElementById('weekendNotesWrap');
            if (isFriday) {
                weekendWrap.classList.remove('hidden');
                document.getElementById('weekendNotes').value = cd.weekend || '';
            } else {
                weekendWrap.classList.add('hidden');
            }

            // Bind note saving
            document.getElementById('detailNotes').oninput = function() {
                cd.notes = this.value;
                saveData();
            };
            document.getElementById('weekendNotes').oninput = function() {
                cd.weekend = this.value;
                saveData();
            };

            hideCustomTagInput();
        }

        // ===== Tags =====
        window.addTag = function(type) {
            if (!selectedDate) return;
            var cd = getCellData(selectedDate);
            if (!cd.tags) cd.tags = [];
            var tagNames = I18N[currentLang] ? I18N[currentLang].tagNames : I18N.fr.tagNames;
            var label = tagNames[type] || type;
            cd.tags.push(label);
            saveData();
            renderCalendar();
            renderDetail();
        };

        window.removeTag = function(dateStr, idx) {
            var cd = getCellData(dateStr);
            if (cd.tags && cd.tags.length > idx) {
                cd.tags.splice(idx, 1);
                saveData();
                renderCalendar();
                if (selectedDate === dateStr) renderDetail();
            }
        };

        window.showCustomTagInput = function() {
            document.getElementById('customTagRow').classList.remove('hidden');
            document.getElementById('customTagInput').focus();
        };

        window.hideCustomTagInput = function() {
            document.getElementById('customTagRow').classList.add('hidden');
            document.getElementById('customTagInput').value = '';
        };

        window.addCustomTag = function() {
            var input = document.getElementById('customTagInput');
            var val = input.value.trim();
            if (!val || !selectedDate) return;
            var cd = getCellData(selectedDate);
            if (!cd.tags) cd.tags = [];
            cd.tags.push(val);
            saveData();
            input.value = '';
            renderCalendar();
            renderDetail();
        };

        // ===== Save =====
        window.saveAll = function() {
            saveData();
            // Flash feedback
            var btn = event.target.closest('.btn-action');
            if (btn) {
                var original = btn.innerHTML;
                btn.innerHTML = '<span>&#x2705;</span> ' + t('saved');
                setTimeout(function() { btn.innerHTML = original; }, 1500);
            }
        };

        // ===== Print =====
        window.printCal = function() {
            window.print();
        };

        // ===== PDF Export (single day) =====
        window.exportPDF = function() {
            if (!selectedDate) return;
            var jsPDF = window.jspdf.jsPDF;
            var doc = new jsPDF();
            var cd = getCellData(selectedDate);
            var d = new Date(selectedDate + 'T12:00:00');
            var monthNames = I18N[currentLang] ? I18N[currentLang].months : I18N.fr.months;

            doc.setFontSize(20);
            doc.text(t('title'), 105, 20, { align: 'center' });
            doc.setFontSize(14);
            doc.text(d.getDate() + ' ' + monthNames[d.getMonth()] + ' ' + d.getFullYear(), 105, 32, { align: 'center' });

            var y = 45;
            doc.setFontSize(11);
            doc.text(t('day') + ': ' + (cd.jour || '-'), 20, y); y += 8;
            doc.text(t('periods') + ': ' + (cd.periodes || '-'), 20, y); y += 8;
            doc.text(t('groups') + ': ' + (cd.groupes || '-'), 20, y); y += 8;
            doc.text(t('plan') + ': ' + (cd.planif || '-'), 20, y); y += 8;

            if (cd.tags && cd.tags.length > 0) {
                doc.text('Tags: ' + cd.tags.join(', '), 20, y); y += 8;
            }

            if (cd.notes) {
                doc.text(t('detailedNotes') + ':', 20, y); y += 6;
                var lines = doc.splitTextToSize(cd.notes, 170);
                doc.setFontSize(10);
                doc.text(lines, 20, y);
                y += lines.length * 5;
            }

            if (cd.weekend) {
                y += 4;
                doc.setFontSize(11);
                doc.text(t('weekendNotes') + ':', 20, y); y += 6;
                var wlines = doc.splitTextToSize(cd.weekend, 170);
                doc.setFontSize(10);
                doc.text(wlines, 20, y);
            }

            doc.save('planificateur-' + selectedDate + '.pdf');
        };

        // ===== XLS Export (single day) =====
        window.exportXLS = function() {
            if (!selectedDate) return;
            var cd = getCellData(selectedDate);
            var ws_data = [
                [t('day'), t('periods'), t('groups'), t('plan'), 'Tags', t('detailedNotes'), t('weekendNotes')],
                [cd.jour || '', cd.periodes || '', cd.groupes || '', cd.planif || '', (cd.tags || []).join(', '), cd.notes || '', cd.weekend || '']
            ];
            var wb = XLSX.utils.book_new();
            var ws = XLSX.utils.aoa_to_sheet(ws_data);
            XLSX.utils.book_append_sheet(wb, ws, selectedDate);
            XLSX.writeFile(wb, 'planificateur-' + selectedDate + '.xlsx');
        };

        // ===== CSV Export (single day) =====
        window.exportCSV = function() {
            if (!selectedDate) return;
            var cd = getCellData(selectedDate);
            var header = [t('day'), t('periods'), t('groups'), t('plan'), 'Tags', t('detailedNotes'), t('weekendNotes')];
            var row = [cd.jour || '', cd.periodes || '', cd.groupes || '', cd.planif || '', (cd.tags || []).join('; '), cd.notes || '', cd.weekend || ''];
            var csv = header.map(csvEsc).join(',') + '\n' + row.map(csvEsc).join(',') + '\n';
            downloadFile('planificateur-' + selectedDate + '.csv', csv, 'text/csv');
        };

        // ===== Month export: PDF =====
        window.exportMonthPDF = function() {
            var jsPDF = window.jspdf.jsPDF;
            var doc = new jsPDF('landscape');
            var monthNames = I18N[currentLang] ? I18N[currentLang].months : I18N.fr.months;
            var dayNames = I18N[currentLang] ? I18N[currentLang].daysFull : I18N.fr.daysFull;

            doc.setFontSize(18);
            doc.text(t('title') + ' - ' + monthNames[currentMonth] + ' ' + currentYear, 148, 15, { align: 'center' });

            // Table header
            var headers = ['Date', t('day'), t('periods'), t('groups'), t('plan'), 'Tags', t('detailedNotes')];
            var colWidths = [30, 20, 22, 35, 40, 45, 80];
            var x = 5;
            var y = 28;

            doc.setFontSize(9);
            doc.setFillColor(0, 100, 120);
            doc.setTextColor(255, 255, 255);
            for (var h = 0; h < headers.length; h++) {
                doc.rect(x, y - 5, colWidths[h], 8, 'F');
                doc.text(headers[h], x + 2, y);
                x += colWidths[h];
            }
            doc.setTextColor(0, 0, 0);
            y += 6;

            var daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            doc.setFontSize(8);
            for (var d = 1; d <= daysInMonth; d++) {
                var dateObj = new Date(currentYear, currentMonth, d);
                var dow = dateObj.getDay();
                if (dow === 0 || dow === 6) continue; // Skip weekends

                var ds = formatDateStr(currentYear, currentMonth, d);
                var cd = getCellData(ds);
                var dowIdx = dow - 1;
                var dayLabel = (dayNames[dowIdx] || '') + ' ' + d;

                if (y > 190) {
                    doc.addPage();
                    y = 20;
                }

                x = 5;
                var rowData = [dayLabel, cd.jour || '', cd.periodes || '', cd.groupes || '', cd.planif || '', (cd.tags || []).join(', '), (cd.notes || '').substring(0, 60)];
                for (var c = 0; c < rowData.length; c++) {
                    doc.text(String(rowData[c]).substring(0, Math.floor(colWidths[c] / 2)), x + 2, y);
                    x += colWidths[c];
                }
                y += 6;
            }

            doc.save('planificateur-' + monthNames[currentMonth] + '-' + currentYear + '.pdf');
        };

        // ===== Month export: XLS =====
        window.exportMonthXLS = function() {
            var monthNames = I18N[currentLang] ? I18N[currentLang].months : I18N.fr.months;
            var dayNames = I18N[currentLang] ? I18N[currentLang].daysFull : I18N.fr.daysFull;

            var headers = ['Date', t('day'), t('periods'), t('groups'), t('plan'), 'Tags', t('detailedNotes'), t('weekendNotes')];
            var rows = [headers];
            var daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            for (var d = 1; d <= daysInMonth; d++) {
                var dateObj = new Date(currentYear, currentMonth, d);
                var dow = dateObj.getDay();
                if (dow === 0 || dow === 6) continue;

                var ds = formatDateStr(currentYear, currentMonth, d);
                var cd = getCellData(ds);
                var dowIdx = dow - 1;
                var dayLabel = (dayNames[dowIdx] || '') + ' ' + d + ' ' + monthNames[currentMonth];

                rows.push([
                    dayLabel,
                    cd.jour || '',
                    cd.periodes || '',
                    cd.groupes || '',
                    cd.planif || '',
                    (cd.tags || []).join(', '),
                    cd.notes || '',
                    cd.weekend || ''
                ]);
            }

            var wb = XLSX.utils.book_new();
            var ws = XLSX.utils.aoa_to_sheet(rows);
            // Set column widths
            ws['!cols'] = [{ wch: 25 }, { wch: 10 }, { wch: 12 }, { wch: 20 }, { wch: 20 }, { wch: 25 }, { wch: 40 }, { wch: 30 }];
            XLSX.utils.book_append_sheet(wb, ws, monthNames[currentMonth] + ' ' + currentYear);
            XLSX.writeFile(wb, 'planificateur-' + monthNames[currentMonth] + '-' + currentYear + '.xlsx');
        };

        // ===== Month export: CSV =====
        window.exportMonthCSV = function() {
            var monthNames = I18N[currentLang] ? I18N[currentLang].months : I18N.fr.months;
            var dayNames = I18N[currentLang] ? I18N[currentLang].daysFull : I18N.fr.daysFull;

            var headers = ['Date', t('day'), t('periods'), t('groups'), t('plan'), 'Tags', t('detailedNotes'), t('weekendNotes')];
            var csv = headers.map(csvEsc).join(',') + '\n';
            var daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            for (var d = 1; d <= daysInMonth; d++) {
                var dateObj = new Date(currentYear, currentMonth, d);
                var dow = dateObj.getDay();
                if (dow === 0 || dow === 6) continue;

                var ds = formatDateStr(currentYear, currentMonth, d);
                var cd = getCellData(ds);
                var dowIdx = dow - 1;
                var dayLabel = (dayNames[dowIdx] || '') + ' ' + d + ' ' + monthNames[currentMonth];

                var row = [dayLabel, cd.jour || '', cd.periodes || '', cd.groupes || '', cd.planif || '', (cd.tags || []).join('; '), cd.notes || '', cd.weekend || ''];
                csv += row.map(csvEsc).join(',') + '\n';
            }

            downloadFile('planificateur-' + monthNames[currentMonth] + '-' + currentYear + '.csv', csv, 'text/csv');
        };

        // ===== Helpers =====
        function csvEsc(val) {
            var s = String(val);
            if (s.indexOf(',') !== -1 || s.indexOf('"') !== -1 || s.indexOf('\n') !== -1) {
                return '"' + s.replace(/"/g, '""') + '"';
            }
            return s;
        }

        function downloadFile(name, content, type) {
            var blob = new Blob(['\uFEFF' + content], { type: type + ';charset=utf-8;' });
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = name;
            link.click();
            URL.revokeObjectURL(link.href);
        }

        // ===== Boot =====
        document.addEventListener('DOMContentLoaded', init);

    })();
    </script>
</body>
