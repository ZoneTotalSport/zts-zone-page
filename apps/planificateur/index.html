<!DOCTYPE html>
<html lang="fr-CA">
<head>

<meta name="description" content="Planificateur pedagogique pour enseignants EPS au Quebec. Calendrier scolaire, cycles, planifications et notes.">
<link rel="icon" type="image/png" href="/logo-zts.png">
<link rel="apple-touch-icon" href="/logo-zts.png">

tailwind.config={theme:{extend:{colors:{cyan:{electric:'#00E5FF'},yellow:{sun:'#FFD700'},pink:{fuchsia:'#FF2A7A'},violet:{pop:'#8B5CF6'}},fontFamily:{bangers:['"Luckiest Guy"','cursive'],schoolbell:['"Schoolbell"','cursive'],fredoka:['"Fredoka One"','cursive']}}}};

<style>
body{margin:0;font-family:'Schoolbell',cursive;font-size:1.2rem;min-height:100vh}
.bg-gym{position:fixed;inset:0;z-index:-1;background:url('/gym-bg.jpg') center/cover no-repeat}
.cell-glass{background:rgba(15,15,50,0.8);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);color:#fff}
.detail-glass{background:rgba(255,255,255,0.88);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.cell-conge{background:rgba(0,180,255,0.6)!important}
.cell-ped{background:rgba(255,215,0,0.5)!important;color:#333!important}
.cell-ped .cell-input{color:#333!important}
.cell-tournoi{background:rgba(255,42,122,0.5)!important}
.cell-input{background:transparent;border:none;border-bottom:1px dashed rgba(255,255,255,0.3);font-family:'Schoolbell',cursive;font-size:0.85rem;width:100%;outline:none;padding:1px 2px;color:rgba(255,255,255,0.9)}
.cell-input:focus{border-bottom-color:#00E5FF}
.cell-input::placeholder{color:rgba(255,255,255,0.4);font-style:italic}
.header-gradient{background:linear-gradient(135deg,#00E5FF,#00B8D4)}
.lang-pill{font-family:'Fredoka One',cursive;padding:2px 10px;border-radius:9999px;cursor:pointer;font-size:.85rem;background:rgba(255,255,255,0.35);color:#fff;transition:all .2s}
.lang-pill.active{background:#fff;color:#00B8D4}
.btn-pill{font-family:'Fredoka One',cursive;border-radius:9999px;padding:6px 18px;font-size:.9rem;cursor:pointer;transition:all .15s;border:none}
.btn-cyan{background:linear-gradient(135deg,#00E5FF,#00B8D4);color:#fff}
.btn-yellow{background:linear-gradient(135deg,#FFD700,#FFC107);color:#333}
.btn-pink{background:linear-gradient(135deg,#FF2A7A,#E91E63);color:#fff}
.btn-violet{background:linear-gradient(135deg,#8B5CF6,#7C3AED);color:#fff}
.week-col{background:rgba(0,229,255,0.5);font-family:'Fredoka One',cursive;font-size:.8rem;display:flex;align-items:center;justify-content:center;min-width:36px;border-radius:6px 0 0 6px}
.day-header{background:linear-gradient(135deg,#00E5FF,#00B8D4);color:#fff;font-family:'Fredoka One',cursive;text-align:center;padding:6px 0;font-size:.9rem;border-radius:6px 6px 0 0}
.badge{display:inline-flex;align-items:center;gap:2px;font-size:.7rem;padding:1px 6px;border-radius:9999px;font-family:'Fredoka One',cursive;cursor:default}
.badge-ped{background:#FFD700;color:#333}
.badge-conge{background:#00B8D4;color:#fff}
.badge-tournoi{background:#FF2A7A;color:#fff}
.badge-photo{background:#8B5CF6;color:#fff}
.badge-sortie{background:#10B981;color:#fff}
.badge-custom{background:#6B7280;color:#fff}
.cycle-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.6);display:flex;align-items:start;justify-content:center;overflow-y:auto;padding:20px 10px}
.modal-content{width:100%;max-width:800px;border-radius:16px;overflow:hidden;margin:auto}
.period-cyan{background:linear-gradient(135deg,#00E5FF,#00B8D4);color:#fff;font-family:'Luckiest Guy',cursive;border-radius:12px;min-width:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 8px;text-align:center}
.period-yellow{background:linear-gradient(135deg,#FFD700,#FFC107);border:2px solid #333;border-radius:12px;padding:10px 14px;flex:1}
.period-input{background:#fff;border:1.5px solid #ccc;border-radius:8px;padding:4px 8px;font-family:'Schoolbell',cursive;font-size:1rem;width:100%;outline:none}
.period-input:focus{border-color:#00E5FF}
.separator{font-family:'Schoolbell',cursive;font-style:italic;text-align:center;padding:6px 0;font-size:1.1rem;color:#555;background:rgba(255,255,255,0.5);border-radius:8px;margin:4px 0}
.config-panel{background:rgba(255,255,255,0.92);border-radius:12px;margin:8px;padding:12px;border:2px dashed #00B8D4}
.config-toggle{cursor:pointer;font-family:'Fredoka One',cursive;font-size:1rem;color:#00B8D4;background:none;border:none;padding:8px 16px;width:100%;text-align:left}
.config-toggle:hover{color:#FF2A7A}
.config-row{display:flex;gap:8px;align-items:center;margin:4px 0;flex-wrap:wrap}
.config-row label{font-family:'Fredoka One',cursive;font-size:.85rem;color:#333;min-width:90px}
.config-row input,.config-row select{font-family:'Schoolbell',cursive;border:1.5px solid #ccc;border-radius:8px;padding:3px 6px;font-size:.9rem}
.config-row input:focus,.config-row select:focus{border-color:#00E5FF;outline:none}
@media print{.no-print{display:none!important}.print-only{display:block!important}body{background:#fff!important}.bg-gym{display:none}}
</style>

<body>
<div class="bg-gym"></div>

<!-- HEADER -->
<header class="header-gradient sticky top-0 z-50 shadow-lg no-print">
  <div class="max-w-7xl mx-auto flex items-center justify-between px-3 py-2">
    <div class="flex items-center gap-2">
      <img src="/bucheron-basketball.png" alt="Mascotte" class="h-12 sm:h-16">
      <span class="text-white font-bangers text-sm sm:text-base hidden sm:inline drop-shadow">Zone Total Sport</span>
    </div>
    <h1 class="font-bangers text-white text-lg sm:text-2xl md:text-3xl drop-shadow-lg text-center flex-1" id="headerTitle">PLANIFICATEUR PEDAGOGIQUE</h1>
    <div class="flex gap-1" id="langPills"></div>
  </div>
</header>

<!-- CONTROLS -->
<div class="max-w-7xl mx-auto px-3 py-3 flex flex-wrap items-center gap-2 justify-center no-print">
  <button class="btn-pill btn-cyan" onclick="changeMonth(-1)" id="btnPrev">&lt;</button>
  <select id="monthSelect" class="btn-pill bg-white text-gray-800 border font-fredoka text-sm" onchange="goToMonth(this.value)"></select>
  <button class="btn-pill btn-cyan" onclick="changeMonth(1)" id="btnNext">&gt;</button>
  <button class="btn-pill btn-yellow" onclick="goToday()" id="btnToday">Aujourd'hui</button>
</div>

<!-- MONTH TITLE -->
<div class="text-center py-2">
  <h2 id="monthTitle" class="font-bangers text-4xl sm:text-5xl md:text-6xl text-white drop-shadow-lg"></h2>
</div>

<!-- CALENDAR GRID -->
<div class="max-w-7xl mx-auto px-2 pb-4">
  <div id="calendarGrid"></div>
</div>

<!-- DETAIL PANEL -->
<div id="detailPanel" class="max-w-7xl mx-auto px-3 pb-6 hidden no-print">
  <div class="detail-glass rounded-2xl p-4 shadow-xl">
    <h3 id="detailTitle" class="font-bangers text-2xl text-cyan-700 mb-3"></h3>
    <div class="flex flex-wrap gap-2 mb-3" id="badgeButtons"></div>
    <div id="badgeList" class="flex flex-wrap gap-1 mb-3"></div>
    <textarea id="detailNotes" class="w-full h-24 p-3 rounded-xl border font-schoolbell text-base resize-y" placeholder="Notes..."></textarea>
    <div class="flex flex-wrap gap-2 mt-3">
      <button class="btn-pill btn-cyan" onclick="saveDetail()">&#128190; <span data-i18n="save">Sauvegarder</span></button>
      <button class="btn-pill btn-yellow" onclick="printDay()">&#128424; <span data-i18n="print">Imprimer</span></button>
      <button class="btn-pill btn-pink" onclick="exportPDF()">PDF</button>
      <button class="btn-pill btn-violet" onclick="exportXLS()">Excel</button>
      <button class="btn-pill" style="background:linear-gradient(135deg,#10B981,#059669);color:#fff" onclick="exportCSV()">CSV</button>
    </div>
  </div>
</div>

<!-- EXPORT BAR -->
<div class="max-w-7xl mx-auto px-3 pb-8 no-print">
  <div class="detail-glass rounded-2xl p-3 text-center shadow-lg">
    <span class="font-fredoka text-gray-700 mr-2" data-i18n="exportMonth">Exporter le mois complet</span>
    <button class="btn-pill btn-pink" onclick="exportMonthPDF()">PDF</button>
    <button class="btn-pill btn-violet" onclick="exportMonthXLS()">XLS</button>
    <button class="btn-pill btn-cyan" onclick="exportMonthCSV()">CSV</button>
  </div>
</div>

<!-- DAILY MODAL -->
<div id="dailyModal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal-content detail-glass shadow-2xl">
    <div id="modalHeader" class="p-4 text-center" style="background:linear-gradient(135deg,#FFD700,#FFC107)">
      <h2 id="modalDayName" class="font-bangers text-3xl sm:text-4xl text-gray-800 drop-shadow"></h2>
      <p id="modalDate" class="font-schoolbell text-lg text-gray-700"></p>
    </div>
    <div id="modalPeriods" class="p-4 flex flex-col gap-2"></div>
    <div class="p-4 flex flex-wrap gap-2 justify-center border-t">
      <button class="btn-pill btn-cyan" onclick="saveModal()">&#128190; <span data-i18n="save">Sauvegarder</span></button>
      <button class="btn-pill btn-yellow" onclick="printModal()">&#128424; <span data-i18n="printDay">Imprimer cette journee</span></button>
      <button class="btn-pill btn-pink" onclick="closeModal()">&#10005; <span data-i18n="close">Fermer</span></button>
    </div>
  </div>
</div>

<script>
/* ====== i18n ====== */
const T={

},

  days:['Monday','Tuesday','Wednesday','Thursday','Friday'],
  months:['January','February','March','April','May','June','July','August','September','October','November','December'],
  week:'Wk',day:'Day',groups:'Groups',planif:'Plan',period:'Period',
  schedule:'Schedule',group:'Group',activity:'Activity',details:'Details',
  recess:'Recess',lunch:'Lunch',free:'FREE',
  save:'Save',print:'Print',printDay:'Print this day',close:'Close',
  exportMonth:'Export full month',notes:'Notes...',
  ped:'Pedagogical',conge:'Holiday',tournoi:'Tournament',photo:'Photo',sortie:'Field Trip',custom:'Custom',
  addBadge:'Add badge',promptCustom:'Custom badge name:',
  defHoraires:['8:10 to 9:10','9:10 to 10:10','10:30 to 11:30','12:45 to 1:45','2:05 to 3:05'],
  config:'Configuration',nbPeriodes:'Number of periods',hours:'Hours',

},

  days:['Lunes','Martes','Miercoles','Jueves','Viernes'],
  months:['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'],
  week:'Sem',day:'Dia',groups:'Grupos',planif:'Plan',period:'Periodo',
  schedule:'Horario',group:'Grupo',activity:'Actividad',details:'Detalles',
  recess:'Recreo',lunch:'Almuerzo',free:'LIBRE',
  save:'Guardar',print:'Imprimir',printDay:'Imprimir este dia',close:'Cerrar',
  exportMonth:'Exportar mes completo',notes:'Notas...',
  ped:'Pedagogico',conge:'Feriado',tournoi:'Torneo',photo:'Foto',sortie:'Salida',custom:'Personalizado',
  addBadge:'Agregar etiqueta',promptCustom:'Nombre de etiqueta personalizada:',
  defHoraires:['8:10 a 9:10','9:10 a 10:10','10:30 a 11:30','12:45 a 13:45','14:05 a 15:05'],
  config:'Configuracion',nbPeriodes:'Numero de periodos',hours:'Horarios',
  recessAfter:'Recreo despues de P',diner:'Almuerzo',parascolaire:'Extracurricular',
  applyAll:'Aplicar a todo el calendario',start:'Inicio',end:'Fin',
  configApplied:'Configuracion aplicada a todo el calendario!',afterSchool:'Extracurricular'
},
zh:{
  headerTitle:'教学计划器',today:'今天',
  days:['周一','周二','周三','周四','周五'],
  months:['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'],
  week:'周',day:'天',groups:'班级',planif:'计划',period:'课时',
  schedule:'时间',group:'班级',activity:'活动',details:'详情',
  recess:'课间休息',lunch:'午餐',free:'空闲',
  save:'保存',print:'打印',printDay:'打印当天',close:'关闭',
  exportMonth:'导出整月',notes:'备注...',
  ped:'教研',conge:'假期',tournoi:'比赛',photo:'照片',sortie:'外出',custom:'自定义',
  addBadge:'添加标签',promptCustom:'自定义标签名称:',
  defHoraires:['8:10-9:10','9:10-10:10','10:30-11:30','12:45-13:45','14:05-15:05'],
  config:'设置',nbPeriodes:'课时数',hours:'时间',
  recessAfter:'P后休息',diner:'午餐',parascolaire:'课后活动',
  applyAll:'应用到所有日历',start:'开始',end:'结束',
  configApplied:'设置已应用到所有日历!',afterSchool:'课后活动'
}
};

let lang='fr', currentYear=2025, currentMonth=8, selectedDate=null;
const STORE_KEY='zts-planificateur';
const CONFIG_KEY='zts-planif-config';

function defaultConfig(){return{nbPeriodes:5,horaires:[{debut:'8:10',fin:'9:10'},{debut:'9:10',fin:'10:10'},{debut:'10:30',fin:'11:30'},{debut:'12:45',fin:'13:45'},{debut:'14:05',fin:'15:05'}],recreations:[{after:2,enabled:true},{after:4,enabled:true}],diner:{after:3,enabled:true,debut:'11:30',fin:'12:45'},parascolaire:{enabled:false,debut:'15:15',fin:'16:15'}}}
function loadConfig(){try{return JSON.parse(localStorage.getItem(CONFIG_KEY))||defaultConfig()}catch(e){return defaultConfig()}}
function saveConfig(c){localStorage.setItem(CONFIG_KEY,JSON.stringify(c))}

function t(k){return T[lang][k]||T.fr[k]||k}
function loadStore(){try{return JSON.parse(localStorage.getItem(STORE_KEY))||{lang:'fr',cells:{}}}catch(e){return{lang:'fr',cells:{}}}}
function saveStore(s){localStorage.setItem(STORE_KEY,JSON.stringify(s))}
function getCell(dateStr){const s=loadStore();return s.cells[dateStr]||null}
function setCell(dateStr,data){const s=loadStore();s.cells[dateStr]={...(s.cells[dateStr]||{}), ...data};saveStore(s)}

function dateStr(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function dayOfWeek(y,m,d){const dow=new Date(y,m,d).getDay();return dow===0?7:dow}

/* ====== LANG ====== */
function initLangs(){
  const c=document.getElementById('langPills');c.innerHTML='';
  ['fr','en','es','zh'].forEach(l=>{
    const p=document.createElement('span');
    p.className='lang-pill'+(l===lang?' active':'');
    p.textContent=l.toUpperCase();
    p.onclick=()=>{lang=l;const s=loadStore();s.lang=l;saveStore(s);initLangs();renderAll()};
    c.appendChild(p);
  });
}

/* ====== MONTH SELECT ====== */
function populateMonthSelect(){
  const sel=document.getElementById('monthSelect');sel.innerHTML='';
  for(let y=2025;y<=2026;y++){
    const mStart=y===2025?7:0, mEnd=y===2026?6:11;
    for(let m=mStart;m<=mEnd;m++){
      const o=document.createElement('option');
      o.value=`${y}-${m}`;
      o.textContent=`${t('months')[m]} ${y}`;
      if(y===currentYear&&m===currentMonth)o.selected=true;
      sel.appendChild(o);
    }
  }
}

function goToMonth(v){const[y,m]=v.split('-').map(Number);currentYear=y;currentMonth=m;renderAll()}
function changeMonth(dir){
  let y=currentYear,m=currentMonth+dir;
  if(m>11){m=0;y++}if(m<0){m=11;y--}
  if(y<2025||(y===2025&&m<7))return;if(y>2026||(y===2026&&m>5))return;
  currentYear=y;currentMonth=m;renderAll();
}
function goToday(){
  const now=new Date();currentYear=now.getFullYear();currentMonth=now.getMonth();renderAll();
}

/* ====== CALENDAR ====== */
function getWeekNumber(d){const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));date.setUTCDate(date.getUTCDate()+4-(date.getUTCDay()||7));const yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));return Math.ceil(((date-yearStart)/86400000+1)/7)}

function renderCalendar(){
  const grid=document.getElementById('calendarGrid');grid.innerHTML='';
  const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
  const todayStr=dateStr(new Date().getFullYear(),new Date().getMonth(),new Date().getDate());

  // Header row
  let headerHTML='<div class="grid gap-1 mb-1" style="grid-template-columns:36px repeat(5,1fr)">';
  headerHTML+=`<div class="week-col rounded-tl-lg">${t('week')}</div>`;
  t('days').forEach((d,i)=>{headerHTML+=`<div class="day-header${i===4?' rounded-tr-lg':''}">${d}</div>`});
  headerHTML+='</div>';
  grid.innerHTML+=headerHTML;

  // Collect days into weeks (Mon-Fri)
  let weeks=[];let currentWeek=[];
  for(let d=1;d<=daysInMonth;d++){
    const dow=dayOfWeek(currentYear,currentMonth,d);
    if(dow>=1&&dow<=5){
      if(dow===1&&currentWeek.length>0){weeks.push(currentWeek);currentWeek=[]}
      while(currentWeek.length<dow-1)currentWeek.push(null);
      currentWeek.push(d);
    }
  }
  if(currentWeek.length>0){while(currentWeek.length<5)currentWeek.push(null);weeks.push(currentWeek)}

  weeks.forEach(week=>{
    let rowHTML='<div class="grid gap-1 mb-1" style="grid-template-columns:36px repeat(5,1fr)">';
    const firstDay=week.find(d=>d!==null);
    const wn=firstDay?getWeekNumber(new Date(currentYear,currentMonth,firstDay)):'';
    rowHTML+=`<div class="week-col">${wn}</div>`;

    week.forEach((d,i)=>{
      if(d===null){rowHTML+=`<div class="cell-glass rounded-lg p-1 min-h-[90px] opacity-40"></div>`;return}
      const ds=dateStr(currentYear,currentMonth,d);
      const cell=getCell(ds)||{};
      const tags=cell.tags||[];
      let extraClass='cell-glass';
      if(tags.includes('Conge'))extraClass='cell-conge';
      else if(tags.includes('Ped'))extraClass='cell-ped';
      else if(tags.includes('Tournoi'))extraClass='cell-tournoi';
      const isToday=ds===todayStr;
      const isSel=ds===selectedDate;

      rowHTML+=`<div class="${extraClass} rounded-lg p-1.5 min-h-[90px] cursor-pointer transition hover:ring-2 hover:ring-cyan-400 ${isToday?'ring-2 ring-yellow-400':''} ${isSel?'ring-2 ring-pink-500':''}" onclick="onCellClick(event,'${ds}',${d})">`;
      rowHTML+=`<div class="flex justify-between items-start mb-0.5"><span class="font-bold text-sm text-white">${d}</span>`;
      // Cycle dots
      const grp=(cell.groupes||'').toLowerCase();
      if(/cycle1|c1/.test(grp))rowHTML+=`<span class="cycle-dot bg-green-500"></span>`;
      if(/cycle2|c2/.test(grp))rowHTML+=`<span class="cycle-dot bg-blue-500 ml-0.5"></span>`;
      if(/cycle3|c3/.test(grp))rowHTML+=`<span class="cycle-dot bg-violet-500 ml-0.5"></span>`;
      rowHTML+=`</div>`;
      rowHTML+=`<input class="cell-input" placeholder="${t('day')} #" value="${cell.jour||''}" onclick="event.stopPropagation()" onchange="onCellInput('${ds}','jour',this.value)">`;
      rowHTML+=`<input class="cell-input" placeholder="${t('groups')}" value="${cell.groupes||''}" onclick="event.stopPropagation()" onchange="onCellInput('${ds}','groupes',this.value)">`;
      rowHTML+=`<input class="cell-input" placeholder="${t('planif')}" value="${cell.planif||''}" onclick="event.stopPropagation()" onchange="onCellInput('${ds}','planif',this.value)">`;
      if(tags.length){
        rowHTML+=`<div class="flex flex-wrap gap-0.5 mt-0.5">`;
        tags.forEach(tg=>{
          const cls=tg==='Ped'?'badge-ped':tg==='Conge'?'badge-conge':tg==='Tournoi'?'badge-tournoi':tg==='Photo'?'badge-photo':tg==='Sortie'?'badge-sortie':'badge-custom';
          rowHTML+=`<span class="badge ${cls}">${tg}</span>`;
        });
        rowHTML+=`</div>`;
      }
      rowHTML+=`</div>`;
    });
    rowHTML+='</div>';
    grid.innerHTML+=rowHTML;
  });
}

function onCellInput(ds,field,val){
  const cell=getCell(ds)||{};
  cell[field]=val;
  setCell(ds,cell);
  renderCalendar();
}

function onCellClick(e,ds,d){
  if(e.target.tagName==='INPUT')return;
  selectedDate=ds;
  showDetail(ds,d);
  openModal(ds,d);
  renderCalendar();
}

/* ====== DETAIL PANEL ====== */
function showDetail(ds,d){
  const panel=document.getElementById('detailPanel');panel.classList.remove('hidden');
  const cell=getCell(ds)||{};
  const dayName=t('days')[(dayOfWeek(currentYear,currentMonth,d)-1)%5];
  document.getElementById('detailTitle').textContent=`${dayName} ${d} ${t('months')[currentMonth]} ${currentYear}`;
  document.getElementById('detailNotes').value=cell.notes||'';
  document.getElementById('detailNotes').placeholder=t('notes');
  document.getElementById('detailNotes').onchange=function(){setCell(ds,{notes:this.value})};
  renderBadges(ds);
  renderBadgeButtons(ds);
}

const badgeTypes=[
  {key:'Ped',icon:'📚',i18n:'ped'},
  {key:'Conge',icon:'🏖️',i18n:'conge'},
  {key:'Tournoi',icon:'🏆',i18n:'tournoi'},
  {key:'Photo',icon:'📸',i18n:'photo'},
  {key:'Sortie',icon:'🚌',i18n:'sortie'},
  {key:'Custom',icon:'➕',i18n:'custom'}
];

function renderBadgeButtons(ds){
  const c=document.getElementById('badgeButtons');c.innerHTML='';
  badgeTypes.forEach(bt=>{
    const b=document.createElement('button');
    b.className='btn-pill text-sm '+(bt.key==='Custom'?'bg-gray-400 text-white':'btn-cyan');
    b.innerHTML=`${bt.icon} ${t(bt.i18n)}`;
    b.onclick=()=>{
      let tag=bt.key;
      if(bt.key==='Custom'){tag=prompt(t('promptCustom'));if(!tag)return}
      const cell=getCell(ds)||{};
      const tags=cell.tags||[];
      if(!tags.includes(tag)){tags.push(tag);setCell(ds,{tags});renderBadges(ds);renderCalendar()}
    };
    c.appendChild(b);
  });
}

function renderBadges(ds){
  const c=document.getElementById('badgeList');c.innerHTML='';
  const cell=getCell(ds)||{};
  (cell.tags||[]).forEach(tg=>{
    const cls=tg==='Ped'?'badge-ped':tg==='Conge'?'badge-conge':tg==='Tournoi'?'badge-tournoi':tg==='Photo'?'badge-photo':tg==='Sortie'?'badge-sortie':'badge-custom';
    const s=document.createElement('span');s.className=`badge ${cls} text-sm`;
    s.innerHTML=`${tg} <span style="cursor:pointer;margin-left:3px" onclick="removeBadge('${ds}','${tg}')">&times;</span>`;
    c.appendChild(s);
  });
}

function removeBadge(ds,tag){
  const cell=getCell(ds)||{};
  cell.tags=(cell.tags||[]).filter(t=>t!==tag);
  setCell(ds,cell);
  renderBadges(ds);
  renderCalendar();
}

function saveDetail(){
  if(!selectedDate)return;
  const notes=document.getElementById('detailNotes').value;
  setCell(selectedDate,{notes});
  alert(lang==='fr'?'Sauvegarde!':lang==='en'?'Saved!':lang==='es'?'Guardado!':'已保存!');
}

/* ====== CONFIG PANEL ====== */
function buildConfigPanel(){
  const cfg=loadConfig();
  let html=`<div class="config-panel no-print">
  <button class="config-toggle" onclick="document.getElementById('configBody').classList.toggle('hidden')">⚙️ ${t('config')}</button>
  <div id="configBody" class="hidden" style="margin-top:8px">
    <div class="config-row"><label>${t('nbPeriodes')}:</label>
      <select id="cfgNbPeriodes" onchange="onConfigNbChange(this.value)">`;
  for(let n=3;n<=7;n++) html+=`<option value="${n}"${n===cfg.nbPeriodes?' selected':''}>${n}</option>`;
  html+=`</select></div>
    <div style="margin:8px 0"><label class="font-fredoka text-sm text-gray-700" style="font-weight:bold">${t('hours')}:</label>
    <div id="cfgHoraires">`;
  cfg.horaires.forEach((h,i)=>{
    html+=`<div class="config-row"><label>P${i+1} ${t('start')}:</label><input type="text" class="cfg-debut" value="${h.debut}" style="width:70px">
      <label>${t('end')}:</label><input type="text" class="cfg-fin" value="${h.fin}" style="width:70px"></div>`;
  });
  html+=`</div></div>
    <div style="margin:8px 0"><label class="font-fredoka text-sm text-gray-700" style="font-weight:bold">${t('recessAfter')}:</label>`;
  cfg.recreations.forEach((r,i)=>{
    html+=`<div class="config-row"><label><input type="checkbox" class="cfg-rec-chk" data-idx="${i}" ${r.enabled?'checked':''}> ${t('recessAfter')}${r.after}</label></div>`;
  });
  html+=`</div>
    <div class="config-row"><label><input type="checkbox" id="cfgDinerEnabled" ${cfg.diner.enabled?'checked':''}> ${t('diner')}</label>
      <input type="text" id="cfgDinerDebut" value="${cfg.diner.debut}" style="width:70px"> - <input type="text" id="cfgDinerFin" value="${cfg.diner.fin}" style="width:70px"></div>
    <div class="config-row"><label><input type="checkbox" id="cfgParaEnabled" ${cfg.parascolaire.enabled?'checked':''}> ${t('parascolaire')}</label>
      <input type="text" id="cfgParaDebut" value="${cfg.parascolaire.debut}" style="width:70px"> - <input type="text" id="cfgParaFin" value="${cfg.parascolaire.fin}" style="width:70px"></div>
    <div style="margin-top:12px;text-align:center">
      <button class="btn-pill btn-pink" style="font-size:1rem;padding:10px 28px" onclick="applyConfigToCalendar()">🔄 ${t('applyAll')}</button>
    </div>
  </div></div>`;
  return html;
}

function onConfigNbChange(val){
  const n=parseInt(val);const cfg=loadConfig();
  while(cfg.horaires.length<n)cfg.horaires.push({debut:'',fin:''});
  cfg.horaires=cfg.horaires.slice(0,n);cfg.nbPeriodes=n;saveConfig(cfg);
  const container=document.getElementById('cfgHoraires');container.innerHTML='';
  cfg.horaires.forEach((h,i)=>{
    container.innerHTML+=`<div class="config-row"><label>P${i+1} ${t('start')}:</label><input type="text" class="cfg-debut" value="${h.debut}" style="width:70px">
      <label>${t('end')}:</label><input type="text" class="cfg-fin" value="${h.fin}" style="width:70px"></div>`;
  });
}

function readConfigFromUI(){
  const cfg=loadConfig();
  cfg.nbPeriodes=parseInt(document.getElementById('cfgNbPeriodes').value);
  const debuts=document.querySelectorAll('.cfg-debut');
  const fins=document.querySelectorAll('.cfg-fin');
  cfg.horaires=[];
  for(let i=0;i<cfg.nbPeriodes;i++){
    cfg.horaires.push({debut:debuts[i]?debuts[i].value:'',fin:fins[i]?fins[i].value:''});
  }
  const recChks=document.querySelectorAll('.cfg-rec-chk');
  recChks.forEach((chk,i)=>{if(cfg.recreations[i])cfg.recreations[i].enabled=chk.checked});
  cfg.diner.enabled=document.getElementById('cfgDinerEnabled').checked;
  cfg.diner.debut=document.getElementById('cfgDinerDebut').value;
  cfg.diner.fin=document.getElementById('cfgDinerFin').value;
  cfg.parascolaire.enabled=document.getElementById('cfgParaEnabled').checked;
  cfg.parascolaire.debut=document.getElementById('cfgParaDebut').value;
  cfg.parascolaire.fin=document.getElementById('cfgParaFin').value;
  saveConfig(cfg);return cfg;
}

function applyConfigToCalendar(){
  const cfg=readConfigFromUI();
  const store=loadStore();
  for(let y=2025;y<=2026;y++){
    const mStart=y===2025?7:0,mEnd=y===2025?11:5;
    for(let m=mStart;m<=mEnd;m++){
      const dim=new Date(y,m+1,0).getDate();
      for(let d=1;d<=dim;d++){
        const dow=new Date(y,m,d).getDay();
        if(dow===0||dow===6)continue;
        const ds=dateStr(y,m,d);
        const existing=store.cells[ds]||{};
        const hasData=existing.periodes&&existing.periodes.some(p=>p.groupe||p.activite||p.details);
        if(hasData)continue;
        const periodes=cfg.horaires.map(h=>({horaire:`${h.debut} - ${h.fin}`,groupe:'',activite:'',details:''}));
        if(cfg.parascolaire.enabled){
          periodes.push({horaire:`${cfg.parascolaire.debut} - ${cfg.parascolaire.fin}`,groupe:'',activite:'',details:'',isParascolaire:true});
        }
        store.cells[ds]={...existing,periodes};
      }
    }
  }
  saveStore(store);
  alert(t('configApplied'));
  renderAll();
}

function configSeparatorsForIndex(cfg,i){
  for(let r=0;r<cfg.recreations.length;r++){
    if(cfg.recreations[r].enabled&&cfg.recreations[r].after===i) return 'recess';
  }
  if(cfg.diner.enabled&&cfg.diner.after===i) return 'lunch';
  return null;
}

/* ====== DAILY MODAL ====== */
function openModal(ds,d){
  const modal=document.getElementById('dailyModal');modal.classList.remove('hidden');
  document.body.style.overflow='hidden';
  const dow=dayOfWeek(currentYear,currentMonth,d);
  const dayName=t('days')[(dow-1)%5];
  document.getElementById('modalDayName').textContent=dayName.toUpperCase();
  document.getElementById('modalDate').textContent=`${d} ${t('months')[currentMonth]} ${currentYear}`;
  const cfg=loadConfig();
  const cell=getCell(ds)||{};
  const defPeriodes=cfg.horaires.map(h=>({horaire:`${h.debut} - ${h.fin}`,groupe:'',activite:'',details:''}));
  if(cfg.parascolaire.enabled) defPeriodes.push({horaire:`${cfg.parascolaire.debut} - ${cfg.parascolaire.fin}`,groupe:'',activite:'',details:'',isParascolaire:true});
  const periodes=cell.periodes||defPeriodes;

  const container=document.getElementById('modalPeriods');container.innerHTML='';
  container.innerHTML=buildConfigPanel();

  let periodIdx=0;
  periodes.forEach((p,i)=>{
    const isParasco=p.isParascolaire||false;
    if(!isParasco){
      periodIdx++;
      const sep=configSeparatorsForIndex(cfg,periodIdx-1);
      if(sep&&periodIdx>1){
        const sepDiv=document.createElement('div');sepDiv.className='separator';
        if(sep==='recess') sepDiv.textContent=`** ${t('recess')} **`;
        else if(sep==='lunch') sepDiv.textContent=`** ${t('lunch')} (${cfg.diner.debut} - ${cfg.diner.fin}) **`;
        container.appendChild(sepDiv);
      }
    } else {
      const sepDiv=document.createElement('div');sepDiv.className='separator';
      sepDiv.textContent=`** ${t('afterSchool')} **`;
      container.appendChild(sepDiv);
    }

    const row=document.createElement('div');row.className='flex gap-2 items-stretch';
    const label=isParasco?t('afterSchool'):`${t('period')} ${periodIdx}`;
    row.innerHTML=`
      <div class="period-cyan" style="min-width:110px">
        <div class="text-lg">${label}</div>
        <input class="period-input text-center text-sm mt-1" style="background:rgba(255,255,255,0.3);color:#fff;border-color:rgba(255,255,255,0.5);max-width:130px" value="${p.horaire}" data-period="${i}" data-field="horaire" onchange="onModalInput(this,'${ds}')">
      </div>
      <div class="period-yellow flex-1">
        <div class="flex flex-col sm:flex-row gap-2 mb-2">
          <div class="flex-1"><label class="font-fredoka text-sm text-gray-700">${t('group')}:</label>
            <input class="period-input" value="${p.groupe}" placeholder="${t('free')}" data-period="${i}" data-field="groupe" onchange="onModalInput(this,'${ds}')">
          </div>
          <div class="flex-1"><label class="font-fredoka text-sm text-gray-700">${t('activity')}:</label>
            <input class="period-input" value="${p.activite}" data-period="${i}" data-field="activite" onchange="onModalInput(this,'${ds}')">
          </div>
        </div>
        <label class="font-fredoka text-sm text-gray-700">${t('details')}:</label>
        <textarea class="period-input" rows="2" style="resize:vertical" data-period="${i}" data-field="details" onchange="onModalInput(this,'${ds}')">${p.details}</textarea>
      </div>`;
    container.appendChild(row);
  });

  modal.dataset.ds=ds;
  modal.dataset.day=d;
}

function onModalInput(el,ds){
  const idx=parseInt(el.dataset.period);
  const field=el.dataset.field;
  const cell=getCell(ds)||{};
  const cfg=loadConfig();
  const defPeriodes=cfg.horaires.map(h=>({horaire:`${h.debut} - ${h.fin}`,groupe:'',activite:'',details:''}));
  if(cfg.parascolaire.enabled) defPeriodes.push({horaire:`${cfg.parascolaire.debut} - ${cfg.parascolaire.fin}`,groupe:'',activite:'',details:'',isParascolaire:true});
  const periodes=cell.periodes||defPeriodes;
  periodes[idx][field]=el.value;
  setCell(ds,{periodes});
}

  const modal=document.getElementById('dailyModal');
  const ds=modal.dataset.ds;

}

/* ====== EXPORTS ====== */
function exportPDF(){
  if(!selectedDate)return;
  const{jsPDF}=window.jspdf;const doc=new jsPDF();
  const cell=getCell(selectedDate)||{};
  doc.setFontSize(18);doc.text(`${selectedDate}`,10,15);
  doc.setFontSize(12);
  let y=25;
  doc.text(`${t('day')}: ${cell.jour||''}`,10,y);y+=8;
  doc.text(`${t('groups')}: ${cell.groupes||''}`,10,y);y+=8;
  doc.text(`${t('planif')}: ${cell.planif||''}`,10,y);y+=8;
  doc.text(`Tags: ${(cell.tags||[]).join(', ')}`,10,y);y+=8;
  doc.text(`Notes: ${cell.notes||''}`,10,y);y+=12;
  if(cell.periodes){
    cell.periodes.forEach((p,i)=>{
      doc.text(`${t('period')} ${i+1} (${p.horaire}): ${p.groupe} - ${p.activite}`,10,y);y+=7;
      if(p.details){doc.setFontSize(10);doc.text(`  ${p.details.replace(/\n/g,', ')}`,10,y);y+=7;doc.setFontSize(12)}
    });
  }
  doc.save(`planif-${selectedDate}.pdf`);
}

function exportXLS(){
  if(!selectedDate)return;
  const cell=getCell(selectedDate)||{};
  const data=[{Date:selectedDate,Jour:cell.jour||'',Groupes:cell.groupes||'',Planif:cell.planif||'',Tags:(cell.tags||[]).join(', '),Notes:cell.notes||''}];
  if(cell.periodes){
    cell.periodes.forEach((p,i)=>{
      data.push({Date:'',Jour:`${t('period')} ${i+1}`,Groupes:p.groupe,Planif:p.activite,Tags:p.horaire,Notes:p.details});
    });
  }
  const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Planif');
  XLSX.writeFile(wb,`planif-${selectedDate}.xlsx`);
}

function exportCSV(){
  if(!selectedDate)return;
  const cell=getCell(selectedDate)||{};
  let csv=`Date,Jour,Groupes,Planif,Tags,Notes\n`;
  csv+=`${selectedDate},"${cell.jour||''}","${cell.groupes||''}","${cell.planif||''}","${(cell.tags||[]).join(', ')}","${cell.notes||''}"\n`;
  if(cell.periodes){
    cell.periodes.forEach((p,i)=>{
      csv+=`,"${t('period')} ${i+1}","${p.groupe}","${p.activite}","${p.horaire}","${p.details?.replace(/\n/g,' ')||''}"\n`;
    });
  }
  downloadFile(`planif-${selectedDate}.csv`,csv,'text/csv');
}

function exportMonthPDF(){
  const{jsPDF}=window.jspdf;const doc=new jsPDF();
  doc.setFontSize(16);doc.text(`${t('months')[currentMonth]} ${currentYear}`,10,15);
  const s=loadStore();let y=25;doc.setFontSize(10);
  const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
  for(let d=1;d<=daysInMonth;d++){
    const ds=dateStr(currentYear,currentMonth,d);
    const cell=s.cells[ds];if(!cell)continue;
    if(y>270){doc.addPage();y=15}
    doc.text(`${ds}: ${cell.jour||''} | ${cell.groupes||''} | ${cell.planif||''} | ${(cell.tags||[]).join(',')}`,10,y);y+=6;
  }
  doc.save(`planif-${t('months')[currentMonth]}-${currentYear}.pdf`);
}

function exportMonthXLS(){
  const s=loadStore();const data=[];
  const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
  for(let d=1;d<=daysInMonth;d++){
    const ds=dateStr(currentYear,currentMonth,d);
    const cell=s.cells[ds];if(!cell)continue;
    data.push({Date:ds,Jour:cell.jour||'',Groupes:cell.groupes||'',Planif:cell.planif||'',Tags:(cell.tags||[]).join(', '),Notes:cell.notes||''});
  }
  if(!data.length)return;
  const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,t('months')[currentMonth]);
  XLSX.writeFile(wb,`planif-${t('months')[currentMonth]}-${currentYear}.xlsx`);
}

function exportMonthCSV(){
  const s=loadStore();let csv=`Date,Jour,Groupes,Planif,Tags,Notes\n`;
  const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
  for(let d=1;d<=daysInMonth;d++){
    const ds=dateStr(currentYear,currentMonth,d);
    const cell=s.cells[ds];if(!cell)continue;
    csv+=`${ds},"${cell.jour||''}","${cell.groupes||''}","${cell.planif||''}","${(cell.tags||[]).join(', ')}","${cell.notes||''}"\n`;
  }
  downloadFile(`planif-${t('months')[currentMonth]}-${currentYear}.csv`,csv,'text/csv');
}

function downloadFile(name,content,type){
  const blob=new Blob([content],{type});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href);
}
