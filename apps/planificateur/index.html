<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Schoolbell',cursive;font-size:1.1rem;min-height:100vh}
.bg-gym{position:fixed;inset:0;z-index:-1;background:url('/gym-bg.jpg') center/cover no-repeat fixed}
.header-gradient{background:linear-gradient(135deg,#00E5FF,#00B8D4)}
.cell-glass{background:rgba(15,15,50,0.8);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);color:#fff;transition:all .2s}
.cell-glass:hover{background:rgba(15,15,50,0.92);transform:scale(1.02);z-index:2}
.day-header{background:linear-gradient(135deg,#00E5FF,#00B8D4);color:#fff;font-family:'Fredoka One',cursive;text-align:center;padding:6px 0;font-size:.85rem}
.week-col{background:rgba(0,229,255,0.5);font-family:'Fredoka One',cursive;font-size:.75rem;display:flex;align-items:center;justify-content:center;min-width:32px;border-radius:6px 0 0 6px;color:#fff}
.lang-pill{font-family:'Fredoka One',cursive;padding:2px 10px;border-radius:9999px;cursor:pointer;font-size:.8rem;background:rgba(255,255,255,0.35);color:#fff;transition:all .2s;border:none}
.lang-pill.active{background:#fff;color:#00B8D4}
.btn-pill{font-family:'Fredoka One',cursive;border-radius:9999px;padding:6px 18px;font-size:.85rem;cursor:pointer;transition:all .15s;border:none}
.btn-cyan{background:linear-gradient(135deg,#00E5FF,#00B8D4);color:#fff}
.btn-yellow{background:linear-gradient(135deg,#FFD700,#FFC107);color:#333}
.btn-pink{background:linear-gradient(135deg,#FF2A7A,#E91E63);color:#fff}
.btn-violet{background:linear-gradient(135deg,#8B5CF6,#7C3AED);color:#fff}
.btn-pill:hover{opacity:.85;transform:scale(1.04)}
.cycle-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:.7rem;padding:2px 8px;border-radius:9999px;font-family:'Fredoka One',cursive;cursor:default;white-space:nowrap}
.badge-ped{background:#FFD700;color:#333}
.badge-conge{background:#00B8D4;color:#fff}
.badge-tournoi{background:#FF2A7A;color:#fff}
.badge-photo{background:#8B5CF6;color:#fff}
.badge-sortie{background:#10B981;color:#fff}

.detail-glass{background:rgba(255,255,255,0.92);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-radius:16px;border:2px solid rgba(0,229,255,0.3)}
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.6);display:flex;align-items:start;justify-content:center;overflow-y:auto;padding:20px 10px}
.modal-content{width:100%;max-width:820px;border-radius:16px;overflow:hidden;margin:20px auto;background:#fff}
.period-cyan{background:linear-gradient(135deg,#00E5FF,#00B8D4);color:#fff;font-family:'Luckiest Guy',cursive;border-radius:12px;min-width:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 8px;text-align:center}
.period-yellow{background:linear-gradient(135deg,#FFD700,#FFC107);border:2px solid #333;border-radius:12px;padding:10px 14px;flex:1}
.period-input{background:#fff;border:1.5px solid #ccc;border-radius:8px;padding:4px 8px;font-family:'Schoolbell',cursive;font-size:1rem;width:100%;outline:none}
.period-input:focus{border-color:#00E5FF;box-shadow:0 0 0 2px rgba(0,229,255,0.2)}
.separator{font-family:'Schoolbell',cursive;font-style:italic;text-align:center;padding:6px 0;font-size:1.05rem;color:#555;background:rgba(0,229,255,0.1);border-radius:8px;margin:4px 0}
.config-panel{background:rgba(255,255,255,0.95);border-radius:12px;margin:8px;padding:12px;border:2px dashed #00B8D4}
.config-toggle{cursor:pointer;font-family:'Fredoka One',cursive;font-size:1rem;color:#00B8D4;background:none;border:none;padding:8px 16px;width:100%;text-align:left}
.config-toggle:hover{color:#FF2A7A}
.config-row{display:flex;gap:8px;align-items:center;margin:6px 0;flex-wrap:wrap}
.config-row label{font-family:'Fredoka One',cursive;font-size:.85rem;color:#333;min-width:100px}
.config-row input,.config-row select{font-family:'Schoolbell',cursive;border:1.5px solid #ccc;border-radius:8px;padding:3px 8px;font-size:.9rem}
.config-row input:focus,.config-row select:focus{border-color:#00E5FF;outline:none}
.planif-btn{font-family:'Fredoka One',cursive;font-size:.6rem;background:rgba(0,229,255,0.8);color:#fff;border:none;border-radius:6px;padding:1px 6px;cursor:pointer;transition:all .15s;white-space:nowrap}
.planif-btn:hover{background:#00E5FF;transform:scale(1.1)}
.cell-today{box-shadow:0 0 0 3px #00E5FF,0 0 12px rgba(0,229,255,0.4)}
@media(max-width:640px){.cal-cell{min-height:52px!important;padding:3px!important}.cal-cell .day-num{font-size:1rem!important}.planif-btn{font-size:.55rem!important}}
@media print{.no-print{display:none!important}.print-only{display:block!important}body{background:#fff!important}.bg-gym{display:none}}

<div class="bg-gym"></div>

<!-- HEADER -->
<header class="header-gradient sticky top-0 z-50 shadow-lg no-print">
  <div class="max-w-7xl mx-auto flex items-center justify-between px-3 py-2">
    <div class="flex items-center gap-2">
      <img src="/bucheron-basketball.png" alt="Mascotte" class="h-12 sm:h-16 drop-shadow-lg">
      <span class="text-white font-bangers text-sm sm:text-base hidden sm:inline drop-shadow">Zone Total Sport</span>
    </div>
    <h1 class="font-bangers text-white text-lg sm:text-2xl md:text-3xl drop-shadow-lg text-center flex-1" id="headerTitle">PLANIFICATEUR PÉDAGOGIQUE</h1>
    <div class="flex gap-1" id="langPills"></div>
  </div>
</header>

<!-- CONTROLS -->
<div class="max-w-7xl mx-auto px-3 py-3 flex flex-wrap items-center gap-2 justify-center no-print">
  <button class="btn-pill btn-cyan" onclick="changeMonth(-1)">&lt;</button>
  <select id="monthSelect" class="btn-pill bg-white text-gray-800 border font-fredoka text-sm" onchange="goToMonth(this.value)"></select>
  <button class="btn-pill btn-cyan" onclick="changeMonth(1)">&gt;</button>
  <button class="btn-pill btn-yellow" onclick="goToday()" id="btnToday">Aujourd'hui</button>
</div>

<!-- MONTH TITLE -->
<div class="text-center py-1">
  <h2 id="monthTitle" class="font-bangers text-4xl sm:text-5xl md:text-6xl text-white drop-shadow-lg"></h2>
</div>

<!-- CALENDAR GRID -->
<div class="max-w-7xl mx-auto px-2 pb-4">
  <div id="calendarGrid"></div>
</div>

<!-- DETAIL PANEL -->
<div id="detailPanel" class="max-w-7xl mx-auto px-3 pb-6 hidden no-print"></div>

<!-- EXPORT BAR -->
<div id="exportBar" class="max-w-7xl mx-auto px-3 pb-8 no-print">
  <div class="detail-glass p-4 flex flex-wrap items-center gap-3 justify-center">
    <span class="font-fredoka text-gray-700 text-sm" id="exportLabel">Exporter le mois complet :</span>
    <button class="btn-pill btn-pink text-sm" onclick="exportMonthPDF()">PDF</button>
    <button class="btn-pill btn-violet text-sm" onclick="exportMonthXLS()">Excel</button>
    <button class="btn-pill btn-cyan text-sm" onclick="exportMonthCSV()">CSV</button>
  </div>
</div>

<!-- MODAL -->
<div id="modalOverlay" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal-content shadow-2xl" id="modalContent"></div>
</div>

    after: 'P之后',
    tags: {Ped:'教学日',Conge:'假期',Tournoi:'锦标赛',Photo:'拍照日',Sortie:'外出',Custom:'自定义'},
    tagEmojis: {Ped:'📚',Conge:'🏖️',Tournoi:'🏆',Photo:'📸',Sortie:'🚌',Custom:'➕'},

  }
};
let lang = localStorage.getItem('zts-planif-lang') || 'fr';
function t(key) { return T[lang]?.[key] || T.fr[key] || key; }

/* ============================================================
   HOLIDAYS (Quebec 2025-2026)
   ============================================================ */
const HOLIDAYS = {};
function addH(dateStr, emoji, label, bg) { HOLIDAYS[dateStr] = { emoji, label, bg }; }
addH('2025-09-01','💼','Fête du travail','rgba(100,180,255,0.6)');
addH('2025-10-13','🍂','Action de grâce','rgba(255,165,0,0.6)');
// Christmas break
for (let d = 22; d <= 31; d++) addH(`2025-12-${String(d).padStart(2,'0')}`,'🎄','Vacances de Noël','rgba(200,50,50,0.45)');
addH('2025-12-25','🎅','Noël','rgba(220,30,30,0.6)');
addH('2026-01-01','🎉',"Jour de l'an",'rgba(218,165,32,0.6)');
addH('2026-01-02','🎄','Vacances de Noël','rgba(200,50,50,0.45)');
addH('2026-02-14','❤️','St-Valentin','rgba(255,105,180,0.5)');
for (let d = 2; d <= 6; d++) addH(`2026-03-0${d}`,'🌴','Relâche','rgba(0,200,200,0.45)');
addH('2026-04-03','🕊️','Vendredi saint','rgba(180,150,220,0.5)');
addH('2026-04-06','🐰','Lundi de Pâques','rgba(255,235,130,0.55)');
addH('2026-05-18','⚜️','Journée des patriotes','rgba(30,80,200,0.55)');
addH('2026-06-24','⚜️','Saint-Jean-Baptiste','rgba(20,50,180,0.6)');

/* ============================================================
   STATE
   ============================================================ */
let currentYear = 2025, currentMonth = 8; // August 2025
let selectedDate = null;
let data = JSON.parse(localStorage.getItem('zts-planificateur') || '{"cells":{}}');
let config = JSON.parse(localStorage.getItem('zts-planif-config') || 'null') || {
  nbPeriodes: 5,
  horaires: [
    {debut:'8:10',fin:'9:10'},{debut:'9:10',fin:'10:10'},{debut:'10:30',fin:'11:30'},
    {debut:'12:45',fin:'13:45'},{debut:'14:05',fin:'15:05'}
  ],
  recreations: [{after:2,enabled:true},{after:4,enabled:true}],
  diner: {after:3,enabled:true,debut:'11:30',fin:'12:45'},
  parascolaire: {enabled:false,debut:'15:15',fin:'16:15'}
};

function saveData() { localStorage.setItem('zts-planificateur', JSON.stringify(data)); }
function saveConfig() { localStorage.setItem('zts-planif-config', JSON.stringify(config)); }
function getCell(ds) { return data.cells[ds] || null; }
function ensureCell(ds) { if (!data.cells[ds]) data.cells[ds] = {tags:[],notes:'',periodes:[]}; return data.cells[ds]; }

function dateStr(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function isWeekend(y,m,d) { const dow = new Date(y,m,d).getDay(); return dow===0||dow===6; }
function getWeekNumber(y,m,d) {
  const date = new Date(y,m,d);
  const jan1 = new Date(date.getFullYear(),0,1);
  return Math.ceil(((date - jan1)/86400000 + jan1.getDay() + 1) / 7);
}

/* ============================================================
   CYCLE DOTS
   ============================================================ */
function getCycleDots(ds) {
  const cell = getCell(ds);
  if (!cell || !cell.periodes || !cell.periodes.length) return [];
  const dots = new Set();
  cell.periodes.forEach(p => {
    const g = (p.groupe||'').toLowerCase();
    if (/cycle\s*1|c1|1er\s*cycle|premier\s*cycle/.test(g)) dots.add('c1');
    if (/cycle\s*2|c2|2e\s*cycle|deuxi[eè]me\s*cycle/.test(g)) dots.add('c2');
    if (/cycle\s*3|c3|3e\s*cycle|troisi[eè]me\s*cycle/.test(g)) dots.add('c3');
  });
  return [...dots];
}

function hasPlanif(ds) {
  const cell = getCell(ds);
  if (!cell || !cell.periodes || !cell.periodes.length) return false;
  return cell.periodes.some(p => (p.groupe||'').trim() || (p.activite||'').trim());
}

/* ============================================================
   LANG PILLS
   ============================================================ */
function renderLangPills() {
  const c = document.getElementById('langPills');
  c.innerHTML = '';
  ['fr','en','es','zh'].forEach(l => {
    const b = document.createElement('button');
    b.className = 'lang-pill' + (l===lang?' active':'');
    b.textContent = l.toUpperCase();
    b.onclick = () => { lang=l; localStorage.setItem('zts-planif-lang',l); renderAll(); };
    c.appendChild(b);
  });
}

/* ============================================================
   MONTH SELECT
   ============================================================ */
function renderMonthSelect() {
  const sel = document.getElementById('monthSelect');
  sel.innerHTML = '';
  for (let y=2025; y<=2026; y++) {
    const startM = y===2025?7:0, endM = y===2025?11:5;
    for (let m=startM; m<=endM; m++) {
      const opt = document.createElement('option');
      opt.value = `${y}-${m}`;
      opt.textContent = `${t('months')[m]} ${y}`;
      if (y===currentYear && m===currentMonth) opt.selected = true;
      sel.appendChild(opt);
    }
  }
}

function goToMonth(v) { const [y,m]=v.split('-').map(Number); currentYear=y; currentMonth=m; renderCalendar(); updateMonthTitle(); }
function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth=0; currentYear++; }
  if (currentMonth < 0) { currentMonth=11; currentYear--; }
  renderMonthSelect(); renderCalendar(); updateMonthTitle();
}
function goToday() {
  const now = new Date(); currentYear=now.getFullYear(); currentMonth=now.getMonth();
  renderMonthSelect(); renderCalendar(); updateMonthTitle();
}
function updateMonthTitle() {
  document.getElementById('monthTitle').textContent = `${t('months')[currentMonth]} ${currentYear}`;
}

/* ============================================================
   CALENDAR GRID
   ============================================================ */
function renderCalendar() {
  const grid = document.getElementById('calendarGrid');
  const firstDay = new Date(currentYear, currentMonth, 1);
  const lastDay = new Date(currentYear, currentMonth+1, 0).getDate();
  let startDow = firstDay.getDay(); // 0=Sun
  startDow = startDow === 0 ? 6 : startDow - 1; // 0=Mon

  const today = new Date();
  const todayStr = dateStr(today.getFullYear(), today.getMonth(), today.getDate());

  // Header row
  let html = '<div style="display:grid;grid-template-columns:32px repeat(7,1fr);gap:2px;margin-bottom:2px">';
  html += `<div class="week-col" style="border-radius:6px;font-size:.7rem">${t('week')}</div>`;
  for (let i=0;i<7;i++) html += `<div class="day-header">${t('days')[i]}</div>`;
  html += '</div>';

  // Weeks
  html += '<div style="display:grid;grid-template-columns:32px repeat(7,1fr);gap:2px">';

  let dayCount = 1;
  const totalSlots = Math.ceil((startDow + lastDay) / 7) * 7;

  for (let i=0; i<totalSlots; i++) {
    // Week number column
    if (i % 7 === 0) {
      const wd = (i < startDow) ? 1 : Math.min(dayCount, lastDay);
      const wn = getWeekNumber(currentYear, currentMonth, wd);
      html += `<div class="week-col">${wn}</div>`;
    }

    if (i < startDow || dayCount > lastDay) {
      html += '<div></div>';
    } else {
      const d = dayCount;
      const ds = dateStr(currentYear, currentMonth, d);
      const isToday = ds === todayStr;
      const weekend = isWeekend(currentYear, currentMonth, d);
      const holiday = HOLIDAYS[ds];
      const cell = getCell(ds);
      const hasTags = cell && cell.tags && cell.tags.length;
      const isPed = hasTags && cell.tags.includes('Ped');
      const isConge = hasTags && cell.tags.includes('Conge');
      const isTournoi = hasTags && cell.tags.includes('Tournoi');

      let bgStyle = '';
      let extraClass = 'cell-glass';
      if (holiday) {
        bgStyle = `background:${holiday.bg}!important;`;
      } else if (isPed) {
        bgStyle = 'background:rgba(255,215,0,0.55)!important;';
      } else if (isConge) {
        bgStyle = 'background:rgba(100,180,255,0.55)!important;';
      } else if (isTournoi) {
        bgStyle = 'background:rgba(255,42,122,0.45)!important;';
      }
      if (weekend) bgStyle += 'opacity:0.4;';

      const dots = getCycleDots(ds);
      const showPlanif = hasPlanif(ds);

      html += `<div class="cal-cell ${extraClass}${isToday?' cell-today':''}"
        style="border-radius:8px;padding:4px 5px;min-height:62px;cursor:pointer;position:relative;display:flex;flex-direction:column;${bgStyle}"
        onclick="selectDay('${ds}')" ondblclick="openModal('${ds}')">`;

      // Day number
      html += `<div class="day-num" style="font-family:'Luckiest Guy',cursive;font-size:1.3rem;line-height:1;opacity:0.95">${d}</div>`;

      // Holiday emoji + label
      if (holiday) {
        html += `<div style="font-size:1.1rem;text-align:center;margin-top:auto">${holiday.emoji}</div>`;
        html += `<div style="font-size:.5rem;font-family:'Fredoka One',cursive;text-align:center;opacity:0.9;line-height:1">${holiday.label}</div>`;
      }

      // Ped tag display
      if (isPed && !holiday) {
        html += `<div style="font-size:1rem;text-align:center;margin-top:auto">📚</div>`;
      }

      // Planif button (only if has planning data)
      if (showPlanif) {
        html += `<button class="planif-btn" onclick="event.stopPropagation();openModal('${ds}')" style="position:absolute;top:3px;right:3px">📋 ${t('planif')}</button>`;
      }

      // Cycle dots
      if (dots.length) {
        html += '<div style="display:flex;gap:3px;margin-top:auto;justify-content:center;padding-top:2px">';
        dots.forEach(c => {
          const color = c==='c1'?'#22c55e':c==='c2'?'#3b82f6':'#8b5cf6';
          html += `<span class="cycle-dot" style="background:${color}" title="Cycle ${c.slice(1)}"></span>`;
        });
        html += '</div>';
      }

      html += '</div>';
      dayCount++;
    }
  }
  html += '</div>';
  grid.innerHTML = html;
}

/* ============================================================
   SELECT DAY -> DETAIL PANEL
   ============================================================ */
function selectDay(ds) {
  selectedDate = ds;
  renderDetailPanel(ds);
}

function renderDetailPanel(ds) {
  const panel = document.getElementById('detailPanel');
  if (!ds) { panel.classList.add('hidden'); return; }
  panel.classList.remove('hidden');

  const d = new Date(ds+'T12:00:00');
  const dow = d.getDay();
  const dowIdx = dow===0?6:dow-1;
  const dayName = t('daysFull')[dowIdx];
  const monthName = t('months')[d.getMonth()];
  const cell = getCell(ds) || {tags:[],notes:'',periodes:[]};

  const allTags = ['Ped','Conge','Tournoi','Photo','Sortie','Custom'];

  let html = `<div class="detail-glass p-4 mt-2">`;
  html += `<h3 class="font-bangers text-2xl text-gray-800 mb-3">${dayName} ${d.getDate()} ${monthName} ${d.getFullYear()}</h3>`;

  // Current badges
  html += '<div class="flex flex-wrap gap-2 mb-3">';
  if (cell.tags && cell.tags.length) {
    cell.tags.forEach(tag => {
      const emoji = T.fr.tagEmojis[tag] || '🏷️';
      const label = t('tags')[tag] || tag;
      html += `<span class="badge badge-${tag.toLowerCase()}">${emoji} ${label} <button onclick="removeTag('${ds}','${tag}')" style="margin-left:3px;cursor:pointer;font-size:.8rem;background:none;border:none;color:inherit">✕</button></span>`;
    });
  }
  html += '</div>';

  // Add badge buttons
  html += `<div class="mb-3"><span class="font-fredoka text-sm text-gray-600">${t('addTag')}</span><div class="flex flex-wrap gap-1 mt-1">`;
  allTags.forEach(tag => {
    const emoji = T.fr.tagEmojis[tag];
    const label = t('tags')[tag];
    html += `<button class="btn-pill text-xs" style="padding:3px 10px;background:rgba(0,0,0,0.08)" onclick="addTag('${ds}','${tag}')">${emoji} ${label}</button>`;
  });
  html += '</div></div>';

  // Notes
  html += `<div class="mb-3"><label class="font-fredoka text-sm text-gray-600">${t('notes')}</label>`;
  html += `<textarea id="detailNotes" class="w-full mt-1 p-2 border rounded-lg font-schoolbell" rows="3" style="border-color:#ccc;font-size:.95rem">${cell.notes||''}</textarea></div>`;

  // Buttons
  html += '<div class="flex flex-wrap gap-2">';
  html += `<button class="btn-pill btn-cyan text-sm" onclick="saveDetail('${ds}')">💾 ${t('save')}</button>`;
  html += `<button class="btn-pill btn-yellow text-sm" onclick="openModal('${ds}')">📋 ${t('planif')}</button>`;
  html += `<button class="btn-pill btn-violet text-sm" onclick="printDay('${ds}')">🖨️ ${t('print')}</button>`;
  html += `<button class="btn-pill btn-pink text-sm" onclick="exportDayPDF('${ds}')">PDF</button>`;
  html += `<button class="btn-pill text-sm" style="background:#059669;color:#fff" onclick="exportDayXLS('${ds}')">Excel</button>`;
  html += `<button class="btn-pill text-sm" style="background:#6B7280;color:#fff" onclick="exportDayCSV('${ds}')">CSV</button>`;
  html += '</div>';

  html += '</div>';
  panel.innerHTML = html;
}

function addTag(ds, tag) {
  const cell = ensureCell(ds);
  if (!cell.tags.includes(tag)) { cell.tags.push(tag); saveData(); }
  renderCalendar(); renderDetailPanel(ds);
}
function removeTag(ds, tag) {
  const cell = getCell(ds);
  if (cell) { cell.tags = cell.tags.filter(t=>t!==tag); saveData(); }
  renderCalendar(); renderDetailPanel(ds);
}
function saveDetail(ds) {
  const cell = ensureCell(ds);
  cell.notes = document.getElementById('detailNotes').value;
  saveData();
  renderCalendar();
  showToast('✅');
}

/* ============================================================
   MODAL - PLANIFICATION
   ============================================================ */
function openModal(ds) {
  selectedDate = ds;
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');
  overlay.classList.remove('hidden');
  document.body.style.overflow = 'hidden';

  const d = new Date(ds+'T12:00:00');
  const dow = d.getDay();
  const dowIdx = dow===0?6:dow-1;
  const dayName = t('daysFull')[dowIdx];
  const monthName = t('months')[d.getMonth()];
  const cell = getCell(ds) || {tags:[],notes:'',periodes:[]};

  let html = '';

  // Yellow header
  html += `<div style="background:linear-gradient(135deg,#FFD700,#FFC107);padding:16px 20px">`;
  html += `<h2 class="font-bangers text-3xl text-gray-800" style="margin:0">${dayName}</h2>`;
  html += `<p class="font-fredoka text-gray-700" style="margin:4px 0 0">${d.getDate()} ${monthName} ${d.getFullYear()}</p>`;
  html += '</div>';

  // Config panel (collapsible)
  html += '<div class="config-panel m-3">';
  html += `<button class="config-toggle" onclick="toggleConfig()">⚙️ ${t('config')} ▼</button>`;
  html += '<div id="configBody" class="hidden p-2">';

  // Nb periods
  html += `<div class="config-row"><label>${t('nbPeriods')}</label><select id="cfgNbP" onchange="updateConfigPreview()" style="width:60px">`;
  for (let i=3;i<=7;i++) html += `<option value="${i}"${config.nbPeriodes===i?' selected':''}>${i}</option>`;
  html += '</select></div>';

  // Period times
  html += '<div id="cfgTimes"></div>';

  // Recreations
  html += `<div class="config-row mt-2"><label>${t('recess')}</label><div id="cfgRec"></div></div>`;

  // Lunch
  html += `<div class="config-row"><label>${t('lunch')}</label>`;
  html += `<input type="checkbox" id="cfgLunchOn" ${config.diner.enabled?'checked':''}> `;
  html += `${t('after')} <select id="cfgLunchAfter" style="width:50px">`;
  for (let i=1;i<=7;i++) html += `<option value="${i}"${config.diner.after===i?' selected':''}>${i}</option>`;
  html += `</select> `;
  html += `<input type="time" id="cfgLunchStart" value="${config.diner.debut||'11:30'}" style="width:100px">`;
  html += `<input type="time" id="cfgLunchEnd" value="${config.diner.fin||'12:45'}" style="width:100px">`;
  html += '</div>';

  // After school
  html += `<div class="config-row"><label>${t('afterSchool')}</label>`;
  html += `<input type="checkbox" id="cfgParaOn" ${config.parascolaire.enabled?'checked':''}> `;
  html += `<input type="time" id="cfgParaStart" value="${config.parascolaire.debut||'15:15'}" style="width:100px">`;
  html += `<input type="time" id="cfgParaEnd" value="${config.parascolaire.fin||'16:15'}" style="width:100px">`;
  html += '</div>';

  // Apply all button
  html += `<div class="mt-3 text-center"><button class="btn-pill btn-pink text-sm" onclick="applyConfigAll()">🔄 ${t('applyAll')}</button></div>`;

  html += '</div></div>';

  // Periods
  html += '<div id="modalPeriods" class="px-3 pb-2"></div>';

  // Footer buttons
  html += '<div class="flex flex-wrap gap-2 justify-center p-4 bg-gray-50">';
  html += `<button class="btn-pill btn-cyan" onclick="saveModal('${ds}')">💾 ${t('save')}</button>`;
  html += `<button class="btn-pill btn-violet" onclick="printDay('${ds}')">🖨️ ${t('print')}</button>`;
  html += `<button class="btn-pill btn-yellow" onclick="closeModal()">✕ ${t('close')}</button>`;
  html += '</div>';

  content.innerHTML = html;
  renderConfigTimes();
  renderConfigRec();
  renderModalPeriods(ds);
}

function toggleConfig() {
  const body = document.getElementById('configBody');
  body.classList.toggle('hidden');
}

function renderConfigTimes() {
  const n = parseInt(document.getElementById('cfgNbP').value);
  const c = document.getElementById('cfgTimes');
  let html = '';
  for (let i=0;i<n;i++) {
    const h = config.horaires[i] || {debut:'',fin:''};
    html += `<div class="config-row"><label>P${i+1}</label>`;
    html += `<input type="time" class="cfg-time-start" value="${h.debut}" style="width:100px">`;
    html += `<span>→</span>`;
    html += `<input type="time" class="cfg-time-end" value="${h.fin}" style="width:100px">`;
    html += '</div>';
  }
  c.innerHTML = html;
}

function renderConfigRec() {
  const n = parseInt(document.getElementById('cfgNbP').value);
  const c = document.getElementById('cfgRec');
  let html = '';
  for (let i=1;i<n;i++) {
    const rec = config.recreations.find(r=>r.after===i);
    const checked = rec && rec.enabled;
    html += `<label style="font-size:.8rem;margin-right:8px"><input type="checkbox" class="cfg-rec-cb" data-after="${i}" ${checked?'checked':''}> ${t('after')}${i}</label>`;
  }
  c.innerHTML = html;
}

function updateConfigPreview() {
  renderConfigTimes();
  renderConfigRec();
}

function readConfigFromModal() {
  const n = parseInt(document.getElementById('cfgNbP').value);
  const starts = document.querySelectorAll('.cfg-time-start');
  const ends = document.querySelectorAll('.cfg-time-end');
  const horaires = [];
  for (let i=0;i<n;i++) {
    horaires.push({debut: starts[i]?.value||'', fin: ends[i]?.value||''});
  }
  const recreations = [];
  document.querySelectorAll('.cfg-rec-cb').forEach(cb => {
    recreations.push({after: parseInt(cb.dataset.after), enabled: cb.checked});
  });
  const diner = {
    after: parseInt(document.getElementById('cfgLunchAfter').value),
    enabled: document.getElementById('cfgLunchOn').checked,
    debut: document.getElementById('cfgLunchStart').value,
    fin: document.getElementById('cfgLunchEnd').value
  };
  const parascolaire = {
    enabled: document.getElementById('cfgParaOn').checked,
    debut: document.getElementById('cfgParaStart').value,
    fin: document.getElementById('cfgParaEnd').value
  };
  config = {nbPeriodes:n, horaires, recreations, diner, parascolaire};
  saveConfig();
}

function applyConfigAll() {
  readConfigFromModal();
  // Apply empty period structures to all weekdays Aug 2025 - Jun 2026
  for (let y=2025;y<=2026;y++) {
    const sM = y===2025?7:0, eM = y===2025?11:5;
    for (let m=sM;m<=eM;m++) {
      const last = new Date(y,m+1,0).getDate();
      for (let d=1;d<=last;d++) {
        if (isWeekend(y,m,d)) continue;
        const ds = dateStr(y,m,d);
        const cell = ensureCell(ds);
        // Only set periods if none exist
        if (!cell.periodes || !cell.periodes.length) {
          cell.periodes = [];
          for (let p=0;p<config.nbPeriodes;p++) {
            const h = config.horaires[p]||{debut:'',fin:''};
            cell.periodes.push({horaire:`${h.debut}-${h.fin}`,groupe:'',activite:'',details:''});
          }
        }
      }
    }
  }
  saveData();
  showToast('✅ ' + t('applyAll'));
}

function renderModalPeriods(ds) {
  const container = document.getElementById('modalPeriods');
  const cell = getCell(ds) || {periodes:[]};
  const n = config.nbPeriodes;

  // Ensure we have enough periods
  while (cell.periodes && cell.periodes.length < n) {
    const h = config.horaires[cell.periodes.length]||{debut:'',fin:''};
    cell.periodes.push({horaire:`${h.debut}-${h.fin}`,groupe:'',activite:'',details:''});
  }
  const periodes = cell.periodes || [];

  let html = '';
  for (let i=0;i<n;i++) {
    const p = periodes[i] || {horaire:'',groupe:'',activite:'',details:''};
    const h = config.horaires[i]||{debut:'',fin:''};
    const horaire = p.horaire || `${h.debut}-${h.fin}`;

    // Check for recess before this period
    if (i > 0) {
      const rec = config.recreations.find(r=>r.after===i && r.enabled);
      if (rec) {
        html += `<div class="separator">☕ ${t('recess')}</div>`;
      }
    }
    // Check for lunch before this period
    if (config.diner.enabled && config.diner.after === i) {
      html += `<div class="separator">🍽️ ${t('lunch')} (${config.diner.debut} - ${config.diner.fin})</div>`;
    }

    html += `<div class="flex gap-3 mb-2" style="align-items:stretch">`;
    // Cyan box
    html += `<div class="period-cyan" style="min-width:100px">`;
    html += `<div style="font-size:1rem">${t('period')} ${i+1}</div>`;
    html += `<input type="text" class="modal-horaire" data-idx="${i}" value="${horaire}" style="background:rgba(255,255,255,0.25);border:none;border-radius:6px;padding:2px 6px;font-family:'Schoolbell',cursive;font-size:.85rem;color:#fff;text-align:center;width:90%;margin-top:4px" placeholder="8:10-9:10">`;
    html += '</div>';
    // Yellow box
    html += '<div class="period-yellow">';
    html += `<div class="mb-1"><label class="font-fredoka text-xs text-gray-700">${t('group')}</label>`;
    html += `<input type="text" class="period-input modal-groupe" data-idx="${i}" value="${escHTML(p.groupe||'')}" placeholder="ex: 204B (cycle 1)"></div>`;
    html += `<div class="mb-1"><label class="font-fredoka text-xs text-gray-700">${t('activity')}</label>`;
    html += `<input type="text" class="period-input modal-activite" data-idx="${i}" value="${escHTML(p.activite||'')}" placeholder="ex: Basketball"></div>`;
    html += `<div><label class="font-fredoka text-xs text-gray-700">${t('details')}</label>`;
    html += `<textarea class="period-input modal-details" data-idx="${i}" rows="2" placeholder="ex: - Test bip&#10;- 6 min jogging" style="resize:vertical">${escHTML(p.details||'')}</textarea></div>`;
    html += '</div></div>';
  }

  // After school
  if (config.parascolaire.enabled) {
    html += `<div class="separator">🎒 ${t('afterSchool')} (${config.parascolaire.debut} - ${config.parascolaire.fin})</div>`;
  }

  container.innerHTML = html;
}

function saveModal(ds) {
  readConfigFromModal();
  const cell = ensureCell(ds);
  const periodes = [];
  const n = config.nbPeriodes;
  for (let i=0;i<n;i++) {
    const horaire = document.querySelector(`.modal-horaire[data-idx="${i}"]`)?.value || '';
    const groupe = document.querySelector(`.modal-groupe[data-idx="${i}"]`)?.value || '';
    const activite = document.querySelector(`.modal-activite[data-idx="${i}"]`)?.value || '';
    const details = document.querySelector(`.modal-details[data-idx="${i}"]`)?.value || '';
    periodes.push({horaire, groupe, activite, details});
  }
  cell.periodes = periodes;
  saveData();
  renderCalendar();
  renderDetailPanel(ds);
  showToast('✅');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
  document.body.style.overflow = '';
}

/* ============================================================
   EXPORT FUNCTIONS
   ============================================================ */
function printDay(ds) {
  const d = new Date(ds+'T12:00:00');
  const cell = getCell(ds) || {periodes:[],tags:[],notes:''};
  const dow = d.getDay(); const dowIdx = dow===0?6:dow-1;
  let html = `<html><head><style>body{font-family:Arial,sans-serif;padding:20px}h1{color:#00B8D4}table{width:100%;border-collapse:collapse;margin:10px 0}td,th{border:1px solid #ccc;padding:8px;text-align:left}th{background:#00B8D4;color:#fff}.tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.8rem;margin:2px}</style></head><body>`;
  html += `<h1>${t('daysFull')[dowIdx]} ${d.getDate()} ${t('months')[d.getMonth()]} ${d.getFullYear()}</h1>`;
  if (cell.tags.length) {
    html += '<p>';
    cell.tags.forEach(tag => { html += `<span class="tag" style="background:#eee">${T.fr.tagEmojis[tag]||''} ${t('tags')[tag]||tag}</span> `; });
    html += '</p>';
  }
  if (cell.periodes && cell.periodes.length) {
    html += `<table><tr><th>#</th><th>${t('period')}</th><th>${t('group')}</th><th>${t('activity')}</th><th>${t('details')}</th></tr>`;
    cell.periodes.forEach((p,i) => {
      html += `<tr><td>${i+1}</td><td>${escHTML(p.horaire||'')}</td><td>${escHTML(p.groupe||'')}</td><td>${escHTML(p.activite||'')}</td><td>${escHTML(p.details||'').replace(/\n/g,'<br>')}</td></tr>`;
    });
    html += '</table>';
  }
  if (cell.notes) html += `<h3>${t('notes')}</h3><p>${escHTML(cell.notes).replace(/\n/g,'<br>')}</p>`;
  html += '</body></html>';
  const w = window.open('','_blank');
  w.document.write(html);
  w.document.close();
  w.print();
}

function exportDayPDF(ds) {
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF();
  const d = new Date(ds+'T12:00:00');
  const cell = getCell(ds) || {periodes:[],tags:[],notes:''};
  const dow = d.getDay(); const dowIdx = dow===0?6:dow-1;
  const title = `${t('daysFull')[dowIdx]} ${d.getDate()} ${t('months')[d.getMonth()]} ${d.getFullYear()}`;
  doc.setFontSize(18); doc.text(title, 14, 20);
  let y = 35;
  if (cell.tags.length) { doc.setFontSize(10); doc.text('Tags: ' + cell.tags.map(t2=>T.fr.tagEmojis[t2]+' '+(T[lang].tags[t2]||t2)).join(', '), 14, y); y+=10; }
  if (cell.periodes) {
    doc.setFontSize(10);
    cell.periodes.forEach((p,i) => {
      doc.text(`P${i+1} (${p.horaire||''}) | ${p.groupe||''} | ${p.activite||''} | ${p.details||''}`, 14, y);
      y += 7; if (y>270){doc.addPage();y=20;}
    });
  }
  if (cell.notes) { y+=5; doc.text(t('notes')+': '+cell.notes, 14, y); }
  doc.save(`planif-${ds}.pdf`);
}

function exportDayXLS(ds) {
  const cell = getCell(ds) || {periodes:[],tags:[],notes:''};
  const rows = [['#',t('period'),t('group'),t('activity'),t('details')]];
  (cell.periodes||[]).forEach((p,i) => rows.push([i+1, p.horaire||'', p.groupe||'', p.activite||'', p.details||'']));
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, ds);
  XLSX.writeFile(wb, `planif-${ds}.xlsx`);
}

function exportDayCSV(ds) {
  const cell = getCell(ds) || {periodes:[],tags:[],notes:''};
  let csv = '#,Horaire,Groupe,Activite,Details\n';
  (cell.periodes||[]).forEach((p,i) => {
    csv += `${i+1},"${(p.horaire||'')}","${(p.groupe||'')}","${(p.activite||'')}","${(p.details||'').replace(/"/g,'""')}"\n`;
  });
  downloadText(csv, `planif-${ds}.csv`, 'text/csv');
}

function exportMonthPDF() {
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(16);
  doc.text(`${t('months')[currentMonth]} ${currentYear}`, 14, 18);
  let y = 30;
  const last = new Date(currentYear,currentMonth+1,0).getDate();
  for (let d=1;d<=last;d++) {
    const ds = dateStr(currentYear,currentMonth,d);
    const cell = getCell(ds);
    if (!cell || !cell.periodes || !cell.periodes.length) continue;
    if (!cell.periodes.some(p=>(p.groupe||'').trim()||(p.activite||'').trim())) continue;
    const dt = new Date(ds+'T12:00:00');
    const dowIdx = dt.getDay()===0?6:dt.getDay()-1;
    doc.setFontSize(12); doc.text(`${t('daysFull')[dowIdx]} ${d}`, 14, y); y+=6;
    doc.setFontSize(9);
    cell.periodes.forEach((p,i) => {
      if ((p.groupe||'').trim()||(p.activite||'').trim()) {
        doc.text(`  P${i+1} ${p.horaire||''} | ${p.groupe||''} | ${p.activite||''} | ${p.details||''}`, 14, y);
        y+=5;
      }
    });
    y+=3;
    if(y>270){doc.addPage();y=20;}
  }
  doc.save(`planif-${t('months')[currentMonth]}-${currentYear}.pdf`);
}

function exportMonthXLS() {
  const rows = [[t('months')[currentMonth]+' '+currentYear], ['Date','P#',t('period'),t('group'),t('activity'),t('details')]];
  const last = new Date(currentYear,currentMonth+1,0).getDate();
  for (let d=1;d<=last;d++) {
    const ds = dateStr(currentYear,currentMonth,d);
    const cell = getCell(ds);
    if (!cell||!cell.periodes) continue;
    cell.periodes.forEach((p,i) => {
      if ((p.groupe||'').trim()||(p.activite||'').trim()) rows.push([ds,i+1,p.horaire||'',p.groupe||'',p.activite||'',p.details||'']);
    });
  }
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, t('months')[currentMonth]);
  XLSX.writeFile(wb, `planif-${t('months')[currentMonth]}-${currentYear}.xlsx`);
}

function exportMonthCSV() {
  let csv = 'Date,Period,Horaire,Groupe,Activite,Details\n';
  const last = new Date(currentYear,currentMonth+1,0).getDate();
  for (let d=1;d<=last;d++) {
    const ds = dateStr(currentYear,currentMonth,d);
    const cell = getCell(ds);
    if (!cell||!cell.periodes) continue;
    cell.periodes.forEach((p,i) => {
      if ((p.groupe||'').trim()||(p.activite||'').trim()) {
        csv += `"${ds}",${i+1},"${p.horaire||''}","${(p.groupe||'')}","${(p.activite||'')}","${(p.details||'').replace(/"/g,'""')}"\n`;
      }
    });
  }
  downloadText(csv, `planif-${t('months')[currentMonth]}-${currentYear}.csv`, 'text/csv');
}

function downloadText(text, filename, mime) {
  const blob = new Blob([text], {type:mime});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

/* ============================================================
   UTILS
   ============================================================ */
function escHTML(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#333;color:#fff;padding:10px 20px;border-radius:12px;font-family:"Fredoka One",cursive;z-index:9999;animation:fadeout 1.5s forwards';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 1600);
}

// Fadeout animation
const styleAnim = document.createElement('style');
styleAnim.textContent = '@keyframes fadeout{0%{opacity:1}70%{opacity:1}100%{opacity:0}}';
document.head.appendChild(styleAnim);

/* ============================================================
   RENDER ALL
   ============================================================ */
function renderAll() {
  renderLangPills();
  renderMonthSelect();
  updateMonthTitle();
  renderCalendar();
  document.getElementById('headerTitle').textContent = t('headerTitle');
  document.getElementById('btnToday').textContent = t('today');
  document.getElementById('exportLabel').textContent = t('exportMonth');
  if (selectedDate) renderDetailPanel(selectedDate);
}

/* ============================================================
   INIT
   ============================================================ */
(function init() {
  // Start at current month if within school year
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  if ((y===2025 && m>=7) || (y===2026 && m<=6)) {
    currentYear = y; currentMonth = m;
  }
  renderAll();
})();
</script>
