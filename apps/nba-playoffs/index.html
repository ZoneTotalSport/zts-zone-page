<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --nba-blue: #1D428A;
    --nba-red: #C8102E;
    --nba-gold: #FDB927;
    --nba-dark: #0a0e1a;
    --nba-navy: #17233d;

  }

  body {
    font-family: 'Righteous', sans-serif;
    background: var(--nba-dark);
    color: var(--blanc);
    min-height: 100vh;
    overflow-x: auto;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(200,16,46,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 0%, rgba(253,185,39,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 100%, rgba(29,66,138,0.08) 0%, transparent 50%);
    position: relative;
  }

  /* NBA Logos Background Pattern */
  .nba-bg-pattern {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: -1;
    opacity: 0.08;
    pointer-events: none;
    display: grid;
    grid-template-columns: repeat(auto-fill, 130px);
    grid-template-rows: repeat(auto-fill, 130px);
    gap: 15px;
    padding: 15px;
    align-content: start;
    overflow: hidden;
  }
  .nba-bg-pattern img {
    width: 100px;
    height: 100px;
    object-fit: contain;
    filter: saturate(0.6) brightness(1.5);
  }

  /* ========== ZOOM CONTROLS (TNI / Gymnase) ========== */
  .zoom-controls {
    position: fixed;
    top: 50%;
    right: 12px;
    transform: translateY(-50%);
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .zoom-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: 2px solid rgba(200,16,46,0.3);
    background: linear-gradient(135deg, rgba(200,16,46,0.15), rgba(29,66,138,0.4));
    color: var(--nba-gold);
    font-family: 'Bungee', cursive;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
  }
  .zoom-btn:hover {
    background: linear-gradient(135deg, rgba(200,16,46,0.3), rgba(29,66,138,0.6));
    box-shadow: var(--glow-red);
    transform: scale(1.1);
  }
  .zoom-label {
    text-align: center;
    font-family: 'Bangers', cursive;
    font-size: 11px;
    color: rgba(253,185,39,0.5);
    letter-spacing: 1px;
  }

  /* ========== HEADER ========== */
  .header {
    text-align: center;
    padding: 25px 20px 0;
    position: relative;
    background: rgba(10,14,26,0.95);
    z-index: 10;
  }
  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--nba-red), var(--nba-gold), var(--nba-blue), var(--nba-gold), var(--nba-red));

  .header-top {

    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 10px;

  /* ========== MATCHUP CARD ========== */
  .matchup {

  .team-row {

  }
  .team-row:first-child { border-bottom: 1px solid rgba(200,16,46,0.15); }
  .team-row.winner { background: linear-gradient(90deg, rgba(46,204,113,0.25), transparent); }
  .team-row.eliminated { opacity: 0.35; }

  .seed {
    font-family: 'Bangers', cursive;
    font-size: 14px;
    color: var(--nba-gold);
    width: 16px;
    text-align: center;
  }
  .team-logo {
    width: 50px;
    height: 50px;
    object-fit: contain;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  }
  .team-abbrev {
    font-family: 'Luckiest Guy', cursive;
    font-size: 14px;
    color: var(--blanc);
    flex: 1;

  }
  .team-wins-num {

    font-size: 18px;
    width: 22px;
    text-align: center;
    color: rgba(255,255,255,0.3);
  }
  .team-wins-num.has-wins { color: var(--vert); text-shadow: 0 0 10px rgba(46,204,113,0.5); }

  /* Trophy */
  .cup-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 150px;
    padding: 20px 10px;
    background: rgba(10,14,26,0.9);
    border-radius: 14px;
    margin: 0 5px;
    align-self: center;
  }
  .cup-center .trophy-icon {
    font-size: 64px;
    filter: drop-shadow(0 0 25px rgba(253,185,39,0.4));

  }
  .cup-label {
    font-family: 'Bungee Shade', cursive;
    font-size: 12px;
    text-transform: uppercase;
    color: var(--nba-gold);
    text-align: center;
    text-shadow: 0 0 10px rgba(253,185,39,0.3);
  }

  /* ========== RESULTS VIEW ========== */
  .results-container {
    max-width: 950px;
    margin: 0 auto;
    padding: 20px 20px 60px;
  }
  .conf-section { margin-bottom: 30px; }
  .conf-title {

  /* ========== SERIES CARD ========== */
  .series-card {

  .series-header {

    align-items: center;
    justify-content: center;

    font-size: 22px;
    width: 28px;
    text-align: center;
    color: rgba(255,255,255,0.25);
  }
  .series-team .record.leading { color: var(--vert); text-shadow: 0 0 12px rgba(46,204,113,0.5); }

  .series-status { text-align: right; min-width: 140px; flex-shrink: 0; }
  .series-status .status-label {
    font-family: 'Bangers', cursive;
    color: rgba(253,185,39,0.5);
    font-size: 12px;
    letter-spacing: 2px;
  }
  .series-status .status-text {
    font-family: 'Barriecito', cursive;
    color: var(--nba-gold);
    font-size: 15px;
    margin-top: 3px;
  }

  /* ========== GAMES DROPDOWN ========== */
  .series-games {
    display: none;
    background: rgba(0,0,0,0.3);
    border-top: 1px solid rgba(200,16,46,0.1);
    padding: 0;
  }
  .series-card.open .series-games { display: block; }

  .game-card {
    border-bottom: 1px solid rgba(200,16,46,0.06);
    transition: all 0.2s;
  }
  .game-card:last-child { border-bottom: none; }

  .game-card-header {
    display: flex;
    align-items: center;
    padding: 10px 20px;
    cursor: pointer;
    gap: 12px;
  }
  .game-card-header:hover { background: rgba(200,16,46,0.03); }

  .game-num {
    font-family: 'Bangers', cursive;
    color: var(--nba-red);
    font-size: 14px;
    width: 70px;
    letter-spacing: 1px;
  }
  .game-date-label {
    font-family: 'Righteous', sans-serif;
    color: rgba(255,255,255,0.3);

  .game-mini-score {

  .game-mini-score img { width: 22px; height: 22px; }
  .game-mini-score .score-val { min-width: 18px; text-align: center; }
  .game-mini-score .score-val.winner-score { color: var(--vert); }
  .game-mini-score .vs-label { color: rgba(200,16,46,0.25); font-family: 'Bangers'; font-size: 12px; }

  .game-status-badge {
    font-family: 'Bangers', cursive;
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 12px;
    letter-spacing: 1px;

  .game-status-badge.final { background: rgba(46,204,113,0.15); color: var(--vert); }
  .game-status-badge.live { background: rgba(200,16,46,0.2); color: var(--nba-red); }
  .game-status-badge.upcoming { background: rgba(253,185,39,0.1); color: var(--nba-gold); }

  .live-pulse {

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }

  /* ========== GAME DETAILS ========== */
  .game-details {
    display: none;
    padding: 0 20px 15px;

  }
  .game-card.open .game-details { display: block; }

  .period-scoring { margin-bottom: 10px; }
  .period-label {
    font-family: 'Bangers', cursive;
    font-size: 13px;

  .scorer-row {

  .leader-mugshot {

  /* ========== LEADERS VIEW ========== */
  .leaders-container {
    max-width: 950px;
    margin: 0 auto;
    padding: 20px 20px 60px;
  }
  .leaders-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 15px;

  .leader-section {

  /* ========== SERIES MODAL ========== */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(6px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: linear-gradient(135deg, #0f1a2e 0%, #0a0e1a 100%);
    border: 2px solid rgba(200,16,46,0.25);
    border-radius: 16px;
    width: 90%;
    max-width: 650px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 0 40px rgba(200,16,46,0.15), 0 20px 60px rgba(0,0,0,0.5);
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 25px;
    gap: 20px;
    border-bottom: 1px solid rgba(200,16,46,0.15);
    position: relative;
  }
  .modal-team {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex: 1;

  .modal-team img { width: 60px; height: 60px; filter: drop-shadow(0 3px 8px rgba(0,0,0,0.4)); }

    font-size: 18px;
    text-align: center;
    letter-spacing: 1px;

    font-family: 'Bungee', cursive;

    color: var(--nba-gold);

  }
  .modal-vs {
    font-family: 'Bungee Shade', cursive;
    font-size: 22px;
    color: var(--nba-red);
    opacity: 0.5;
  }
  .modal-close {
    position: absolute;
    top: 12px;

<script>
// =============================================
// CONFIG & API (ESPN)
// =============================================
const LOGO = abbrev => `https://a.espncdn.com/i/teamlogos/nba/500/${abbrev.toLowerCase()}.png`;
const HEADSHOT = id => `https://a.espncdn.com/combiner/i?img=/i/headshots/nba/players/full/${id}.png&w=96&h=70`;

const API = {
  scoreboard: 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard',
  scoreDate: d => `https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard?dates=${d}`,
  summary: id => `https://site.api.espn.com/apis/site/v2/sports/basketball/nba/summary?event=${id}`,
  leaders: 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/leaders',
};

const NBA_TEAMS = {
  ATL:'Hawks', BOS:'Celtics', BKN:'Nets', CHA:'Hornets', CHI:'Bulls',
  CLE:'Cavaliers', DAL:'Mavericks', DEN:'Nuggets', DET:'Pistons',
  GS:'Warriors', HOU:'Rockets', IND:'Pacers', LAC:'Clippers', LAL:'Lakers',
  MEM:'Grizzlies', MIA:'Heat', MIL:'Bucks', MIN:'Timberwolves', NO:'Pelicans',
  NY:'Knicks', OKC:'Thunder', ORL:'Magic', PHI:'76ers', PHX:'Suns',
  POR:'Blazers', SAC:'Kings', SA:'Spurs', TOR:'Raptors', UTAH:'Jazz',
  WAS:'Wizards'
};

async function apiFetch(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.status);
    return await r.json();
  } catch(e) { console.warn('API fail:', url, e); return null; }
}

// =============================================
// PARTICLES & BACKGROUND
// =============================================
function createParticles() {
  const c = document.getElementById('particles');
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random()*100+'%';
    p.style.animationDelay = Math.random()*8+'s';
    p.style.animationDuration = (6+Math.random()*6)+'s';
    p.style.width = p.style.height = (1+Math.random()*3)+'px';
    p.style.background = Math.random() > 0.5 ? 'var(--nba-red)' : 'var(--nba-gold)';
    c.appendChild(p);
  }
}

function createNBABackground() {
  const teams = [
    'bos','nyk','mil','cle','orl','ind','phi','mia','chi','atl',
    'bkn','tor','cha','det','wsh','okc','den','min','dal','lac',
    'phx','sac','lal','gs','hou','mem','no','sa','por','utah'
  ];
  const container = document.getElementById('nbaBgPattern');
  for (let i = 0; i < 120; i++) {
    const team = teams[i % teams.length];
    const img = document.createElement('img');
    img.src = `https://a.espncdn.com/i/teamlogos/nba/500/${team}.png`;
    img.alt = '';
    img.loading = 'lazy';
    container.appendChild(img);
  }
}

// =============================================
// DATA
// =============================================
let bracketData = null;
let seriesMap = {}; // seriesId -> { games, team1, team2, ... }
let allPlayoffEvents = [];

// =============================================
// FETCH PLAYOFF DATA
// =============================================
async function fetchPlayoffData() {
  // Fetch current scoreboard (today) + recent days
  const dates = [];
  const today = new Date();
  for (let i = 0; i < 14; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    dates.push(d.toISOString().split('T')[0].replace(/-/g, ''));
  }
  // Also fetch a few days ahead
  for (let i = 1; i <= 3; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    dates.push(d.toISOString().split('T')[0].replace(/-/g, ''));
  }

  allPlayoffEvents = [];
  seriesMap = {};

  for (const date of dates) {
    const data = await apiFetch(API.scoreDate(date));
    if (!data || !data.events) continue;

    data.events.forEach(ev => {
      // Check if playoff game (season type 3)
      const isPlayoff = ev.season?.type === 3 || ev.competitions?.[0]?.series;
      if (!isPlayoff) return;

      // Avoid duplicates
      if (allPlayoffEvents.find(e => e.id === ev.id)) return;
      allPlayoffEvents.push(ev);

      // Build series map
      const comp = ev.competitions?.[0];
      const series = comp?.series;
      if (series) {
        const key = series.id || series.title || 'unknown';
        if (!seriesMap[key]) {
          const home = comp.competitors?.find(c => c.homeAway === 'home');
          const away = comp.competitors?.find(c => c.homeAway === 'away');
          seriesMap[key] = {
            id: key,
            title: series.title || '',
            summary: series.summary || '',
            completed: series.completed || false,
            games: [],
            teams: {}
          };
        }
        seriesMap[key].games.push(ev);

        // Track team wins from series summary
        comp.competitors?.forEach(c => {
          const abbrev = c.team?.abbreviation;
          if (abbrev && !seriesMap[key].teams[abbrev]) {
            seriesMap[key].teams[abbrev] = {
              abbrev,
              name: c.team?.displayName || c.team?.shortDisplayName || abbrev,
              logo: c.team?.logo || LOGO(abbrev),
              seed: c.curatedRank?.current || 0,
              wins: 0
            };
          }
          if (abbrev && seriesMap[key].teams[abbrev]) {
            seriesMap[key].teams[abbrev].logo = c.team?.logo || LOGO(abbrev);
            seriesMap[key].teams[abbrev].seed = c.curatedRank?.current || seriesMap[key].teams[abbrev].seed;
          }
        });

        // Parse series summary for wins (e.g., "BOS leads 2-1" or "Tied 1-1")
        if (series.summary) {
          const m = series.summary.match(/(\w+)\s+leads\s+(\d+)-(\d+)/i)
            || series.summary.match(/(\w+)\s+m[eè]ne\s+(\d+)-(\d+)/i);
          if (m) {
            const leader = m[1];
            Object.values(seriesMap[key].teams).forEach(t => {
              if (t.abbrev === leader) t.wins = parseInt(m[2]);
              else t.wins = parseInt(m[3]);
            });
          }
          const tied = series.summary.match(/[ÉETt]gal(?:it[ée]|ed)?\s+(\d+)-(\d+)/i)
            || series.summary.match(/[Tt]ied\s+(\d+)-(\d+)/i);
          if (tied) {
            Object.values(seriesMap[key].teams).forEach(t => {
              t.wins = parseInt(tied[1]);
            });
          }
          const wins = series.summary.match(/(\w+)\s+(?:wins|gagne)\s+(\d+)-(\d+)/i);
          if (wins) {
            Object.values(seriesMap[key].teams).forEach(t => {
              if (t.abbrev === wins[1]) t.wins = parseInt(wins[2]);
              else t.wins = parseInt(wins[3]);
            });
          }
        }
      }
    });
  }

  // Sort games in each series
  Object.values(seriesMap).forEach(s => {
    s.games.sort((a, b) => new Date(a.date) - new Date(b.date));
  });

  return buildBracketFromSeries();
}

function buildBracketFromSeries() {
  const east = [], west = [];
  const letters = 'ABCDEFGHIJKLMNOP';
  let idx = 0;

  Object.values(seriesMap).forEach(s => {
    const teams = Object.values(s.teams);
    if (teams.length < 2) return;

    const t1 = teams[0], t2 = teams[1];
    // Determine conference from series title
    const title = (s.title || '').toLowerCase();
    const isEast = title.includes('east') || title.includes('est');
    const isWest = title.includes('west') || title.includes('ouest');

    const entry = {
      top: { a: t1.abbrev, n: t1.name, s: t1.seed, w: t1.wins, logo: t1.logo },
      bot: { a: t2.abbrev, n: t2.name, s: t2.seed, w: t2.wins, logo: t2.logo },
      letter: letters[idx++],
      seriesId: s.id,
      round: title.includes('first') || title.includes('1') ? 1 : title.includes('semi') || title.includes('2') ? 2 : title.includes('conference final') ? 3 : title.includes('nba final') || title.includes('finale') ? 4 : 1,
    };

    if (isEast) east.push(entry);
    else if (isWest) west.push(entry);
    else if (east.length <= west.length) east.push(entry);
    else west.push(entry);
  });

  // Sort by round then seed
  east.sort((a, b) => a.round - b.round || a.top.s - b.top.s);
  west.sort((a, b) => a.round - b.round || a.top.s - b.top.s);

  return { east, west };
}

// =============================================
// RENDER BRACKET
// =============================================
function renderBracket(data) {
  const c = document.getElementById('bracketContainer');
  const tbd = { a: '', n: '?', s: 0, w: 0 };
  const tbdS = { top: tbd, bot: tbd };

  const eastR1 = data.east.filter(s => s.round === 1);
  const eastR2 = data.east.filter(s => s.round === 2);
  const eastR3 = data.east.filter(s => s.round === 3);
  const westR1 = data.west.filter(s => s.round === 1);
  const westR2 = data.west.filter(s => s.round === 2);
  const westR3 = data.west.filter(s => s.round === 3);
  const finals = [...data.east, ...data.west].filter(s => s.round === 4);

  const fillTo = (arr, n) => { while (arr.length < n) arr.push(tbdS); return arr; };

  c.innerHTML = `
    <div class="conference east">
      <div class="conference-label">Est</div>
      <div class="rounds">
        <div class="round r1"><div class="round-label">1re ronde</div>${fillTo(eastR1, 4).map(s => matchupHTML(s)).join('')}</div>
        <div class="round r2"><div class="round-label">Demi-finales</div>${fillTo(eastR2, 2).map(s => matchupHTML(s)).join('')}</div>
        <div class="round r3"><div class="round-label">Finale conf.</div>${fillTo(eastR3, 1).map(s => matchupHTML(s)).join('')}</div>
      </div>
    </div>
    <div class="cup-center">
      <div class="trophy-icon">🏆</div>
      <div class="cup-label">NBA<br>Finals</div>
      <div style="margin-top:15px">${matchupHTML(finals[0] || tbdS)}</div>
    </div>
    <div class="conference west">
      <div class="conference-label">Ouest</div>
      <div class="rounds">
        <div class="round r1"><div class="round-label">1re ronde</div>${fillTo(westR1, 4).map(s => matchupHTML(s)).join('')}</div>
        <div class="round r2"><div class="round-label">Demi-finales</div>${fillTo(westR2, 2).map(s => matchupHTML(s)).join('')}</div>
        <div class="round r3"><div class="round-label">Finale conf.</div>${fillTo(westR3, 1).map(s => matchupHTML(s)).join('')}</div>
      </div>
    </div>`;
}

function matchupHTML(s) {
  const t = s.top, b = s.bot, tw = t.w === 4, bw = b.w === 4, tbd = !t.a && !b.a;
  const placeholder = '<span style="width:44px;height:44px;display:inline-block;background:rgba(200,16,46,0.08);border-radius:8px;border:2px dashed rgba(200,16,46,0.2);"></span>';
  const clickAttr = (t.a && b.a && s.seriesId) ? `onclick="openSeriesModal('${s.seriesId}')"` : '';
  const logoT = t.logo || LOGO(t.a);
  const logoB = b.logo || LOGO(b.a);

  return `<div class="matchup" ${clickAttr}>
    <div class="team-row ${tw ? 'winner' : ''} ${bw ? 'eliminated' : ''}">
      <span class="seed">${t.s || '-'}</span>
      ${t.a ? `<img class="team-logo" src="${logoT}" onerror="this.style.display='none'">` : placeholder}
      <span class="team-abbrev">${t.a || '?'}</span>
      <span class="team-wins-num ${t.w > 0 ? 'has-wins' : ''}">${tbd ? '-' : t.w}</span>
    </div>
    <div class="team-row ${bw ? 'winner' : ''} ${tw ? 'eliminated' : ''}">
      <span class="seed">${b.s || '-'}</span>
      ${b.a ? `<img class="team-logo" src="${logoB}" onerror="this.style.display='none'">` : placeholder}
      <span class="team-abbrev">${b.a || '?'}</span>
      <span class="team-wins-num ${b.w > 0 ? 'has-wins' : ''}">${tbd ? '-' : b.w}</span>
    </div>
  </div>`;
}

// =============================================
// SERIES MODAL
// =============================================
async function openSeriesModal(seriesId) {
  const series = seriesMap[seriesId];
  if (!series) return;

  const modal = document.getElementById('seriesModal');
  const content = document.getElementById('modalContent');
  const teams = Object.values(series.teams);
  const t = teams[0] || { abbrev: '?', name: '?', wins: 0, logo: '' };
  const b = teams[1] || { abbrev: '?', name: '?', wins: 0, logo: '' };

  let gamesHTML = '';

  series.games.forEach((ev, i) => {
    const comp = ev.competitions?.[0];
    const home = comp?.competitors?.find(c => c.homeAway === 'home');
    const away = comp?.competitors?.find(c => c.homeAway === 'away');
    const status = comp?.status;
    const isFinal = status?.type?.completed;
    const isLive = status?.type?.name === 'STATUS_IN_PROGRESS';
    const gameDate = new Date(ev.date).toLocaleDateString('fr-CA', { day: 'numeric', month: 'short.' });

    let badge = '';
    if (isLive) badge = `<span class="modal-game-badge live"><span class="live-pulse"></span>EN COURS</span>`;
    else if (isFinal) badge = `<span class="modal-game-badge final">FINAL</span>`;
    else badge = `<span class="modal-game-badge upcoming">À VENIR</span>`;

    const awayScore = parseInt(away?.score) || 0;
    const homeScore = parseInt(home?.score) || 0;
    const awayW = isFinal && awayScore > homeScore;
    const homeW = isFinal && homeScore > awayScore;

    gamesHTML += `
      <div class="modal-game" data-event-id="${ev.id}" onclick="toggleModalGameDetail(this)">
        <span class="modal-game-num">Match ${i + 1}</span>
        <span class="modal-game-date">${gameDate}</span>
        <div class="modal-game-score">
          <img src="${away?.team?.logo || LOGO(away?.team?.abbreviation || '')}">
          <span class="mg-score ${awayW ? 'winner' : ''}">${isFinal || isLive ? awayScore : '-'}</span>
          <span class="mg-at">@</span>
          <span class="mg-score ${homeW ? 'winner' : ''}">${isFinal || isLive ? homeScore : '-'}</span>
          <img src="${home?.team?.logo || LOGO(home?.team?.abbreviation || '')}">
        </div>
        ${isLive ? `<span style="font-family:'Bungee';font-size:11px;color:var(--nba-gold);">${status?.displayClock || ''} ${status?.period ? 'Q' + status.period : ''}</span>` : ''}
        ${badge}
      </div>
      <div class="modal-game-details" id="mgd-${ev.id}"></div>`;
  });

  // Fill remaining games up to 7
  for (let i = series.games.length; i < 7; i++) {
    const ifNeeded = i >= 4;
    gamesHTML += `
      <div class="modal-game" style="opacity:${ifNeeded ? '0.25' : '0.5'};cursor:default">
        <span class="modal-game-num">Match ${i + 1}</span>
        <div class="modal-game-score">
          <img src="${t.logo || LOGO(t.abbrev)}" style="width:24px;height:24px;opacity:0.4">
          <span class="mg-at">vs</span>
          <img src="${b.logo || LOGO(b.abbrev)}" style="width:24px;height:24px;opacity:0.4">
        </div>
        <span class="modal-game-badge ${ifNeeded ? 'if-needed' : 'upcoming'}">${ifNeeded ? 'SI NÉC.' : 'À VENIR'}</span>
      </div>`;
  }

  content.innerHTML = `
    <div class="modal-header">
      <button class="modal-close" onclick="closeSeriesModal()">&times;</button>
      <div class="modal-team">
        <img src="${t.logo || LOGO(t.abbrev)}">
        <div class="modal-team-name">${t.name}</div>
        <div class="modal-team-record">${t.wins}</div>
      </div>
      <div class="modal-vs">VS</div>
      <div class="modal-team">
        <img src="${b.logo || LOGO(b.abbrev)}">
        <div class="modal-team-name">${b.name}</div>
        <div class="modal-team-record">${b.wins}</div>
      </div>
    </div>
    <div class="modal-series-label">${series.title || 'SÉRIE'} — MEILLEUR DE 7</div>
    <div class="modal-games">${gamesHTML}</div>
  `;

  modal.classList.add('open');
}

function closeSeriesModal() {
  document.getElementById('seriesModal').classList.remove('open');
}

document.getElementById('seriesModal').addEventListener('click', function(e) {
  if (e.target === this) closeSeriesModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSeriesModal(); });

async function toggleModalGameDetail(el) {
  const eventId = el.dataset.eventId;
  if (!eventId) return;

  const detailDiv = document.getElementById('mgd-' + eventId);
  if (!detailDiv) return;

  if (detailDiv.classList.contains('open')) {
    detailDiv.classList.remove('open');
    return;
  }

  if (!detailDiv.innerHTML.trim()) {
    detailDiv.innerHTML = '<div class="modal-no-data">Chargement...</div>';
    detailDiv.classList.add('open');
    const summary = await apiFetch(API.summary(eventId));
    detailDiv.innerHTML = renderGameSummary(summary);
  }
  detailDiv.classList.toggle('open');
}

// =============================================
// RENDER GAME SUMMARY
// =============================================
function renderGameSummary(summary) {
  if (!summary) return '<div class="no-data">Données non disponibles</div>';

  let html = '';
  const boxscore = summary.boxscore;

  // Top performers
  if (boxscore?.players) {
    boxscore.players.forEach(teamData => {
      const teamName = teamData.team?.displayName || '';
      const teamLogo = teamData.team?.logo || '';
      const stats = teamData.statistics?.[0];
      if (!stats?.athletes) return;

      html += `<div class="period-scoring"><div class="period-label">${teamName}</div>`;
      // Show top 3 scorers
      const athletes = stats.athletes.slice(0, 5);
      athletes.forEach(a => {
        const playerStats = a.stats || [];
        // ESPN NBA stats order: MIN, FG, 3PT, FT, OREB, DREB, REB, AST, STL, BLK, TO, PF, PTS
        const pts = playerStats[12] || playerStats[playerStats.length - 1] || '0';
        const reb = playerStats[6] || '0';
        const ast = playerStats[7] || '0';

        html += `
          <div class="scorer-row">
            <img class="scorer-team-logo" src="${teamLogo}" onerror="this.style.display='none'">
            <img class="leader-mugshot" src="${a.athlete?.headshot?.href || ''}" onerror="this.style.display='none'">
            <span class="scorer-name">${a.athlete?.displayName || ''}</span>
            <span class="scorer-stats">${pts} PTS ${reb} REB ${ast} AST</span>
          </div>`;
      });
      html += '</div>';
    });
  }

  return html || '<div class="no-data">Détails non disponibles</div>';
}

// =============================================
// RENDER RESULTS
// =============================================
function renderResults(data) {
  const c = document.getElementById('resultsContainer');

  const allSeries = Object.values(seriesMap);
  const eastSeries = allSeries.filter(s => (s.title || '').toLowerCase().includes('east'));
  const westSeries = allSeries.filter(s => (s.title || '').toLowerCase().includes('west'));
  const finalsSeries = allSeries.filter(s => {
    const t = (s.title || '').toLowerCase();
    return t.includes('nba final') || t.includes('finale nba');
  });
  // Catch unclassified
  const classified = new Set([...eastSeries, ...westSeries, ...finalsSeries].map(s => s.id));
  const other = allSeries.filter(s => !classified.has(s.id));

  let html = '';

  if (eastSeries.length) {
    html += `<div class="conf-section"><div class="conf-title">Conférence de l'Est</div>${eastSeries.map(s => seriesCardHTML(s)).join('')}</div>`;
  }
  if (westSeries.length) {
    html += `<div class="conf-section"><div class="conf-title">Conférence de l'Ouest</div>${westSeries.map(s => seriesCardHTML(s)).join('')}</div>`;
  }
  if (finalsSeries.length) {
    html += `<div class="conf-section"><div class="conf-title">Finales NBA</div>${finalsSeries.map(s => seriesCardHTML(s)).join('')}</div>`;
  }
  if (other.length) {
    html += `<div class="conf-section"><div class="conf-title">Séries</div>${other.map(s => seriesCardHTML(s)).join('')}</div>`;
  }

  if (!html) {
    html = '<div class="no-data">Les séries commencent bientôt! Revenez pour les résultats.</div>';
  }

  c.innerHTML = html;

  // Attach handlers
  c.querySelectorAll('.series-header').forEach(h => {
    h.addEventListener('click', () => h.closest('.series-card').classList.toggle('open'));
  });

  c.querySelectorAll('.game-card-header[data-event-id]').forEach(h => {
    h.addEventListener('click', async (e) => {
      e.stopPropagation();
      const card = h.closest('.game-card');
      const eventId = h.dataset.eventId;
      if (!eventId) return;

      if (card.classList.contains('open')) {
        card.classList.remove('open');
        return;
      }

      const detailsDiv = card.querySelector('.game-details');
      if (!detailsDiv.innerHTML.trim()) {
        detailsDiv.innerHTML = '<div class="no-data">Chargement...</div>';
        card.classList.add('open');
        const summary = await apiFetch(API.summary(eventId));
        detailsDiv.innerHTML = renderGameSummary(summary);
      }
      card.classList.toggle('open');
    });
  });
}

function seriesCardHTML(series) {
  const teams = Object.values(series.teams);
  const t = teams[0] || { abbrev: '?', name: '?', wins: 0, logo: '' };
  const b = teams[1] || { abbrev: '?', name: '?', wins: 0, logo: '' };
  const total = t.wins + b.wins;

  let status = series.summary || '';
  if (!status) {
    if (t.wins === 4) status = `${t.name} gagne en ${total}`;
    else if (b.wins === 4) status = `${b.name} gagne en ${total}`;
    else if (total === 0) status = 'À venir';
    else if (t.wins === b.wins) status = `Égalité ${t.wins}-${b.wins}`;
    else { const l = t.wins > b.wins ? t : b; status = `${l.abbrev} mène ${l.wins}-${Math.min(t.wins, b.wins)}`; }
  }

  const dots = w => Array(4).fill(0).map((_, i) => `<div class="dot ${i < w ? 'won' : ''}"></div>`).join('');

  let gamesHTML = '';
  series.games.forEach((ev, i) => {
    const comp = ev.competitions?.[0];
    const home = comp?.competitors?.find(c => c.homeAway === 'home');
    const away = comp?.competitors?.find(c => c.homeAway === 'away');
    const st = comp?.status;
    const isFinal = st?.type?.completed;
    const isLive = st?.type?.name === 'STATUS_IN_PROGRESS';

    let badge = '';
    if (isLive) badge = `<span class="game-status-badge live"><span class="live-pulse"></span>EN COURS</span>`;
    else if (isFinal) badge = `<span class="game-status-badge final">FINAL</span>`;
    else badge = `<span class="game-status-badge upcoming">À VENIR</span>`;

    const awayScore = parseInt(away?.score) || 0;
    const homeScore = parseInt(home?.score) || 0;
    const awayW = isFinal && awayScore > homeScore;
    const homeW = isFinal && homeScore > awayScore;

    gamesHTML += `
      <div class="game-card">
        <div class="game-card-header" data-event-id="${ev.id}">
          <span class="game-num">Match ${i + 1}</span>
          <div class="game-mini-score">
            <img src="${away?.team?.logo || LOGO(away?.team?.abbreviation || '')}" style="width:22px;height:22px">
            <span class="score-val ${awayW ? 'winner-score' : ''}">${isFinal || isLive ? awayScore : '-'}</span>
            <span class="vs-label">@</span>
            <span class="score-val ${homeW ? 'winner-score' : ''}">${isFinal || isLive ? homeScore : '-'}</span>
            <img src="${home?.team?.logo || LOGO(home?.team?.abbreviation || '')}" style="width:22px;height:22px">
          </div>
          ${isLive ? `<span style="font-family:'Bungee';font-size:12px;color:var(--nba-gold);">${st?.displayClock || ''} Q${st?.period || ''}</span>` : ''}
          ${badge}
        </div>
        <div class="game-details"></div>
      </div>`;
  });

  if (!gamesHTML) {
    gamesHTML = '<div class="no-data">Aucun match joué</div>';
  }

  return `
    <div class="series-card">
      <div class="series-header">
        <div class="series-letter-badge">${(series.title || '').charAt(0) || '?'}</div>
        <div class="series-teams">
          <div class="series-team ${b.wins === 4 ? 'eliminated' : ''}">
            <img src="${t.logo || LOGO(t.abbrev)}">
            <span class="name">${t.name}</span>
            <div class="dots">${dots(t.wins)}</div>
            <span class="record ${t.wins > b.wins ? 'leading' : ''}">${t.wins}</span>
          </div>
          <div class="series-team ${t.wins === 4 ? 'eliminated' : ''}">
            <img src="${b.logo || LOGO(b.abbrev)}">
            <span class="name">${b.name}</span>
            <div class="dots">${dots(b.wins)}</div>
            <span class="record ${b.wins > t.wins ? 'leading' : ''}">${b.wins}</span>
          </div>
        </div>
        <div class="series-status">
          <div class="status-label">${series.title || 'SÉRIE'}</div>
          <div class="status-text">${status}</div>
        </div>
      </div>
      <div class="series-games">${gamesHTML}</div>
    </div>`;
}

// =============================================
// RENDER LEADERS
// =============================================
async function renderLeaders() {
  const c = document.getElementById('leadersContainer');
  const data = await apiFetch(API.leaders);

  if (!data || !data.leaders) {
    c.innerHTML = '<div class="no-data">Les meneurs seront disponibles une fois les séries commencées!</div>';
    return;
  }

  let html = '<div class="leaders-grid">';

  data.leaders.forEach(cat => {
    const label = cat.displayName || cat.name || '';
    const leaders = cat.leaders || [];

    html += `<div class="leader-section"><div class="leader-section-title">${label}</div>`;
    if (leaders.length === 0) {
      html += '<div class="no-data">Pas encore de données</div>';
    } else {
      leaders.slice(0, 10).forEach((l, i) => {
        const athlete = l.athlete || {};
        html += `
          <div class="leader-row">
            <span class="leader-rank ${i === 0 ? 'gold' : ''}">${i + 1}</span>
            <img class="leader-mugshot" src="${athlete.headshot?.href || ''}" onerror="this.style.display='none'">
            <div class="leader-info">
              <div class="leader-name">${athlete.displayName || ''}</div>
              <div class="leader-team-info">
                <img src="${athlete.team?.logos?.[0]?.href || ''}">
                ${athlete.team?.abbreviation || ''}
              </div>
            </div>
            <span class="leader-value">${l.displayValue || l.value || ''}</span>
          </div>`;
      });
    }
    html += '</div>';
  });

  html += '</div>';
  c.innerHTML = html;
}

// =============================================
// ZOOM (TNI / Gymnase)
// =============================================
let currentZoom = 100;
const ZOOM_STEPS = [75, 100, 125, 150, 175, 200];

function setZoom(action) {
  const idx = ZOOM_STEPS.indexOf(currentZoom);
  if (action === 'in' && idx < ZOOM_STEPS.length - 1) currentZoom = ZOOM_STEPS[idx + 1];
  else if (action === 'out' && idx > 0) currentZoom = ZOOM_STEPS[idx - 1];
  else if (action === 'reset') currentZoom = 100;
  applyZoom();
}

function applyZoom() {
  document.getElementById('zoomLevel').textContent = currentZoom + '%';
  const scale = currentZoom / 100;
  document.querySelectorAll('.header, .view, .footer').forEach(el => {
    el.style.transform = scale === 1 ? '' : `scale(${scale})`;
    el.style.transformOrigin = 'top center';
  });
  if (scale > 1) document.body.style.paddingBottom = ((scale - 1) * 100) + 'vh';
  else document.body.style.paddingBottom = '';
}

  createParticles();

  bracketData = await fetchPlayoffData();
  renderBracket(bracketData);
  renderResults(bracketData);
  renderLeaders();

  // Auto-refresh every 2 minutes
  setInterval(refreshAll, 2 * 60 * 1000);
}
