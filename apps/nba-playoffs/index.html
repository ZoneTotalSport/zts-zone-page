<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --nba-blue: #1D428A;
    --nba-red: #C8102E;
    --nba-gold: #FDB927;
    --nba-dark: #0f1528;
    --blanc: #FFFFFF;
    --vert: #2ECC71;
    --orange: #FF6B35;
    --glow-red: 0 0 20px rgba(200,16,46,0.4), 0 0 60px rgba(200,16,46,0.15);
    --glow-gold: 0 0 20px rgba(253,185,39,0.4), 0 0 60px rgba(253,185,39,0.15);
  }

  body {
    font-family: 'Righteous', sans-serif;
    background: var(--nba-dark);
    color: var(--blanc);
    min-height: 100vh;
    overflow-x: auto;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(200,16,46,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 0%, rgba(253,185,39,0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 100%, rgba(29,66,138,0.12) 0%, transparent 50%);
    position: relative;
  }

  /* ===== NBA LOGOS BACKGROUND — GROS, COULEURS VIVES ===== */
  .nba-bg-pattern {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0;
    opacity: 1;
    pointer-events: none;
    display: grid;
    grid-template-columns: repeat(auto-fill, 280px);
    grid-template-rows: repeat(auto-fill, 280px);
    gap: 30px;
    padding: 30px;
    align-content: start;
    overflow: hidden;
  }
  .nba-bg-pattern img {
    width: 240px;
    height: 240px;
    object-fit: contain;
    opacity: 0.15;
    border-radius: 16px;
    padding: 8px;
  }

  /* ===== ZOOM CONTROLS (TNI) ===== */
  .zoom-controls {
    position: fixed;
    top: 50%;
    right: 12px;
    transform: translateY(-50%);
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .zoom-btn {
    width: 44px; height: 44px;
    border-radius: 12px;
    border: 2px solid rgba(200,16,46,0.3);
    background: linear-gradient(135deg, rgba(200,16,46,0.2), rgba(29,66,138,0.5));
    color: var(--nba-gold);
    font-family: 'Bungee', cursive;
    font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
  }
  .zoom-btn:hover { box-shadow: var(--glow-red); transform: scale(1.1); }
  .zoom-label { text-align: center; font-family: 'Bangers', cursive; font-size: 11px; color: rgba(253,185,39,0.5); letter-spacing: 1px; }

  /* ===== HEADER ===== */
  .header {
    text-align: center;
    padding: 25px 20px 0;
    position: relative;
    background: rgba(15,21,40,0.98);
    z-index: 10;
  }
  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, var(--nba-red), var(--nba-gold), var(--nba-blue), var(--nba-gold), var(--nba-red));
  }
  .header-top {
    display: flex; align-items: center; justify-content: center;
    gap: 20px; margin-bottom: 10px;
  }
  .nba-logo-header {
    height: 90px;
    filter: drop-shadow(0 4px 15px rgba(253,185,39,0.4));
  }
  .header h1 {
    font-family: 'Luckiest Guy', cursive;
    font-size: 52px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--blanc);
    text-shadow: 0 0 20px rgba(253,185,39,0.4), 3px 3px 0 var(--nba-blue);
    line-height: 1.1;
  }
  .header h1 span {
    color: var(--nba-red);
    text-shadow: 0 0 20px rgba(200,16,46,0.5), 3px 3px 0 rgba(0,0,0,0.5);
  }
  .subtitle {
    font-family: 'Barriecito', cursive;
    color: var(--nba-gold);
    font-size: 20px;
    letter-spacing: 2px;
    margin-top: 5px;
  }
  .zts-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--nba-red), #8B0000);
    color: var(--blanc);
    font-family: 'Bangers', cursive;
    font-size: 14px;
    padding: 4px 16px;
    border-radius: 20px;
    letter-spacing: 2px;
    margin-top: 8px;
    box-shadow: var(--glow-red);
  }

  /* ===== TABS ===== */
  .tabs { display: flex; justify-content: center; gap: 0; margin: 20px auto 0; max-width: 800px; }
  .tab {
    padding: 14px 32px;
    font-family: 'Bangers', cursive;
    font-size: 24px;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    color: rgba(253,185,39,0.35);
    border: none;
    border-bottom: 3px solid transparent;
    background: none;
    transition: all 0.3s;
  }
  .tab:hover { color: var(--nba-gold); }
  .tab.active { color: var(--nba-gold); border-bottom-color: var(--nba-red); text-shadow: 0 0 15px rgba(253,185,39,0.5); }

  /* ===== VIEWS ===== */
  .view { display: none; position: relative; z-index: 5; }
  .view.active { display: block; }

  /* ===== BRACKET ===== */
  .bracket-container {
    display: flex; align-items: center; justify-content: center;
    padding: 15px 10px 40px; gap: 0;
    min-width: 1500px; max-width: 1900px; margin: 0 auto;
  }
  .conference { flex: 1; }
  .conference-label {
    text-align: center;
    font-family: 'Luckiest Guy', cursive;
    font-size: 44px;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: var(--nba-gold);
    padding: 14px 20px;
    text-shadow: 0 0 15px rgba(253,185,39,0.3);
    background: rgba(15,21,40,0.97);
    border-radius: 10px;
    margin: 0 10px 10px;
  }
  .rounds { display: flex; align-items: stretch; min-height: 650px; gap: 10px; }
  .east .rounds { flex-direction: row; }
  .west .rounds { flex-direction: row-reverse; }
  .round { display: flex; flex-direction: column; justify-content: space-around; min-width: 360px; padding: 0 2px; }
  .round-label {
    text-align: center; font-family: 'Bangers', cursive; font-size: 28px;
    text-transform: uppercase; letter-spacing: 2px; color: var(--nba-red);
    margin-bottom: 8px; background: rgba(15,21,40,0.9); padding: 8px 12px;
    border-radius: 6px; text-shadow: 0 0 10px rgba(200,16,46,0.3);
  }
  .round.r1 { gap: 8px; justify-content: center; }
  .round.r2 { justify-content: space-around; padding: 20px 0; }
  .round.r3 { justify-content: center; }

  /* ===== MATCHUP CARD — GROS POUR TNI ===== */
  .matchup {
    background: rgba(255,255,255,0.92);
    border-radius: 16px;
    overflow: hidden;
    border: 4px solid rgba(200,16,46,0.3);
    width: 340px;
    margin: 0 auto;
    transition: all 0.3s;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .matchup:hover {
    border-color: rgba(253,185,39,0.7);
    box-shadow: var(--glow-gold), 0 6px 25px rgba(0,0,0,0.6);
    transform: scale(1.04);
  }
  .team-row {
    display: flex; align-items: center;
    padding: 12px 14px; gap: 12px;
    transition: all 0.3s;
  }
  .team-row:first-child { border-bottom: 2px solid rgba(0,0,0,0.1); }
  .team-row.winner { background: linear-gradient(90deg, rgba(46,204,113,0.25), transparent); }
  .team-row.eliminated { opacity: 0.35; }
  .seed {
    font-family: 'Bungee', cursive; font-size: 30px;
    color: var(--nba-blue); width: 38px; text-align: center;
  }
  .team-logo {
    width: 95px; height: 95px;
    object-fit: contain;
    filter: drop-shadow(0 3px 8px rgba(0,0,0,0.5));
  }
  .team-abbrev {
    font-family: 'Luckiest Guy', cursive;
    font-size: 36px; color: #1a1a2e;
    flex: 1; letter-spacing: 1px;
  }
  .team-wins-num {
    font-family: 'Bungee', cursive; font-size: 44px;
    width: 48px; text-align: center;
    color: rgba(0,0,0,0.2);
  }
  .team-wins-num.has-wins { color: #1a8a3e; text-shadow: none; }
  .matchup.tbd {
    width: 200px; border: 2px dashed rgba(200,16,46,0.25); background: rgba(255,255,255,0.06);
    box-shadow: none; cursor: default; opacity: 0.85;
  }
  .matchup.tbd:hover { transform: none; border-color: rgba(200,16,46,0.35); box-shadow: none; }
  .matchup.tbd .team-row { padding: 8px 10px; gap: 8px; }
  .matchup.tbd .team-row:first-child { border-bottom: 1px solid rgba(255,255,255,0.08); }
  .matchup.tbd .seed { font-size: 18px; width: 22px; color: rgba(200,16,46,0.45); }
  .matchup.tbd .team-logo, .matchup.tbd .team-abbrev { display: none; }
  .matchup.tbd .tbd-label {
    font-family: 'Bangers', cursive; font-size: 20px; color: rgba(200,16,46,0.6);
    flex: 1; letter-spacing: 2px; text-align: center;
  }
  .matchup.tbd .team-wins-num { font-size: 22px; width: 28px; color: rgba(255,255,255,0.15); }

  /* Trophy */
  .cup-center {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-width: 220px; padding: 20px 10px;
    background: rgba(15,21,40,0.97); border-radius: 14px;
    margin: 0 5px; align-self: center;
  }
  .cup-center .trophy-icon {
    font-size: 80px;
    filter: drop-shadow(0 0 30px rgba(253,185,39,0.5));
    margin-bottom: 10px;
  }
  .cup-label {
    font-family: 'Bungee Shade', cursive; font-size: 18px;
    text-transform: uppercase; color: var(--nba-gold);
    text-align: center; text-shadow: 0 0 15px rgba(253,185,39,0.4);
  }

  /* ===== RESULTS VIEW ===== */
  .results-container { max-width: 950px; margin: 0 auto; padding: 20px 20px 60px; }
  .conf-section { margin-bottom: 30px; }
  .conf-title {
    font-family: 'Luckiest Guy', cursive; font-size: 20px;
    text-transform: uppercase; letter-spacing: 4px;
    color: var(--nba-gold); padding: 14px 18px;
    border-bottom: 3px solid rgba(200,16,46,0.3);
    margin-bottom: 15px; background: rgba(15,21,40,0.97);
    border-radius: 10px 10px 0 0;
  }

  /* ===== SERIES CARD ===== */
  .series-card {
    background: rgba(15,21,40,0.97); border-radius: 12px;
    border: 2px solid rgba(200,16,46,0.2); margin-bottom: 12px;
    overflow: hidden; transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  }
  .series-card:hover { border-color: rgba(253,185,39,0.4); }
  .series-header {
    display: flex; align-items: center;
    padding: 16px 20px; gap: 15px; cursor: pointer;
  }
  .series-letter-badge {
    font-family: 'Bungee', cursive; font-size: 18px; color: var(--blanc);
    background: linear-gradient(135deg, var(--nba-red), var(--nba-blue));
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; box-shadow: 0 0 15px rgba(200,16,46,0.3);
  }
  .series-teams { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .series-team { display: flex; align-items: center; gap: 10px; }
  .series-team img {
    width: 44px; height: 44px; object-fit: contain;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
  }
  .series-team .name { font-family: 'Righteous', sans-serif; font-size: 16px; flex: 1; }
  .series-team.eliminated .name { color: #555; }
  .dots { display: flex; gap: 5px; }
  .dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
  }
  .dot.won { background: var(--vert); border-color: var(--vert); box-shadow: 0 0 8px rgba(46,204,113,0.5); }
  .series-team .record {
    font-family: 'Bungee', cursive; font-size: 24px;
    width: 30px; text-align: center; color: rgba(255,255,255,0.2);
  }
  .series-team .record.leading { color: var(--vert); text-shadow: 0 0 12px rgba(46,204,113,0.5); }
  .series-status { text-align: right; min-width: 140px; flex-shrink: 0; }
  .series-status .status-label { font-family: 'Bangers', cursive; color: rgba(253,185,39,0.5); font-size: 13px; letter-spacing: 2px; }
  .series-status .status-text { font-family: 'Barriecito', cursive; color: var(--nba-gold); font-size: 16px; margin-top: 3px; }

  /* ===== GAMES DROPDOWN ===== */
  .series-games { display: none; background: rgba(0,0,0,0.3); border-top: 1px solid rgba(200,16,46,0.1); }
  .series-card.open .series-games { display: block; }
  .game-card { border-bottom: 1px solid rgba(200,16,46,0.06); }
  .game-card:last-child { border-bottom: none; }
  .game-card-header { display: flex; align-items: center; padding: 10px 20px; cursor: pointer; gap: 12px; }
  .game-card-header:hover { background: rgba(200,16,46,0.04); }
  .game-num { font-family: 'Bangers', cursive; color: var(--nba-red); font-size: 15px; width: 75px; letter-spacing: 1px; }
  .game-date-label { font-family: 'Righteous'; color: rgba(255,255,255,0.3); font-size: 12px; width: 80px; }
  .game-mini-score { flex: 1; display: flex; align-items: center; gap: 8px; font-family: 'Bungee', cursive; font-size: 15px; }
  .game-mini-score img { width: 26px; height: 26px; }
  .game-mini-score .score-val { min-width: 22px; text-align: center; }
  .game-mini-score .score-val.winner-score { color: var(--vert); }
  .game-mini-score .vs-label { color: rgba(200,16,46,0.25); font-family: 'Bangers'; font-size: 13px; }
  .game-status-badge { font-family: 'Bangers', cursive; font-size: 13px; padding: 4px 12px; border-radius: 12px; letter-spacing: 1px; }
  .game-status-badge.final { background: rgba(46,204,113,0.15); color: var(--vert); }
  .game-status-badge.live { background: rgba(200,16,46,0.2); color: var(--nba-red); }
  .game-status-badge.upcoming { background: rgba(253,185,39,0.1); color: var(--nba-gold); }
  .live-pulse { display: inline-block; width: 8px; height: 8px; background: var(--nba-red); border-radius: 50%; margin-right: 5px; animation: pulse 1.5s ease infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* ===== GAME DETAILS ===== */
  .game-details { display: none; padding: 0 20px 15px; margin-left: 75px; }
  .game-card.open .game-details { display: block; }
  .period-label { font-family: 'Bangers', cursive; font-size: 13px; color: var(--nba-gold); letter-spacing: 2px; padding: 6px 0 4px; border-bottom: 1px solid rgba(253,185,39,0.1); margin-bottom: 6px; }
  .scorer-row { display: flex; align-items: center; gap: 10px; padding: 5px 0; font-size: 13px; }
  .scorer-team-logo { width: 20px; height: 20px; }
  .leader-mugshot { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(200,16,46,0.2); background: rgba(0,0,0,0.3); }
  .scorer-name { font-family: 'Luckiest Guy', cursive; font-size: 14px; color: var(--blanc); flex: 1; }
  .scorer-stats { font-family: 'Bungee', cursive; font-size: 12px; color: var(--nba-gold); }
  .no-data { text-align: center; padding: 20px; font-family: 'Barriecito', cursive; color: rgba(255,255,255,0.3); font-size: 15px; }

  /* ===== LEADERS VIEW ===== */
  .leaders-container { max-width: 950px; margin: 0 auto; padding: 20px 20px 60px; }
  .leaders-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 25px; }
  .leader-section { background: rgba(15,21,40,0.97); border-radius: 12px; border: 2px solid rgba(200,16,46,0.2); padding: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
  .leader-section-title { font-family: 'Luckiest Guy', cursive; font-size: 17px; color: var(--nba-red); text-align: center; margin-bottom: 12px; }
  .leader-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .leader-row:last-child { border-bottom: none; }
  .leader-rank { font-family: 'Bungee', cursive; font-size: 14px; color: var(--nba-red); width: 24px; text-align: center; }
  .leader-rank.gold { color: var(--nba-gold); }
  .leader-info { flex: 1; }
  .leader-name { font-family: 'Luckiest Guy', cursive; font-size: 13px; }
  .leader-team-info { font-family: 'Barriecito', cursive; font-size: 11px; color: rgba(255,255,255,0.35); display: flex; align-items: center; gap: 4px; }
  .leader-team-info img { width: 16px; height: 16px; }
  .leader-value { font-family: 'Bungee', cursive; font-size: 20px; color: var(--nba-gold); min-width: 40px; text-align: center; }

  /* ===== SERIES MODAL — GROS TEXTE GYMNASE ===== */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(6px); }
  .modal-overlay.open { display: flex; }
  .modal { background: linear-gradient(135deg, #121d36 0%, #0f1528 100%); border: 2px solid rgba(200,16,46,0.3); border-radius: 16px; width: 90%; max-width: 750px; max-height: 85vh; overflow-y: auto; box-shadow: 0 0 50px rgba(200,16,46,0.2), 0 20px 60px rgba(0,0,0,0.5); animation: modalIn 0.25s ease; }
  @keyframes modalIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-header { display: flex; align-items: center; justify-content: center; padding: 25px 30px; gap: 20px; border-bottom: 1px solid rgba(200,16,46,0.15); position: relative; }
  .modal-team { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
  .modal-team img { width: 90px; height: 90px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.4)); }
  .modal-team .modal-team-name { font-family: 'Luckiest Guy', cursive; font-size: 28px; text-align: center; }
  .modal-team .modal-team-record { font-family: 'Bungee', cursive; font-size: 48px; color: var(--nba-gold); text-shadow: 0 0 15px rgba(253,185,39,0.3); }
  .modal-vs { font-family: 'Bungee Shade', cursive; font-size: 32px; color: var(--nba-red); opacity: 0.5; }
  .modal-close { position: absolute; top: 12px; right: 15px; background: none; border: none; color: rgba(255,255,255,0.4); font-size: 36px; cursor: pointer; font-family: sans-serif; padding: 8px; }
  .modal-close:hover { color: var(--nba-gold); }
  .modal-series-label { text-align: center; font-family: 'Bangers', cursive; font-size: 20px; color: rgba(200,16,46,0.5); letter-spacing: 3px; padding: 10px 0 0; }
  .modal-games { padding: 10px 0; }
  .modal-game { display: flex; align-items: center; padding: 14px 30px; gap: 14px; border-bottom: 1px solid rgba(200,16,46,0.06); transition: background 0.2s; cursor: pointer; }
  .modal-game:hover { background: rgba(200,16,46,0.04); }
  .modal-game:last-child { border-bottom: none; }
  .modal-game-num { font-family: 'Bangers', cursive; font-size: 22px; color: var(--nba-red); width: 100px; }
  .modal-game-date { font-family: 'Barriecito', cursive; font-size: 18px; color: rgba(255,255,255,0.3); width: 90px; }
  .modal-game-score { flex: 1; display: flex; align-items: center; justify-content: center; gap: 12px; }
  .modal-game-score img { width: 40px; height: 40px; }
  .modal-game-score .mg-score { font-family: 'Bungee', cursive; font-size: 32px; min-width: 36px; text-align: center; color: rgba(255,255,255,0.3); }
  .modal-game-score .mg-score.winner { color: #00E5FF; text-shadow: 0 0 8px rgba(0,229,255,0.5); }

<script>
// =============================================
// CONFIG & API
// =============================================
const LOGO = abbrev => `https://a.espncdn.com/i/teamlogos/nba/500/${abbrev.toLowerCase()}.png`;

const API = {
  scoreDate: d => `https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard?dates=${d}`,
  summary: id => `https://site.api.espn.com/apis/site/v2/sports/basketball/nba/summary?event=${id}`,
  leaders: 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/leaders',
};

const PROXIES = [
  u => u, // direct first (ESPN supports CORS)
  u => 'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(u),
  u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
];
async function apiFetch(url) {
  for (const proxy of PROXIES) {
    try {
      const r = await fetch(proxy(url));
      if (!r.ok) continue;
      return await r.json();
    } catch(e) { /* try next */ }
  }
  console.warn('API fail (all proxies):', url);
  return null;
}

// =============================================
// FALLBACK BRACKET — VRAIS MATCHUPS 2026
// =============================================
const FALLBACK = {
  east: [
    { top:{a:'DET',n:'Detroit Pistons',s:1,w:0,logo:LOGO('det')}, bot:{a:'ORL',n:'Orlando Magic',s:8,w:0,logo:LOGO('orl')}, letter:'A', round:1 },
    { top:{a:'BOS',n:'Boston Celtics',s:2,w:0,logo:LOGO('bos')}, bot:{a:'PHI',n:'Philadelphia 76ers',s:7,w:0,logo:LOGO('phi')}, letter:'B', round:1 },
    { top:{a:'NY',n:'New York Knicks',s:3,w:0,logo:LOGO('ny')}, bot:{a:'ATL',n:'Atlanta Hawks',s:6,w:0,logo:LOGO('atl')}, letter:'C', round:1 },
    { top:{a:'CLE',n:'Cleveland Cavaliers',s:4,w:0,logo:LOGO('cle')}, bot:{a:'TOR',n:'Toronto Raptors',s:5,w:0,logo:LOGO('tor')}, letter:'D', round:1 },
  ],
  west: [
    { top:{a:'OKC',n:'Oklahoma City Thunder',s:1,w:0,logo:LOGO('okc')}, bot:{a:'PHX',n:'Phoenix Suns',s:8,w:0,logo:LOGO('phx')}, letter:'E', round:1 },
    { top:{a:'SA',n:'San Antonio Spurs',s:2,w:0,logo:LOGO('sa')}, bot:{a:'POR',n:'Portland Trail Blazers',s:7,w:0,logo:LOGO('por')}, letter:'F', round:1 },
    { top:{a:'DEN',n:'Denver Nuggets',s:3,w:0,logo:LOGO('den')}, bot:{a:'MIN',n:'Minnesota Timberwolves',s:6,w:0,logo:LOGO('min')}, letter:'G', round:1 },
    { top:{a:'LAL',n:'Los Angeles Lakers',s:4,w:0,logo:LOGO('lal')}, bot:{a:'HOU',n:'Houston Rockets',s:5,w:0,logo:LOGO('hou')}, letter:'H', round:1 },
  ]
};

const SCHED = {
  A: ['19 avr.','21 avr.','24 avr.','26 avr.','28 avr.','1 mai','3 mai'],
  B: ['19 avr.','22 avr.','24 avr.','27 avr.','29 avr.','1 mai','4 mai'],
  C: ['20 avr.','22 avr.','25 avr.','27 avr.','29 avr.','2 mai','4 mai'],
  D: ['20 avr.','23 avr.','25 avr.','28 avr.','30 avr.','2 mai','5 mai'],
  E: ['19 avr.','21 avr.','24 avr.','26 avr.','28 avr.','1 mai','3 mai'],
  F: ['20 avr.','22 avr.','25 avr.','27 avr.','29 avr.','2 mai','4 mai'],
  G: ['20 avr.','23 avr.','25 avr.','28 avr.','30 avr.','2 mai','5 mai'],
  H: ['21 avr.','23 avr.','26 avr.','28 avr.','30 avr.','3 mai','5 mai'],
};

// =============================================
// BACKGROUND — GROS LOGOS COULEURS VIVES
// =============================================
function createNBABackground() {
  const teams = ['det','orl','bos','phi','ny','atl','cle','tor','okc','phx','sa','por','den','min','lal','hou'];
  const container = document.getElementById('nbaBgPattern');
  if (!container) return;
  teams.forEach(t => {
    const img = document.createElement('img');
    img.src = LOGO(t);
    img.alt = '';
    img.loading = 'lazy';
    img.decoding = 'async';
    container.appendChild(img);
  });
}

// =============================================
// DATA
// =============================================
let bracketData = null;
let seriesMap = {};
let allPlayoffEvents = [];

// =============================================
// FETCH PLAYOFF DATA FROM ESPN
// =============================================
async function fetchPlayoffData() {
  const dates = [];
  const today = new Date();
  for (let i = 0; i < 7; i++) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    dates.push(d.toISOString().split('T')[0].replace(/-/g, ''));
  }
  for (let i = 1; i <= 2; i++) {
    const d = new Date(today); d.setDate(d.getDate() + i);
    dates.push(d.toISOString().split('T')[0].replace(/-/g, ''));
  }

  allPlayoffEvents = [];
  seriesMap = {};

  // Fetch all dates in parallel for speed
  const results = await Promise.all(dates.map(date => apiFetch(API.scoreDate(date))));
  for (const data of results) {
    if (!data || !data.events) continue;
    data.events.forEach(ev => {
      const comp = ev.competitions?.[0];
      const series = comp?.series;
      const isPlayoff = ev.season?.type === 3 || series;
      if (!isPlayoff) return;
      if (allPlayoffEvents.find(e => e.id === ev.id)) return;
      allPlayoffEvents.push(ev);

      if (series) {
        // Build key from team abbreviations (series.id is often empty)
        const teamAbbrs = (comp.competitors || []).map(c => c.team?.abbreviation).filter(Boolean).sort().join('-');
        const key = teamAbbrs || series.id || ev.id;
        if (!seriesMap[key]) {
          seriesMap[key] = { id: key, title: series.title || '', summary: series.summary || '', completed: series.completed || false, games: [], teams: {} };
        }
        if (!seriesMap[key].games.find(g => g.id === ev.id)) seriesMap[key].games.push(ev);
        comp.competitors?.forEach(c => {
          const abbrev = c.team?.abbreviation;
          if (abbrev) {
            seriesMap[key].teams[abbrev] = {
              abbrev, name: c.team?.displayName || abbrev,
              logo: c.team?.logo || LOGO(abbrev),
              seed: c.curatedRank?.current || 0, wins: 0
            };
          }
        });
        // Parse wins from summary
        if (series.summary) {
          const m = series.summary.match(/(\w+)\s+leads?\s+(?:series\s+)?(\d+)-(\d+)/i);
          if (m) { Object.values(seriesMap[key].teams).forEach(t => { t.wins = t.abbrev === m[1] ? +m[2] : +m[3]; }); }
          const tied = series.summary.match(/[Tt]ied\s+(?:series\s+)?(\d+)-(\d+)/i);
          if (tied) { Object.values(seriesMap[key].teams).forEach(t => { t.wins = +tied[1]; }); }
          const wins = series.summary.match(/(\w+)\s+wins?\s+(?:series\s+)?(\d+)-(\d+)/i);
          if (wins) { Object.values(seriesMap[key].teams).forEach(t => { t.wins = t.abbrev === wins[1] ? +wins[2] : +wins[3]; }); }
        }
      }
    });
  }

  Object.values(seriesMap).forEach(s => s.games.sort((a, b) => new Date(a.date) - new Date(b.date)));
  return buildBracketFromAPI();
}

function buildBracketFromAPI() {
  if (Object.keys(seriesMap).length === 0) return FALLBACK;

  // Conference map — all 30 NBA teams
  const EAST_TEAMS = ['ATL','BOS','BKN','CHA','CHI','CLE','DET','IND','MIA','MIL','NY','ORL','PHI','TOR','WSH'];
  const WEST_TEAMS = ['DAL','DEN','GS','HOU','LAC','LAL','MEM','MIN','NOP','OKC','PHX','POR','SAC','SA','UTA'];

  // Seed lookup from FALLBACK
  const seedMap = {};
  [...FALLBACK.east, ...FALLBACK.west].forEach(s => {
    seedMap[s.top.a] = s.top.s;
    seedMap[s.bot.a] = s.bot.s;
  });

  function detectConf(teams) {
    for (const t of teams) {
      if (EAST_TEAMS.includes(t.abbrev)) return 'east';
      if (WEST_TEAMS.includes(t.abbrev)) return 'west';
    }
    return null;
  }

  const east = [], west = [];
  const letters = 'ABCDEFGHIJKLMNOP';
  let idx = 0;

  Object.values(seriesMap).forEach(s => {
    const teams = Object.values(s.teams);
    if (teams.length < 2) return;
    const title = (s.title || '').toLowerCase();
    const isEast = title.includes('east') || detectConf(teams) === 'east';
    const isWest = title.includes('west') || detectConf(teams) === 'west';
    const round = title.includes('first') ? 1 : title.includes('semi') ? 2 : title.includes('conference final') ? 3 : title.includes('nba final') ? 4 : 1;

    // Assign seeds from fallback if API doesn't provide them
    teams.forEach(t => { if (!t.seed) t.seed = seedMap[t.abbrev] || 0; });
    // Sort by seed so higher seed (lower number) is on top
    teams.sort((a, b) => (a.seed || 99) - (b.seed || 99));

    const entry = {
      top: { a: teams[0].abbrev, n: teams[0].name, s: teams[0].seed, w: teams[0].wins, logo: teams[0].logo },
      bot: { a: teams[1].abbrev, n: teams[1].name, s: teams[1].seed, w: teams[1].wins, logo: teams[1].logo },
      letter: letters[idx++], seriesId: s.id, round
    };

    if (isEast) east.push(entry);
    else if (isWest) west.push(entry);
    else if (east.length <= west.length) east.push(entry);
    else west.push(entry);
  });

  // If we found API data but not enough for a full bracket, merge with fallback
  const result = {
    east: east.length >= 4 ? east : [...east, ...FALLBACK.east.slice(east.length)],
    west: west.length >= 4 ? west : [...west, ...FALLBACK.west.slice(west.length)]
  };
  result.east.sort((a, b) => a.round - b.round || (a.top.s || 99) - (b.top.s || 99));
  result.west.sort((a, b) => a.round - b.round || (a.top.s || 99) - (b.top.s || 99));
  return result;
}

// =============================================
// RENDER BRACKET
// =============================================
function renderBracket(data) {
  const c = document.getElementById('bracketContainer');
  const tbd = { a: '', n: '?', s: 0, w: 0 };
  const tbdS = { top: tbd, bot: tbd };
  const fill = (arr, n) => { while (arr.length < n) arr.push(tbdS); return arr; };

  const eR1 = data.east.filter(s => !s.round || s.round === 1);
  const eR2 = data.east.filter(s => s.round === 2);
  const eR3 = data.east.filter(s => s.round === 3);
  const wR1 = data.west.filter(s => !s.round || s.round === 1);
  const wR2 = data.west.filter(s => s.round === 2);
  const wR3 = data.west.filter(s => s.round === 3);
  const finals = [...data.east, ...data.west].filter(s => s.round === 4);

  c.innerHTML = `
    <div class="conference east">
      <div class="conference-label">Est</div>
      <div class="rounds">
        <div class="round r1"><div class="round-label">1re ronde</div>${fill(eR1, 4).map(s => matchupHTML(s)).join('')}</div>
        <div class="round r2"><div class="round-label">Demi-finales</div>${fill(eR2, 2).map(s => matchupHTML(s)).join('')}</div>
        <div class="round r3"><div class="round-label">Finale conf.</div>${fill(eR3, 1).map(s => matchupHTML(s)).join('')}</div>
      </div>
    </div>
    <div class="cup-center">
      <div class="trophy-icon">🏆</div>
      <div class="cup-label">NBA<br>Finals</div>
      <div style="margin-top:15px">${matchupHTML(finals[0] || tbdS)}</div>
    </div>
    <div class="conference west">
      <div class="conference-label">Ouest</div>
      <div class="rounds">
        <div class="round r1"><div class="round-label">1re ronde</div>${fill(wR1, 4).map(s => matchupHTML(s)).join('')}</div>
        <div class="round r2"><div class="round-label">Demi-finales</div>${fill(wR2, 2).map(s => matchupHTML(s)).join('')}</div>
        <div class="round r3"><div class="round-label">Finale conf.</div>${fill(wR3, 1).map(s => matchupHTML(s)).join('')}</div>
      </div>
    </div>`;

  // Attach click handlers directly on matchup cards
  c.querySelectorAll('.matchup[data-series-letter]').forEach(el => {
    el.addEventListener('click', function() {
      openSeriesModal(this.getAttribute('data-series-letter'));
    });
  });
}

function matchupHTML(s) {
  const t = s.top, b = s.bot, tw = t.w === 4, bw = b.w === 4, tbd = !t.a && !b.a;
  const dataAttr = (t.a && b.a && s.letter) ? `data-series-letter="${s.letter}"` : '';
  if (tbd) {
    return `<div class="matchup tbd">
      <div class="team-row"><span class="seed">-</span><span class="tbd-label">À venir</span><span class="team-wins-num">-</span></div>
      <div class="team-row"><span class="seed">-</span><span class="tbd-label">À venir</span><span class="team-wins-num">-</span></div>
    </div>`;
  }
  const placeholder = '<span style="width:58px;height:58px;display:inline-block;background:rgba(200,16,46,0.06);border-radius:10px;border:2px dashed rgba(200,16,46,0.15);"></span>';
  const logoT = t.logo || LOGO(t.a);
  const logoB = b.logo || LOGO(b.a);

  return `<div class="matchup" ${dataAttr}>
    <div class="team-row ${tw ? 'winner' : ''} ${bw ? 'eliminated' : ''}">
      <span class="seed">${t.s || '-'}</span>
      ${t.a ? `<img class="team-logo" src="${logoT}" onerror="this.style.display='none'">` : placeholder}
      <span class="team-abbrev">${t.a || '?'}</span>
      <span class="team-wins-num ${t.w > 0 ? 'has-wins' : ''}">${t.w}</span>
    </div>
    <div class="team-row ${bw ? 'winner' : ''} ${tw ? 'eliminated' : ''}">
      <span class="seed">${b.s || '-'}</span>
      ${b.a ? `<img class="team-logo" src="${logoB}" onerror="this.style.display='none'">` : placeholder}
      <span class="team-abbrev">${b.a || '?'}</span>
      <span class="team-wins-num ${b.w > 0 ? 'has-wins' : ''}">${b.w}</span>
    </div>
  </div>`;
}

// =============================================
// SERIES MODAL
// =============================================
function findSeriesByLetter(letter) {
  const all = [...(bracketData?.east || []), ...(bracketData?.west || [])];
  return all.find(s => s.letter === letter) || null;
}

function openSeriesModal(letter) {
  try {
    const series = findSeriesByLetter(letter);
    if (!series) { console.warn('[NBA] No series for letter', letter); return; }

    const modal = document.getElementById('seriesModal');
    const content = document.getElementById('modalContent');
    const t = series.top, b = series.bot;
    const sched = SCHED[letter] || [];
    const tLogo = t.logo || LOGO(t.a);
    const bLogo = b.logo || LOGO(b.a);

    // Find API games for this series via seriesId
    const apiSeries = series.seriesId ? seriesMap[series.seriesId] : null;
    const apiGames = apiSeries?.games || [];

    let gamesHTML = '';

    if (apiGames.length > 0) {
      apiGames.forEach((ev, i) => {
        const comp = ev.competitions?.[0];
        const home = comp?.competitors?.find(c => c.homeAway === 'home');
        const away = comp?.competitors?.find(c => c.homeAway === 'away');
        const status = comp?.status;
        const isFinal = status?.type?.completed;
        const isLive = status?.type?.name === 'STATUS_IN_PROGRESS';
        const gameDate = new Date(ev.date).toLocaleDateString('fr-CA', { day: 'numeric', month: 'short'});

        let badge = isLive ? `<span class="modal-game-badge live"><span class="live-pulse"></span>EN COURS</span>` :
          isFinal ? `<span class="modal-game-badge final">FINAL</span>` :
          `<span class="modal-game-badge upcoming">À VENIR</span>`;

        const aS = parseInt(away?.score) || 0, hS = parseInt(home?.score) || 0;
        const aW = isFinal && aS > hS, hW = isFinal && hS > aS;

        gamesHTML += `
          <div class="modal-game" data-event-id="${ev.id}" onclick="toggleModalGameDetail(this)">
            <span class="modal-game-num">Match ${i + 1}</span>
            <span class="modal-game-date">${gameDate}</span>
            <div class="modal-game-score">
              <img src="${away?.team?.logo || LOGO(away?.team?.abbreviation || '')}">
              <span class="mg-score ${aW ? 'winner' : ''}">${isFinal || isLive ? aS : '-'}</span>
              <span class="mg-at">@</span>
              <span class="mg-score ${hW ? 'winner' : ''}">${isFinal || isLive ? hS : '-'}</span>
              <img src="${home?.team?.logo || LOGO(home?.team?.abbreviation || '')}">
            </div>
            ${badge}
          </div>
          <div class="modal-game-details" id="mgd-${ev.id}"></div>`;
      });

      for (let i = apiGames.length; i < 7; i++) {
        const ifN = i >= 4;
        gamesHTML += `<div class="modal-game" style="opacity:${ifN ? '0.25' : '0.5'};cursor:default">
          <span class="modal-game-num">Match ${i + 1}</span>
          <span class="modal-game-date">${sched[i] || ''}</span>
          <div class="modal-game-score"><img src="${tLogo}" style="width:24px;height:24px;opacity:0.4"><span class="mg-at">vs</span><img src="${bLogo}" style="width:24px;height:24px;opacity:0.4"></div>
          <span class="modal-game-badge ${ifN ? 'if-needed' : 'upcoming'}">${ifN ? 'SI NÉC.' : 'À VENIR'}</span>
        </div>`;
      }
    } else {
      for (let i = 0; i < 7; i++) {
        const ifN = i >= 4;
        gamesHTML += `<div class="modal-game" style="opacity:${ifN ? '0.25' : '0.5'};cursor:default">
          <span class="modal-game-num">Match ${i + 1}</span>
          <span class="modal-game-date">${sched[i] || ''}</span>
          <div class="modal-game-score"><img src="${tLogo}" style="width:24px;height:24px"><span class="mg-at">vs</span><img src="${bLogo}" style="width:24px;height:24px"></div>
          <span class="modal-game-badge ${ifN ? 'if-needed' : 'upcoming'}">${ifN ? 'SI NÉC.' : 'À VENIR'}</span>
        </div>`;
      }
    }

    content.innerHTML = `
      <div class="modal-header">
        <button class="modal-close" onclick="closeSeriesModal()">&times;</button>
        <div class="modal-team"><img src="${tLogo}"><div class="modal-team-name">${t.n || t.a}</div><div class="modal-team-record">${t.w}</div></div>
        <div class="modal-vs">VS</div>
        <div class="modal-team"><img src="${bLogo}"><div class="modal-team-name">${b.n || b.a}</div><div class="modal-team-record">${b.w}</div></div>
      </div>
      <div class="modal-series-label">SÉRIE ${letter} — MEILLEUR DE 7</div>
      <div class="modal-games">${gamesHTML}</div>`;

    modal.classList.add('open');
  } catch(err) {
    console.error('[NBA] openSeriesModal error:', err);
  }
}

function closeSeriesModal() {
  const m = document.getElementById('seriesModal');
  if (m) m.classList.remove('open');
}
// Close on overlay click + Escape
(function() {
  const m = document.getElementById('seriesModal');
  if (m) m.addEventListener('click', function(e) { if (e.target === this) closeSeriesModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSeriesModal(); });
})();


async function toggleModalGameDetail(el) {
  const eventId = el.dataset.eventId;
  if (!eventId) return;
  const d = document.getElementById('mgd-' + eventId);
  if (!d) return;
  if (d.classList.contains('open')) { d.classList.remove('open'); return; }
  if (!d.innerHTML.trim()) {
    d.innerHTML = '<div class="modal-no-data">Chargement...</div>';
    d.classList.add('open');
    const summary = await apiFetch(API.summary(eventId));
    d.innerHTML = renderGameSummary(summary);
  }
  d.classList.toggle('open');
}

function renderGameSummary(summary) {
  if (!summary) return '<div class="no-data">Données non disponibles</div>';
  let html = '';
  const box = summary.boxscore;
  if (box?.players) {
    box.players.forEach(td => {
      const stats = td.statistics?.[0];
      if (!stats?.athletes) return;
      html += `<div style="margin-bottom:10px"><div class="period-label">${td.team?.displayName || ''}</div>`;
      stats.athletes.slice(0, 5).forEach(a => {
        const s = a.stats || [];
        const pts = s[12] || s[s.length - 1] || '0';
        const reb = s[6] || '0';
        const ast = s[7] || '0';
        html += `<div class="scorer-row">
          <img class="scorer-team-logo" src="${td.team?.logo || ''}" onerror="this.style.display='none'">
          <img class="leader-mugshot" src="${a.athlete?.headshot?.href || ''}" onerror="this.style.display='none'">
          <span class="scorer-name">${a.athlete?.displayName || ''}</span>
          <span class="scorer-stats">${pts} PTS ${reb} REB ${ast} AST</span>
        </div>`;
      });
      html += '</div>';
    });
  }
  return html || '<div class="no-data">Détails non disponibles</div>';
}

// =============================================
// RENDER RESULTS
// =============================================
function renderResults(data) {
  const c = document.getElementById('resultsContainer');
  const all = [...(data.east || []), ...(data.west || [])];
  const eastR1 = data.east.filter(s => !s.round || s.round === 1);
  const westR1 = data.west.filter(s => !s.round || s.round === 1);

  let html = '';
  if (eastR1.length) {
    html += `<div class="conf-section"><div class="conf-title">Conférence de l'Est — 1re ronde</div>`;
    eastR1.forEach(s => { html += seriesCardHTML(s); });
    html += '</div>';
  }
  if (westR1.length) {
    html += `<div class="conf-section"><div class="conf-title">Conférence de l'Ouest — 1re ronde</div>`;
    westR1.forEach(s => { html += seriesCardHTML(s); });
    html += '</div>';
  }
  if (!html) html = '<div class="no-data">Les séries commencent bientôt!</div>';
  c.innerHTML = html;

  c.querySelectorAll('.series-header').forEach(h => {
    h.addEventListener('click', () => h.closest('.series-card').classList.toggle('open'));
  });
  c.querySelectorAll('.game-card-header[data-event-id]').forEach(h => {
    h.addEventListener('click', async (e) => {
      e.stopPropagation();
      const card = h.closest('.game-card');
      const eid = h.dataset.eventId;
      if (!eid) return;
      if (card.classList.contains('open')) { card.classList.remove('open'); return; }
      const dd = card.querySelector('.game-details');
      if (!dd.innerHTML.trim()) {
        dd.innerHTML = '<div class="no-data">Chargement...</div>';
        card.classList.add('open');
        const summary = await apiFetch(API.summary(eid));
        dd.innerHTML = renderGameSummary(summary);
      }
      card.classList.toggle('open');
    });
  });
}

function seriesCardHTML(s) {
  const t = s.top, b = s.bot;
  const tw = t.w, bw = b.w, total = tw + bw;
  const letter = s.letter || '?';
  const sched = SCHED[letter] || [];

  let status = '';
  if (tw === 4) status = `${t.n || t.a} gagne en ${total}`;
  else if (bw === 4) status = `${b.n || b.a} gagne en ${total}`;
  else if (total === 0) status = `Match 1: ${sched[0] || 'À venir'}`;
  else if (tw === bw) status = `Égalité ${tw}-${bw}`;
  else { const l = tw > bw ? t : b; status = `${l.a} mène ${l.w}-${Math.min(tw, bw)}`; }

  const dots = w => Array(4).fill(0).map((_, i) => `<div class="dot ${i < w ? 'won' : ''}"></div>`).join('');
  const tLogo = t.logo || LOGO(t.a), bLogo = b.logo || LOGO(b.a);

  // Find API games for this series
  let gamesHTML = '';
  const sid = s.seriesId;
  const apiSeries = sid && seriesMap[sid];

  if (apiSeries && apiSeries.games.length) {
    apiSeries.games.forEach((ev, i) => {
      const comp = ev.competitions?.[0];
      const home = comp?.competitors?.find(c => c.homeAway === 'home');
      const away = comp?.competitors?.find(c => c.homeAway === 'away');
      const st = comp?.status;
      const isFinal = st?.type?.completed;
      const isLive = st?.type?.name === 'STATUS_IN_PROGRESS';

      let badge = isLive ? `<span class="game-status-badge live"><span class="live-pulse"></span>EN COURS</span>` :
        isFinal ? `<span class="game-status-badge final">FINAL</span>` :
        `<span class="game-status-badge upcoming">À VENIR</span>`;

      const aS = parseInt(away?.score) || 0, hS = parseInt(home?.score) || 0;
      const aW = isFinal && aS > hS, hW = isFinal && hS > aS;

      gamesHTML += `<div class="game-card">
        <div class="game-card-header" data-event-id="${ev.id}">
          <span class="game-num">Match ${i + 1}</span>
          <div class="game-mini-score">
            <img src="${away?.team?.logo || ''}" style="width:26px;height:26px">
            <span class="score-val ${aW ? 'winner-score' : ''}">${isFinal || isLive ? aS : '-'}</span>
            <span class="vs-label">@</span>
            <span class="score-val ${hW ? 'winner-score' : ''}">${isFinal || isLive ? hS : '-'}</span>
            <img src="${home?.team?.logo || ''}" style="width:26px;height:26px">
          </div>
          ${badge}
        </div>
        <div class="game-details"></div>
      </div>`;
    });
  }

  // Fill remaining scheduled games
  const played = apiSeries ? apiSeries.games.length : 0;
  for (let i = played; i < 7; i++) {
    const ifN = i >= 4;
    gamesHTML += `<div class="game-card">
      <div class="game-card-header" style="cursor:default;opacity:0.4">
        <span class="game-num">Match ${i + 1}</span>
        <span class="game-date-label">${sched[i] || ''}</span>
        <div class="game-mini-score">
          <img src="${tLogo}" style="width:22px;height:22px;opacity:0.4">
          <span class="vs-label">vs</span>
          <img src="${bLogo}" style="width:22px;height:22px;opacity:0.4">
        </div>
        <span class="game-status-badge upcoming">${ifN ? 'SI NÉC.' : 'À VENIR'}</span>
      </div>
    </div>`;
  }

  if (!gamesHTML) gamesHTML = '<div class="no-data">Aucun match joué</div>';

  return `<div class="series-card">
    <div class="series-header">
      <div class="series-letter-badge">${letter}</div>
      <div class="series-teams">
        <div class="series-team ${bw === 4 ? 'eliminated' : ''}">
          <img src="${tLogo}"><span class="name">${t.n || t.a}</span>
          <div class="dots">${dots(tw)}</div><span class="record ${tw > bw ? 'leading' : ''}">${tw}</span>
        </div>
        <div class="series-team ${tw === 4 ? 'eliminated' : ''}">
          <img src="${bLogo}"><span class="name">${b.n || b.a}</span>
          <div class="dots">${dots(bw)}</div><span class="record ${bw > tw ? 'leading' : ''}">${bw}</span>
        </div>
      </div>
      <div class="series-status">
        <div class="status-label">SÉRIE ${letter}</div>
        <div class="status-text">${status}</div>
      </div>
    </div>
    <div class="series-games">${gamesHTML}</div>
  </div>`;
}

// =============================================
// LEADERS
// =============================================
async function renderLeaders() {
  const c = document.getElementById('leadersContainer');
  const data = await apiFetch(API.leaders);
  if (!data || !data.leaders) {
    c.innerHTML = '<div class="no-data">Les meneurs seront disponibles une fois les séries commencées!</div>';
    return;
  }
  let html = '<div class="leaders-grid">';
  data.leaders.forEach(cat => {
    const leaders = cat.leaders || [];
    html += `<div class="leader-section"><div class="leader-section-title">${cat.displayName || cat.name || ''}</div>`;
    if (!leaders.length) { html += '<div class="no-data">Pas encore de données</div>'; }
    else {
      leaders.slice(0, 10).forEach((l, i) => {
        const a = l.athlete || {};
        html += `<div class="leader-row">
          <span class="leader-rank ${i === 0 ? 'gold' : ''}">${i + 1}</span>
          <img class="leader-mugshot" src="${a.headshot?.href || ''}" onerror="this.style.display='none'">
          <div class="leader-info"><div class="leader-name">${a.displayName || ''}</div>
          <div class="leader-team-info"><img src="${a.team?.logos?.[0]?.href || ''}">${a.team?.abbreviation || ''}</div></div>
          <span class="leader-value">${l.displayValue || l.value || ''}</span>
        </div>`;
      });
    }
    html += '</div>';
  });
  html += '</div>';
  c.innerHTML = html;
}

// =============================================
// VIEW SWITCHING
// =============================================
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.view + 'View').classList.add('active');

// =============================================
// REFRESH
// =============================================
async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  bracketData = await fetchPlayoffData();
  renderBracket(bracketData);
  renderResults(bracketData);
  renderLeaders();
  setTimeout(() => btn.classList.remove('spinning'), 600);
}

// =============================================
// ZOOM (TNI)
// =============================================
let currentZoom = 100;
const ZOOM_STEPS = [75, 100, 125, 150, 175, 200];
function setZoom(action) {
  const idx = ZOOM_STEPS.indexOf(currentZoom);
  if (action === 'in' && idx < ZOOM_STEPS.length - 1) currentZoom = ZOOM_STEPS[idx + 1];
  else if (action === 'out' && idx > 0) currentZoom = ZOOM_STEPS[idx - 1];
  else if (action === 'reset') currentZoom = 100;
  applyZoom();
}
function applyZoom() {
  document.getElementById('zoomLevel').textContent = currentZoom + '%';
  const scale = currentZoom / 100;
  document.querySelectorAll('.header, .view, .footer').forEach(el => {
    el.style.transform = scale === 1 ? '' : `scale(${scale})`;
    el.style.transformOrigin = 'top center';
  });
  document.body.style.paddingBottom = scale > 1 ? ((scale - 1) * 100) + 'vh' : '';
}

// =============================================
// INIT
// =============================================
async function init() {
  try {
    createNBABackground();
    console.log('[NBA] Fetching playoff data...');
    bracketData = await fetchPlayoffData();
    console.log('[NBA] Bracket data:', bracketData?.east?.length, 'east', bracketData?.west?.length, 'west');
    renderBracket(bracketData);
    renderResults(bracketData);
    renderLeaders();
    setInterval(refreshAll, 5 * 60 * 1000);
  } catch(err) {
    console.error('[NBA] Init error:', err);
    const c = document.getElementById('bracketContainer');
    if (c) c.innerHTML = '<div style="color:#fff;text-align:center;padding:40px;font-size:1.2rem;">Erreur de chargement. <button onclick="location.reload()" style="color:#FDB927;text-decoration:underline;border:none;background:none;cursor:pointer;font-size:1.2rem;">Réessayer</button></div>';
  }
}
init();
