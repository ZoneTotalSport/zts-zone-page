  @font-face { font-family: 'ZoneTotalSport'; src: url('fonts/ZoneTotalSport.ttf') format('truetype'); }
  /* ═══ POLICES ZTS — alias les noms originaux vers nos 6 polices locales ═══ */

  /* Alias des anciens noms → fichiers locaux ZTS (remplace Google Fonts) */

  @font-face { font-family: 'Righteous'; src: url('fonts/Kranky-Regular.ttf') format('truetype'); font-display:swap; }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cyan: #00E5FF;
    --cyan-dark: #0099CC;
    --bleu: #0099FF;
    --bleu-fonce: #003B73;
    --bleu-nuit: #0D1B2A;
    --jaune: #FFD600;
    --jaune-vif: #FFE94D;
    --blanc: #FFFFFF;
    --rouge: #E63946;
    --vert: #2ECC71;
    --orange: #FF6B35;
    --glow-cyan: 0 0 20px rgba(0,229,255,0.4), 0 0 60px rgba(0,229,255,0.15);
    --glow-jaune: 0 0 20px rgba(255,214,0,0.4), 0 0 60px rgba(255,214,0,0.15);
  }

  body {
    font-family: 'Righteous', sans-serif;
    background: var(--bleu-nuit);
    color: var(--blanc);
    min-height: 100vh;
    overflow-x: auto;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(0,229,255,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 0%, rgba(255,214,0,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 100%, rgba(0,153,255,0.05) 0%, transparent 50%);
    position: relative;
  }

  /* NHL Logos Background Pattern */
  .nhl-bg-pattern {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: -1;
    opacity: 0.5;
    pointer-events: none;
    display: grid;
    grid-template-columns: repeat(auto-fill, 140px);
    grid-template-rows: repeat(auto-fill, 140px);
    gap: 10px;
    padding: 10px;
    align-content: start;
    overflow: hidden;
  }
  .nhl-bg-pattern img {
    width: 120px;
    height: 120px;
    object-fit: contain;
    filter: saturate(1.5) brightness(1.3);
  }

  /* ========== ZOOM CONTROLS (TNI / Gymnase) ========== */
  .zoom-controls {
    position: fixed;
    top: 50%;
    right: 12px;
    transform: translateY(-50%);
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .zoom-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    border: 2px solid rgba(0,229,255,0.3);
    background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(0,59,115,0.4));
    color: var(--cyan);
    font-family: 'Bungee', cursive;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
  }
  .zoom-btn:hover {
    background: linear-gradient(135deg, rgba(0,229,255,0.3), rgba(0,59,115,0.6));
    box-shadow: var(--glow-cyan);
    transform: scale(1.1);
  }
  .zoom-label {
    text-align: center;
    font-family: 'Bangers', cursive;
    font-size: 11px;
    color: rgba(0,229,255,0.5);
    letter-spacing: 1px;
  }


  /* ========== HEADER ========== */
  .header {
    text-align: center;
    padding: 25px 20px 0;
    position: relative;
    background: rgba(8,18,35,0.92);
    z-index: 10;
  }
  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--cyan), var(--jaune), var(--cyan));
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 10px;
  }
  .mascot-header {
    height: 90px;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    animation: float 3s ease-in-out infinite;
  }
  .player-header {
    height: 110px;
    filter: drop-shadow(0 4px 15px rgba(0,229,255,0.4));
    animation: float 3s ease-in-out infinite;
    border-radius: 8px;
  }
  .player-header.right {
    animation-delay: -1.5s;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .header h1 {
    font-family: 'Luckiest Guy', cursive;
    font-size: 42px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--cyan);
    text-shadow: 0 0 10px rgba(0,229,255,0.5), 3px 3px 0 var(--bleu-fonce);
    line-height: 1.1;
  }
  .header h1 span {
    color: var(--jaune);
    text-shadow: 0 0 10px rgba(255,214,0,0.5), 3px 3px 0 var(--bleu-fonce);
  }

  .subtitle {
    font-family: 'Barriecito', cursive;
    color: var(--jaune-vif);
    font-size: 18px;
    letter-spacing: 2px;
    margin-top: 5px;
  }

  .zts-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--jaune), #FFA000);
    color: var(--bleu-fonce);
    font-family: 'Bangers', cursive;
    font-size: 14px;
    padding: 4px 16px;
    border-radius: 20px;
    letter-spacing: 2px;
    margin-top: 8px;
    box-shadow: var(--glow-jaune);
  }

  /* ========== TABS ========== */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 0;
    margin: 20px auto 0;
    max-width: 700px;
  }
  .tab {
    padding: 12px 28px;
    font-family: 'Bangers', cursive;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    color: rgba(0,229,255,0.4);
    border: none;
    border-bottom: 3px solid transparent;
    background: none;
    transition: all 0.3s;
  }
  .tab:hover { color: var(--cyan); }
  .tab.active {
    color: var(--cyan);
    border-bottom-color: var(--cyan);
    text-shadow: 0 0 15px rgba(0,229,255,0.5);
  }

  /* ========== VIEWS ========== */
  .view { display: none; }
  .view.active { display: block; }

  /* ========== BRACKET ========== */
  .bracket-container {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 15px 10px 40px;
    gap: 0;
    min-width: 1300px;
    max-width: 1600px;
    margin: 0 auto;
  }

  .conference { flex: 1; }
  .conference-label {
    text-align: center;
    font-family: 'Luckiest Guy', cursive;
    font-size: 22px;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: var(--cyan);
    padding: 10px 20px;
    text-shadow: 0 0 15px rgba(0,229,255,0.3);
    background: rgba(8,18,35,0.9);
    border-radius: 10px;
    margin: 0 10px 10px;
  }

  .rounds { display: flex; align-items: stretch; min-height: 520px; gap: 8px; }
  .east .rounds { flex-direction: row; }
  .west .rounds { flex-direction: row-reverse; }

  .round {
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    min-width: 205px;
    padding: 0 2px;
  }

  .round-label {
    text-align: center;
    font-family: 'Bangers', cursive;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--jaune);
    margin-bottom: 6px;
    background: rgba(8,18,35,0.85);
    padding: 4px 10px;
    border-radius: 6px;
    text-shadow: 0 0 10px rgba(255,214,0,0.3);
  }

  /* Round 1: 4 matchups evenly spaced */
  .round.r1 { gap: 4px; justify-content: center; }
  /* Round 2: 2 matchups centered between R1 pairs */
  .round.r2 { justify-content: space-around; padding: 20px 0; }
  /* Conf finals: 1 matchup, centered */
  .round.r3 { justify-content: center; }

  /* ========== MATCHUP CARD ========== */
  .matchup {
    background: rgba(8,18,35,0.96);
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid rgba(0,229,255,0.3);
    width: 195px;
    margin: 0 auto;
    transition: all 0.3s;
    cursor: pointer;
    box-shadow: 0 3px 12px rgba(0,0,0,0.6);
  }
  .matchup:hover {
    border-color: rgba(0,229,255,0.6);
    box-shadow: var(--glow-cyan), 0 4px 20px rgba(0,0,0,0.7);
    transform: scale(1.03);
  }

  .team-row {
    display: flex;
    align-items: center;
    padding: 4px 6px;
    gap: 5px;
    transition: all 0.3s;
  }
  .team-row:first-child { border-bottom: 1px solid rgba(0,229,255,0.15); }
  .team-row.winner { background: linear-gradient(90deg, rgba(46,204,113,0.25), transparent); }
  .team-row.eliminated { opacity: 0.35; }

  .seed {
    font-family: 'Bangers', cursive;
    font-size: 14px;
    color: var(--jaune);
    width: 16px;
    text-align: center;
  }
  .team-logo {
    width: 50px;
    height: 50px;
    object-fit: contain;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  }
  .team-abbrev {
    font-family: 'Luckiest Guy', cursive;
    font-size: 14px;
    color: var(--blanc);
    flex: 1;
    letter-spacing: 1px;
  }
  .team-wins-num {
    font-family: 'Bungee', cursive;
    font-size: 18px;
    width: 22px;
    text-align: center;
    color: rgba(255,255,255,0.3);
  }
  .team-wins-num.has-wins { color: var(--vert); text-shadow: 0 0 10px rgba(46,204,113,0.5); }

  /* Cup */
  .cup-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 150px;
    padding: 20px 10px;
    background: rgba(8,18,35,0.9);
    border-radius: 14px;
    margin: 0 5px;
    align-self: center;
  }
  .cup-center img.cup-img {
    width: 95px;
    filter: drop-shadow(0 0 25px rgba(255,214,0,0.4));
    margin-bottom: 10px;
  }
  .cup-label {
    font-family: 'Bungee Shade', cursive;
    font-size: 12px;
    text-transform: uppercase;
    color: var(--jaune);
    text-align: center;
    text-shadow: 0 0 10px rgba(255,214,0,0.3);
  }

  /* ========== RESULTS VIEW ========== */
  .results-container {
    max-width: 950px;
    margin: 0 auto;
    padding: 20px 20px 60px;
  }
  .conf-section { margin-bottom: 30px; }
  .conf-title {
    font-family: 'Luckiest Guy', cursive;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: var(--cyan);
    padding: 12px 18px;
    border-bottom: 2px solid rgba(0,229,255,0.2);
    margin-bottom: 15px;
    background: rgba(8,18,35,0.9);
    border-radius: 10px 10px 0 0;
  }

  /* ========== SERIES CARD ========== */
  .series-card {
    background: rgba(8,18,35,0.95);
    border-radius: 12px;
    border: 2px solid rgba(0,229,255,0.2);
    margin-bottom: 12px;
    overflow: hidden;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  }
  .series-card:hover { border-color: rgba(0,229,255,0.4); box-shadow: 0 4px 25px rgba(0,0,0,0.5); }

  .series-header {
    display: flex;
    align-items: center;
    padding: 16px 20px;
    gap: 15px;
    cursor: pointer;
  }
  .series-letter-badge {
    font-family: 'Bungee', cursive;
    font-size: 18px;
    color: var(--bleu-nuit);
    background: linear-gradient(135deg, var(--cyan), var(--bleu));
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 15px rgba(0,229,255,0.3);
  }

  .series-teams { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .series-team { display: flex; align-items: center; gap: 10px; }
  .series-team img { width: 36px; height: 36px; object-fit: contain; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4)); }
  .series-team .name { font-family: 'Righteous', sans-serif; font-size: 15px; flex: 1; }
  .series-team.eliminated .name { color: #555; }

  .dots { display: flex; gap: 4px; }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
  }
  .dot.won { background: var(--vert); border-color: var(--vert); box-shadow: 0 0 6px rgba(46,204,113,0.5); }

  .series-team .record {
    font-family: 'Bungee', cursive;
    font-size: 22px;
    width: 28px;
    text-align: center;
    color: rgba(255,255,255,0.25);
  }
  .series-team .record.leading { color: var(--vert); text-shadow: 0 0 12px rgba(46,204,113,0.5); }

  .series-status { text-align: right; min-width: 140px; flex-shrink: 0; }
  .series-status .status-label {
    font-family: 'Bangers', cursive;
    color: rgba(0,229,255,0.5);
    font-size: 12px;
    letter-spacing: 2px;
  }
  .series-status .status-text {
    font-family: 'Barriecito', cursive;
    color: var(--jaune-vif);
    font-size: 15px;
    margin-top: 3px;
  }

  /* ========== GAMES DROPDOWN ========== */
  .series-games {
    display: none;
    background: rgba(0,0,0,0.3);
    border-top: 1px solid rgba(0,229,255,0.1);
    padding: 0;
  }
  .series-card.open .series-games { display: block; }

  .game-card {
    border-bottom: 1px solid rgba(0,229,255,0.06);
    transition: all 0.2s;
  }
  .game-card:last-child { border-bottom: none; }

  .game-card-header {
    display: flex;
    align-items: center;
    padding: 10px 20px;
    cursor: pointer;
    gap: 12px;
  }
  .game-card-header:hover { background: rgba(0,229,255,0.03); }

  .game-num {
    font-family: 'Bangers', cursive;
    color: var(--cyan);
    font-size: 14px;
    width: 70px;
    letter-spacing: 1px;
  }
  .game-date-label {
    font-family: 'Righteous', sans-serif;
    color: rgba(255,255,255,0.3);
    font-size: 12px;
    width: 80px;
  }
  .game-mini-score {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Bungee', cursive;
    font-size: 14px;
  }
  .game-mini-score img { width: 22px; height: 22px; }
  .game-mini-score .score-val { min-width: 18px; text-align: center; }
  .game-mini-score .score-val.winner-score { color: var(--vert); }
  .game-mini-score .vs-label { color: rgba(0,229,255,0.25); font-family: 'Bangers'; font-size: 12px; }

  .game-status-badge {
    font-family: 'Bangers', cursive;
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 12px;
    letter-spacing: 1px;
  }
  .game-status-badge.final { background: rgba(46,204,113,0.15); color: var(--vert); }
  .game-status-badge.live { background: rgba(230,57,70,0.2); color: var(--rouge); }
  .game-status-badge.upcoming { background: rgba(255,214,0,0.1); color: var(--jaune); }

  .live-pulse {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--rouge);
    border-radius: 50%;
    margin-right: 5px;
    animation: pulse 1.5s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ========== GAME DETAILS (scorers, goalies) ========== */
  .game-details {
    display: none;
    padding: 0 20px 15px;
    margin-left: 70px;
  }
  .game-card.open .game-details { display: block; }

  /* Scoring summary */
  .period-scoring {
    margin-bottom: 10px;
  }
  .period-label {
    font-family: 'Bangers', cursive;
    font-size: 13px;
    color: var(--jaune);
    letter-spacing: 2px;
    padding: 6px 0 4px;
    border-bottom: 1px solid rgba(255,214,0,0.1);
    margin-bottom: 6px;
  }

  .goal-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 0;
    font-size: 13px;
  }
  .goal-time {
    font-family: 'Bungee', cursive;
    font-size: 11px;
    color: var(--cyan);
    width: 45px;
    text-align: center;
  }
  .goal-mugshot {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(0,229,255,0.3);
    background: rgba(0,0,0,0.3);
  }
  .goal-team-logo { width: 18px; height: 18px; }
  .goal-scorer {
    font-family: 'Luckiest Guy', cursive;
    font-size: 13px;
    color: var(--blanc);
    letter-spacing: 0.5px;
  }
  .goal-assists {
    font-family: 'Barriecito', cursive;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    flex: 1;
  }
  .goal-strength {
    font-family: 'Bangers', cursive;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    letter-spacing: 1px;
  }
  .goal-strength.pp { background: rgba(255,214,0,0.2); color: var(--jaune); }
  .goal-strength.sh { background: rgba(0,229,255,0.2); color: var(--cyan); }
  .goal-strength.en { background: rgba(255,107,53,0.2); color: var(--orange); }
  .goal-score-after {
    font-family: 'Bungee', cursive;
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    width: 40px;
    text-align: center;
  }

  /* Goalie stats */
  .goalie-stats {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(0,229,255,0.08);
  }
  .goalie-stats-title {
    font-family: 'Bangers', cursive;
    font-size: 13px;
    color: var(--cyan);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .goalie-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
  }
  .goalie-mugshot {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255,214,0,0.3);
    background: rgba(0,0,0,0.3);
  }
  .goalie-info { flex: 1; }
  .goalie-name {
    font-family: 'Luckiest Guy', cursive;
    font-size: 13px;
    letter-spacing: 0.5px;
  }

<script>
// =============================================
// CONFIG & API
// =============================================
const LOGO = a => `https://assets.nhle.com/logos/nhl/svg/${a}_light.svg`;
const MUG = (s, t, id) => `https://assets.nhle.com/mugs/nhl/${s}/${t}/${id}.png`;
const SEASON = '20252026'; // NHL API season format
const API = {
  bracket: 'https://api-web.nhle.com/v1/playoff-bracket/2026',
  score: d => `https://api-web.nhle.com/v1/score/${d}`,
  boxscore: id => `https://api-web.nhle.com/v1/gamecenter/${id}/boxscore`,
  landing: id => `https://api-web.nhle.com/v1/gamecenter/${id}/landing`,
  schedule: d => `https://api-web.nhle.com/v1/schedule/${d}`,
  skaterLeaders: `https://api-web.nhle.com/v1/skater-stats-leaders/20252026/3?categories=points,goals,assists&limit=10`,
  goalieLeaders: `https://api-web.nhle.com/v1/goalie-stats-leaders/20252026/3?categories=savePctg,wins,goalsAgainstAverage&limit=10`,
};

// NHL API n'a pas de CORS — on passe directement par les proxies
const PROXIES = [
  u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
  u => 'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(u),
];
async function apiFetch(url) {
  for (const proxy of PROXIES) {
    try {
      const r = await fetch(proxy(url), { signal: AbortSignal.timeout(6000) });
      if (!r.ok) continue;
      return await r.json();
    } catch(e) { /* try next proxy */ }
  }
  console.warn('API fail (all proxies):', url);
  return null;
}

// =============================================
// PARTICLES
// =============================================
function createParticles() {
  const c = document.getElementById('particles');
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random()*100+'%';
    p.style.animationDelay = Math.random()*8+'s';
    p.style.animationDuration = (6+Math.random()*6)+'s';
    p.style.width = p.style.height = (1+Math.random()*3)+'px';
    c.appendChild(p);
  }
}

function createNHLBackground() {
  const teams = [
    'TOR','MTL','BOS','BUF','OTT','TBL','CAR','PIT','PHI','FLA',
    'NYR','NYI','NJD','WSH','DET','CBJ','COL','DAL','EDM','VGK',
    'MIN','LAK','ANA','SEA','VAN','WPG','CGY','STL','NSH','CHI',
    'SJS','UTA'
  ];
  const container = document.getElementById('nhlBgPattern');
  // Use dark logos (colorful, for dark background)
  for (let i = 0; i < 32; i++) {
    const team = teams[i % teams.length];
    const img = document.createElement('img');
    img.src = `https://assets.nhle.com/logos/nhl/svg/${team}_dark.svg`;
    img.alt = '';
    img.loading = 'lazy';
    container.appendChild(img);
  }
}

// =============================================
// DATA STORES
// =============================================
let bracketData = null;
let gamesCache = {}; // gameId -> {landing, boxscore}
let scoresCache = {}; // date -> score data

// Fallback bracket
// Fallback mis à jour le 28 avril 2026
const FALLBACK = {
  east: [
    { top: {a:'BUF',n:'Buffalo Sabres',s:1,w:3}, bot: {a:'BOS',n:'Boston Bruins',s:4,w:1}, letter:'A', g1:'Sam. 19 avr.' },
    { top: {a:'TBL',n:'Tampa Bay Lightning',s:2,w:2}, bot: {a:'MTL',n:'Montréal Canadiens',s:3,w:2}, letter:'B', g1:'Sam. 19 avr.' },
    { top: {a:'CAR',n:'Carolina Hurricanes',s:1,w:4}, bot: {a:'OTT',n:'Ottawa Senators',s:4,w:0}, letter:'C', g1:'Ven. 18 avr.' },
    { top: {a:'PIT',n:'Pittsburgh Penguins',s:2,w:2}, bot: {a:'PHI',n:'Philadelphia Flyers',s:3,w:3}, letter:'D', g1:'Ven. 18 avr.' },
  ],
  west: [
    { top: {a:'COL',n:'Colorado Avalanche',s:1,w:4}, bot: {a:'LAK',n:'Los Angeles Kings',s:4,w:0}, letter:'E', g1:'Sam. 19 avr.' },
    { top: {a:'DAL',n:'Dallas Stars',s:2,w:2}, bot: {a:'MIN',n:'Minnesota Wild',s:3,w:2}, letter:'F', g1:'Ven. 18 avr.' },
    { top: {a:'VGK',n:'Vegas Golden Knights',s:1,w:2}, bot: {a:'UTA',n:'Utah Mammoth',s:4,w:2}, letter:'G', g1:'Sam. 19 avr.' },
    { top: {a:'EDM',n:'Edmonton Oilers',s:2,w:1}, bot: {a:'ANA',n:'Anaheim Ducks',s:3,w:3}, letter:'H', g1:'Dim. 20 avr.' },
  ]
};

const SCHED = {
  A: ['19 avr.','21 avr.','23 avr.','25 avr.','27 avr.','29 avr.','1 mai'],
  B: ['19 avr.','21 avr.','23 avr.','25 avr.','27 avr.','29 avr.','1 mai'],
  C: ['18 avr.','20 avr.','22 avr.','24 avr.','26 avr.','28 avr.','30 avr.'],
  D: ['18 avr.','20 avr.','22 avr.','24 avr.','26 avr.','28 avr.','30 avr.'],
  E: ['19 avr.','21 avr.','23 avr.','25 avr.','27 avr.','29 avr.','1 mai'],
  F: ['18 avr.','20 avr.','22 avr.','24 avr.','26 avr.','28 avr.','30 avr.'],
  G: ['19 avr.','21 avr.','23 avr.','25 avr.','27 avr.','29 avr.','1 mai'],
  H: ['20 avr.','22 avr.','24 avr.','26 avr.','28 avr.','30 avr.','2 mai'],
};

// =============================================
// FETCH BRACKET
// =============================================
function parseSeries(s) {
  const topA = s.topSeedTeam?.abbrev || '';
  const botA = s.bottomSeedTeam?.abbrev || '';
  // Skip TBD placeholders (id=-1)
  const topValid = topA && topA !== 'TBD';
  const botValid = botA && botA !== 'TBD';
  return {
    top: { a: topValid ? topA : '', n: topValid ? (s.topSeedTeam?.name?.default||topA) : '', s: s.topSeedRank||0, w: s.topSeedWins||0 },
    bot: { a: botValid ? botA : '', n: botValid ? (s.bottomSeedTeam?.name?.default||botA) : '', s: s.bottomSeedRank||0, w: s.bottomSeedWins||0 },
    letter: s.seriesLetter||'',
    g1: '',
  };
}

async function fetchBracket() {
  const data = await apiFetch(API.bracket);
  if (!data) return FALLBACK;

  const seriesList = data.series || (data.rounds && data.rounds[0]?.series) || [];
  if (!seriesList.length) return FALLBACK;

  // East: R1=ABCD, R2 conf semis, R3 conf final (letters from API)
  // West: R1=EFGH, R2 conf semis, R3 conf final
  const EAST_R1 = 'ABCD', WEST_R1 = 'EFGH';

  const result = { east: [], west: [], eastR2: [], westR2: [], eastR3: [], westR3: [], finals: [] };

  seriesList.forEach(s => {
    const round = s.playoffRound || 1;
    const letter = s.seriesLetter || '';
    const title = (s.seriesTitle || '').toLowerCase();
    const entry = parseSeries(s);

    if (round === 1) {
      if (EAST_R1.includes(letter)) result.east.push(entry);
      else if (WEST_R1.includes(letter)) result.west.push(entry);
    } else if (title.includes('stanley cup')) {
      result.finals.push(entry);
    } else if (title.includes('conference final')) {
      // M=East conf final, N=West conf final
      if (letter === 'M') result.eastR3.push(entry);
      else if (letter === 'N') result.westR3.push(entry);
    } else if (round === 2) {
      // I,J = East R2; K,L = West R2
      if ('IJ'.includes(letter)) result.eastR2.push(entry);
      else if ('KL'.includes(letter)) result.westR2.push(entry);
    }
  });

  if (!result.east.length) result.east = FALLBACK.east;
  if (!result.west.length) result.west = FALLBACK.west;
  return result;
}

// =============================================
// FETCH SCORES FOR A DATE RANGE (find playoff games)
// =============================================
async function fetchPlayoffScores() {
  const dates = [];
  const today = new Date();
  for (let i = 0; i < 20; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    dates.push(d.toISOString().split('T')[0]);
  }

  // Fetch toutes les dates en parallèle
  const uncached = dates.filter(d => !scoresCache[d]);
  const results = await Promise.all(uncached.map(date => apiFetch(API.score(date)).then(data => ({ date, data }))));
  results.forEach(({ date, data }) => {
    if (data && data.games) {
      scoresCache[date] = data.games.filter(g => g.gameType === 3);
    } else {
      scoresCache[date] = [];
    }
  });

  const allGames = [];
  dates.forEach(d => { if (scoresCache[d]) allGames.push(...scoresCache[d]); });
  return allGames;
}

// =============================================
// FETCH GAME DETAILS (landing + boxscore)
// =============================================
async function fetchGameDetails(gameId) {
  if (gamesCache[gameId]) return gamesCache[gameId];

  const [landing, boxscore] = await Promise.all([
    apiFetch(API.landing(gameId)),
    apiFetch(API.boxscore(gameId)),
  ]);

  const result = { landing, boxscore };
  gamesCache[gameId] = result;
  return result;
}

// =============================================
// RENDER BRACKET
// =============================================
function renderBracket(data) {
  const c = document.getElementById('bracketContainer');
  const tbd = { a:'', n:'?', s:0, w:0 };
  const tbdS = { top: tbd, bot: tbd };
  const fill = (arr, n) => { const r = [...arr]; while (r.length < n) r.push(tbdS); return r; };

  const eR2 = fill(data.eastR2 || [], 2);
  const wR2 = fill(data.westR2 || [], 2);
  const eR3 = fill(data.eastR3 || [], 1);
  const wR3 = fill(data.westR3 || [], 1);
  const finals = (data.finals && data.finals.length) ? data.finals[0] : tbdS;

  c.innerHTML = `
    <div class="conference east">
      <div class="conference-label">Est</div>
      <div class="rounds">
        <div class="round r1"><div class="round-label">1re ronde</div>${data.east.map(s=>matchupHTML(s)).join('')}</div>
        <div class="round r2"><div class="round-label">2e ronde</div>${eR2.map(s=>matchupHTML(s)).join('')}</div>
        <div class="round r3"><div class="round-label">Finale conf.</div>${eR3.map(s=>matchupHTML(s)).join('')}</div>
      </div>
    </div>
    <div class="cup-center">
      <img class="cup-img" src="https://assets.nhle.com/logos/playoffs/png/scp-20252026-cup.png" alt="Cup" onerror="this.style.display='none'">
      <div class="cup-label">Coupe<br>Stanley</div>
      <div style="margin-top:15px">${matchupHTML(finals)}</div>
    </div>
    <div class="conference west">
      <div class="conference-label">Ouest</div>
      <div class="rounds">
        <div class="round r1"><div class="round-label">1re ronde</div>${data.west.map(s=>matchupHTML(s)).join('')}</div>
        <div class="round r2"><div class="round-label">2e ronde</div>${wR2.map(s=>matchupHTML(s)).join('')}</div>
        <div class="round r3"><div class="round-label">Finale conf.</div>${wR3.map(s=>matchupHTML(s)).join('')}</div>
      </div>
    </div>`;
}

function matchupHTML(s) {
  const t = s.top, b = s.bot, tw = t.w===4, bw = b.w===4, tbd = !t.a && !b.a;
  const placeholder = '<span style="width:44px;height:44px;display:inline-block;background:rgba(0,229,255,0.08);border-radius:8px;border:2px dashed rgba(0,229,255,0.2);"></span>';
  const clickAttr = (t.a && b.a && s.letter) ? `onclick="openSeriesModal('${s.letter}')"` : '';
  return `<div class="matchup" ${clickAttr}>
    <div class="team-row ${tw?'winner':''} ${bw?'eliminated':''}">
      <span class="seed">${t.s||'-'}</span>
      ${t.a?`<img class="team-logo" src="${LOGO(t.a)}" onerror="this.style.display='none'">`:placeholder}
      <span class="team-abbrev">${t.a||'?'}</span>
      <span class="team-wins-num ${t.w>0?'has-wins':''}">${tbd?'-':t.w}</span>
    </div>
    <div class="team-row ${bw?'winner':''} ${tw?'eliminated':''}">
      <span class="seed">${b.s||'-'}</span>
      ${b.a?`<img class="team-logo" src="${LOGO(b.a)}" onerror="this.style.display='none'">`:placeholder}
      <span class="team-abbrev">${b.a||'?'}</span>
      <span class="team-wins-num ${b.w>0?'has-wins':''}">${tbd?'-':b.w}</span>
    </div>
  </div>`;
}

// =============================================
// SERIES MODAL (click from bracket)
// =============================================
function findSeriesByLetter(letter) {
  const all = [...(bracketData?.east||[]), ...(bracketData?.west||[])];
  return all.find(s => s.letter === letter);
}

async function openSeriesModal(letter) {
  const series = findSeriesByLetter(letter);
  if (!series) return;

  const modal = document.getElementById('seriesModal');
  const content = document.getElementById('modalContent');
  const t = series.top, b = series.bot;
  const sched = SCHED[letter] || [];

  // Find played games for this series from cache
  const allCachedGames = Object.values(scoresCache).flat();
  const seriesGames = allCachedGames.filter(g => g.seriesStatus?.seriesLetter === letter)
    .sort((a,b) => (a.seriesStatus?.gameNumberOfSeries||0) - (b.seriesStatus?.gameNumberOfSeries||0));

  const playedNums = seriesGames.map(g => g.seriesStatus?.gameNumberOfSeries).filter(Boolean);

  let gamesHTML = '';

  // Played / live games
  seriesGames.forEach(g => {
    const gNum = g.seriesStatus?.gameNumberOfSeries || '?';
    const state = g.gameState;
    const isFinal = state === 'OFF' || state === 'FINAL';
    const isLive = state === 'LIVE' || state === 'CRIT';
    const away = g.awayTeam, home = g.homeTeam;

    let badge = '';
    if (isLive) badge = `<span class="modal-game-badge live"><span class="live-pulse"></span>EN COURS</span>`;
    else if (isFinal) badge = `<span class="modal-game-badge final">FINAL</span>`;
    else badge = `<span class="modal-game-badge upcoming">À VENIR</span>`;

    const awayW = isFinal && (away.score > home.score);
    const homeW = isFinal && (home.score > away.score);

    gamesHTML += `
      <div class="modal-game" data-game-id="${g.id}" onclick="toggleModalGameDetail(this)">
        <span class="modal-game-num">Match ${gNum}</span>
        <div class="modal-game-score">
          <img src="${LOGO(away.abbrev)}">
          <span class="mg-score ${awayW?'winner':''}">${state==='FUT'?'-':away.score}</span>
          <span class="mg-at">@</span>
          <span class="mg-score ${homeW?'winner':''}">${state==='FUT'?'-':home.score}</span>
          <img src="${LOGO(home.abbrev)}">
        </div>
        ${isLive ? `<span style="font-family:'Bungee';font-size:11px;color:var(--cyan);">P${g.period} ${g.clock?.timeRemaining||''}</span>` : ''}
        ${badge}
      </div>
      <div class="modal-game-details" id="mgd-${g.id}"></div>`;
  });

  // Future games
  for (let i = 1; i <= 7; i++) {
    if (playedNums.includes(i)) continue;
    const ifNeeded = i > 4;
    gamesHTML += `
      <div class="modal-game" style="opacity:0.35;cursor:default">
        <span class="modal-game-num">Match ${i}</span>
        <span class="modal-game-date">${sched[i-1]||''}</span>
        <div class="modal-game-score">
          <img src="${LOGO(t.a)}" style="opacity:0.4">
          <span class="mg-at">vs</span>
          <img src="${LOGO(b.a)}" style="opacity:0.4">
        </div>
        <span class="modal-game-badge ${ifNeeded?'if-needed':'upcoming'}">${ifNeeded?'SI NÉC.':'À VENIR'}</span>
      </div>`;
  }

  if (!gamesHTML.trim() || seriesGames.length === 0) {
    // No games yet, show all 7 scheduled
    gamesHTML = '';
    for (let i = 1; i <= 7; i++) {
      const ifNeeded = i > 4;
      gamesHTML += `
        <div class="modal-game" style="opacity:${ifNeeded?'0.25':'0.5'};cursor:default">
          <span class="modal-game-num">Match ${i}</span>
          <span class="modal-game-date">${sched[i-1]||''}</span>
          <div class="modal-game-score">
            <img src="${LOGO(t.a)}" style="width:24px;height:24px">
            <span class="mg-at">vs</span>
            <img src="${LOGO(b.a)}" style="width:24px;height:24px">
          </div>
          <span class="modal-game-badge ${ifNeeded?'if-needed':'upcoming'}">${ifNeeded?'SI NÉC.':'À VENIR'}</span>
        </div>`;
    }
  }

  content.innerHTML = `
    <div class="modal-header">
      <button class="modal-close" onclick="closeSeriesModal()">&times;</button>
      <div class="modal-team">
        <img src="${LOGO(t.a)}">
        <div class="modal-team-name">${t.n}</div>
        <div class="modal-team-record">${t.w}</div>
      </div>
      <div class="modal-vs">VS</div>
      <div class="modal-team">
        <img src="${LOGO(b.a)}">
        <div class="modal-team-name">${b.n}</div>
        <div class="modal-team-record">${b.w}</div>
      </div>
    </div>
    <div class="modal-series-label">SÉRIE ${letter} — MEILLEUR DE 7</div>
    <div class="modal-games">${gamesHTML}</div>
  `;

  modal.classList.add('open');
}

function closeSeriesModal() {
  document.getElementById('seriesModal').classList.remove('open');
}

// Close modal on overlay click
document.getElementById('seriesModal').addEventListener('click', function(e) {
  if (e.target === this) closeSeriesModal();
});

// Close on Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSeriesModal(); });

// Load game details inside modal
async function toggleModalGameDetail(el) {
  const gameId = el.dataset.gameId;
  if (!gameId) return;

  const detailDiv = document.getElementById('mgd-' + gameId);
  if (!detailDiv) return;

  if (detailDiv.classList.contains('open')) {
    detailDiv.classList.remove('open');
    return;
  }

  if (!detailDiv.innerHTML.trim()) {
    detailDiv.innerHTML = '<div class="modal-no-data">Chargement des détails...</div>';
    detailDiv.classList.add('open');
    const details = await fetchGameDetails(gameId);
    detailDiv.innerHTML = renderGameDetails(details, '', '');
  }
  detailDiv.classList.toggle('open');
}

// =============================================
// RENDER RESULTS WITH GAME DETAILS
// =============================================
async function renderResults(data, playoffGames) {
  const c = document.getElementById('resultsContainer');

  // Group games by series letter
  const gamesBySeries = {};
  playoffGames.forEach(g => {
    const letter = g.seriesStatus?.seriesLetter;
    if (letter) {
      if (!gamesBySeries[letter]) gamesBySeries[letter] = [];
      gamesBySeries[letter].push(g);
    }
  });

  // Collect all series with at least one real team
  const allEast = [...data.east, ...(data.eastR2||[]), ...(data.eastR3||[])].filter(s => s.top.a || s.bot.a);
  const allWest = [...data.west, ...(data.westR2||[]), ...(data.westR3||[])].filter(s => s.top.a || s.bot.a);
  const finals = (data.finals||[]).filter(s => s.top.a || s.bot.a);

  let html = '';
  if (allEast.length) {
    html += `<div class="conf-section"><div class="conf-title">Conférence de l'Est</div>
      ${allEast.map(s => seriesCardHTML(s, gamesBySeries[s.letter] || [])).join('')}</div>`;
  }
  if (allWest.length) {
    html += `<div class="conf-section"><div class="conf-title">Conférence de l'Ouest</div>
      ${allWest.map(s => seriesCardHTML(s, gamesBySeries[s.letter] || [])).join('')}</div>`;
  }
  if (finals.length) {
    html += `<div class="conf-section"><div class="conf-title">Finale de la Coupe Stanley</div>
      ${finals.map(s => seriesCardHTML(s, gamesBySeries[s.letter] || [])).join('')}</div>`;
  }
  c.innerHTML = html || '<div class="no-data">Aucune série en cours</div>';

  // Attach handlers
  c.querySelectorAll('.series-header').forEach(h => {
    h.addEventListener('click', () => h.closest('.series-card').classList.toggle('open'));
  });

  c.querySelectorAll('.game-card-header').forEach(h => {
    h.addEventListener('click', async (e) => {
      e.stopPropagation();
      const card = h.closest('.game-card');
      const gameId = card.dataset.gameId;
      if (!gameId) return;

      if (card.classList.contains('open')) {
        card.classList.remove('open');
        return;
      }

      // Load game details
      const detailsDiv = card.querySelector('.game-details');
      if (!detailsDiv.innerHTML.trim()) {
        detailsDiv.innerHTML = '<div class="no-data">Chargement...</div>';
        card.classList.add('open');
        const details = await fetchGameDetails(gameId);
        detailsDiv.innerHTML = renderGameDetails(details, card.dataset.awayAbbrev, card.dataset.homeAbbrev);
      }
      card.classList.toggle('open');
    });
  });
}

function seriesCardHTML(series, games) {
  const t = series.top, b = series.bot;
  const total = t.w + b.w;
  const letter = series.letter;
  const sched = SCHED[letter] || [];

  let status = '';
  if (t.w === 4) status = `${t.a} gagne en ${total}`;
  else if (b.w === 4) status = `${b.a} gagne en ${total}`;
  else if (total === 0) status = `Match 1: ${series.g1 || sched[0] || 'À venir'}`;
  else if (t.w === b.w) status = `Égalité ${t.w}-${b.w}`;
  else { const l = t.w > b.w ? t : b; status = `${l.a} mène ${l.w}-${Math.min(t.w, b.w)}`; }

  const dots = (w) => Array(4).fill(0).map((_,i) => `<div class="dot ${i<w?'won':''}"></div>`).join('');

  // Build game cards
  let gamesHTML = '';
  const sortedGames = [...games].sort((a,b) => (a.seriesStatus?.gameNumberOfSeries||0) - (b.seriesStatus?.gameNumberOfSeries||0));

  // Played/live games
  sortedGames.forEach(g => {
    const gNum = g.seriesStatus?.gameNumberOfSeries || '?';
    const state = g.gameState; // FUT, LIVE, OFF, CRIT, FINAL
    const isFinal = state === 'OFF' || state === 'FINAL';
    const isLive = state === 'LIVE' || state === 'CRIT';
    const away = g.awayTeam, home = g.homeTeam;

    let statusBadge = '';
    if (isLive) statusBadge = `<span class="game-status-badge live"><span class="live-pulse"></span>EN COURS</span>`;
    else if (isFinal) statusBadge = `<span class="game-status-badge final">FINAL</span>`;
    else statusBadge = `<span class="game-status-badge upcoming">À VENIR</span>`;

    const awayW = isFinal && (away.score > home.score);
    const homeW = isFinal && (home.score > away.score);

    gamesHTML += `
      <div class="game-card" data-game-id="${g.id}" data-away-abbrev="${away.abbrev}" data-home-abbrev="${home.abbrev}">
        <div class="game-card-header">
          <span class="game-num">Match ${gNum}</span>
          <div class="game-mini-score">
            <img src="${LOGO(away.abbrev)}" style="width:22px;height:22px">
            <span class="score-val ${awayW?'winner-score':''}">${g.gameState==='FUT'?'-':away.score}</span>
            <span class="vs-label">@</span>
            <span class="score-val ${homeW?'winner-score':''}">${g.gameState==='FUT'?'-':home.score}</span>
            <img src="${LOGO(home.abbrev)}" style="width:22px;height:22px">
          </div>
          ${isLive ? `<span style="font-family:'Bungee';font-size:12px;color:var(--cyan);">${g.periodDescriptor?.periodType==='OT'?'PROL.':'P'+g.period} ${g.clock?.timeRemaining||''}</span>` : ''}
          ${statusBadge}
        </div>
        <div class="game-details"></div>
      </div>`;
  });

  // Future scheduled games (not yet in API)
  const playedNums = sortedGames.map(g => g.seriesStatus?.gameNumberOfSeries).filter(Boolean);
  for (let i = 1; i <= 7; i++) {
    if (playedNums.includes(i)) continue;
    const ifNeeded = i > 4 ? ' *' : '';
    gamesHTML += `
      <div class="game-card">
        <div class="game-card-header" style="cursor:default;opacity:0.4">
          <span class="game-num">Match ${i}</span>
          <span class="game-date-label">${sched[i-1]||''}</span>
          <div class="game-mini-score">
            <img src="${LOGO(t.a)}" style="width:20px;height:20px;opacity:0.4">
            <span class="vs-label">vs</span>
            <img src="${LOGO(b.a)}" style="width:20px;height:20px;opacity:0.4">
          </div>
          <span class="game-status-badge upcoming">${i > 4 ? 'SI NÉC.' : 'À VENIR'}</span>
        </div>
      </div>`;
  }

  return `
    <div class="series-card">
      <div class="series-header">
        <div class="series-letter-badge">${letter}</div>
        <div class="series-teams">
          <div class="series-team ${b.w===4?'eliminated':''}">
            <img src="${LOGO(t.a)}">
            <span class="name">${t.n}</span>
            <div class="dots">${dots(t.w)}</div>
            <span class="record ${t.w>b.w?'leading':''}">${t.w}</span>
          </div>
          <div class="series-team ${t.w===4?'eliminated':''}">
            <img src="${LOGO(b.a)}">
            <span class="name">${b.n}</span>
            <div class="dots">${dots(b.w)}</div>
            <span class="record ${b.w>t.w?'leading':''}">${b.w}</span>
          </div>
        </div>
        <div class="series-status">
          <div class="status-label">SÉRIE ${letter}</div>
          <div class="status-text">${status}</div>
        </div>
      </div>
      <div class="series-games">${gamesHTML || '<div class="no-data">Aucun match joué — les séries commencent le 18 avril!</div>'}</div>
    </div>`;
}

// =============================================
// RENDER GAME DETAILS (goals + goalies + stars)
// =============================================
function renderGameDetails(details, awayAbbrev, homeAbbrev) {
  if (!details.landing && !details.boxscore) return '<div class="no-data">Données non disponibles</div>';

  let html = '';
  const landing = details.landing;
  const box = details.boxscore;
  const season = landing?.season || box?.season || SEASON;

  // ---- SCORING BY PERIOD ----
  if (landing?.summary?.scoring) {
    landing.summary.scoring.forEach(period => {
      const pNum = period.periodDescriptor?.number;
      const pType = period.periodDescriptor?.periodType;
      const pLabel = pType === 'OT' ? 'PROLONGATION' : `${pNum}e PÉRIODE`;

      if (period.goals && period.goals.length > 0) {
        html += `<div class="period-scoring"><div class="period-label">${pLabel}</div>`;
        period.goals.forEach(g => {
          const assists = (g.assists || []).map(a => a.name?.default || a.firstName?.default).join(', ');
          const teamAbbrev = g.teamAbbrev?.default || g.teamAbbrev || '';
          const strengthLabel = g.strength === 'pp' ? '<span class="goal-strength pp">AN</span>'
            : g.strength === 'sh' ? '<span class="goal-strength sh">DÉS</span>'
            : g.goalModifier === 'empty-net' ? '<span class="goal-strength en">FD</span>'
            : '';

          html += `
            <div class="goal-row">
              <span class="goal-time">${g.timeInPeriod || ''}</span>
              <img class="goal-mugshot" src="${g.headshot || g.mugshot || ''}" onerror="this.style.display='none'">
              <img class="goal-team-logo" src="${LOGO(teamAbbrev)}" onerror="this.style.display='none'">
              <span class="goal-scorer">${g.firstName?.default || ''} ${g.lastName?.default || g.name?.default || ''}</span>
              <span class="goal-assists">${assists ? '('+assists+')' : '(non assisté)'}</span>
              ${strengthLabel}
              <span class="goal-score-after">${g.awayScore}-${g.homeScore}</span>
            </div>`;
        });
        html += '</div>';
      }
    });
  }

  // ---- GOALIE STATS ----
  if (box?.playerByGameStats) {
    html += '<div class="goalie-stats"><div class="goalie-stats-title">GARDIENS</div>';

    ['awayTeam', 'homeTeam'].forEach(side => {
      const teamStats = box.playerByGameStats[side];
      if (!teamStats?.goalies) return;
      const teamAbbrev = side === 'awayTeam' ? (box.awayTeam?.abbrev || awayAbbrev) : (box.homeTeam?.abbrev || homeAbbrev);

      teamStats.goalies.forEach(g => {
        const savePct = g.savePctg != null ? (g.savePctg * 100).toFixed(1) + '%' : '-';
        const decision = g.decision || '';

        html += `
          <div class="goalie-row">
            <img class="goalie-mugshot" src="${MUG(season, teamAbbrev, g.playerId)}" onerror="this.src='${LOGO(teamAbbrev)}'">
            <img src="${LOGO(teamAbbrev)}" style="width:20px;height:20px">
            <div class="goalie-info">
              <div class="goalie-name">#${g.sweaterNumber || ''} ${g.name?.default || ''}</div>
              <div class="goalie-team">${teamAbbrev} • ${g.toi || ''}</div>
            </div>
            <div class="goalie-stat-pills">
              <div class="goalie-pill">
                <span class="pill-label">ARRÊTS</span>
                <span class="pill-value">${g.saves != null ? g.saves : '-'}</span>
              </div>
              <div class="goalie-pill">
                <span class="pill-label">TIRS</span>
                <span class="pill-value">${g.shotsAgainst != null ? g.shotsAgainst : '-'}</span>
              </div>
              <div class="goalie-pill">
                <span class="pill-label">%ARR</span>
                <span class="pill-value">${savePct}</span>
              </div>
              <div class="goalie-pill">
                <span class="pill-label">BC</span>
                <span class="pill-value">${g.goalsAgainst != null ? g.goalsAgainst : '-'}</span>
              </div>
            </div>
            ${decision ? `<span class="goalie-decision ${decision}">${decision === 'W' ? 'V' : 'D'}</span>` : ''}
          </div>`;
      });
    });
    html += '</div>';
  }

  // ---- THREE STARS ----
  if (landing?.summary?.threeStars) {
    html += '<div class="three-stars"><div class="three-stars-title">3 ÉTOILES</div>';
    landing.summary.threeStars.forEach(star => {
      const stats = star.position === 'G'
        ? `${(star.savePctg*100).toFixed(1)||'-'}% arr.`
        : `${star.goals||0}B ${star.assists||0}A`;

      html += `
        <div class="star-row">
          <span class="star-num">${'★'.repeat(4 - star.star)}</span>
          <img class="star-mugshot" src="${star.headshot||''}" onerror="this.style.display='none'">
          <span class="star-name">${star.name?.default||''}</span>
          <img src="${LOGO(star.teamAbbrev||'')}" style="width:18px;height:18px">
          <span class="star-stats">${stats}</span>
        </div>`;
    });
    html += '</div>';
  }

  return html || '<div class="no-data">Données détaillées non disponibles</div>';
}

// =============================================
// RENDER LEADERS
// =============================================
async function renderLeaders() {
  const c = document.getElementById('leadersContainer');

  const [skaters, goalies] = await Promise.all([
    apiFetch(API.skaterLeaders),
    apiFetch(API.goalieLeaders),
  ]);

  if (!skaters && !goalies) {
    c.innerHTML = '<div class="no-data">Les meneurs seront disponibles une fois les séries commencées!</div>';
    return;
  }

  let html = '';

  // Skater leaders
  if (skaters) {
    html += '<div class="leaders-grid">';
    ['points', 'goals', 'assists'].forEach(cat => {
      const label = cat === 'points' ? 'POINTS' : cat === 'goals' ? 'BUTS' : 'PASSES';
      const players = skaters[cat] || [];
      if (players.length === 0) {
        html += `<div class="leader-section"><div class="leader-section-title">${label}</div><div class="no-data">Pas encore de données</div></div>`;
        return;
      }
      html += `<div class="leader-section"><div class="leader-section-title">${label}</div>`;
      players.slice(0, 10).forEach((p, i) => {
        html += `
          <div class="leader-row">
            <span class="leader-rank ${i===0?'gold':''}">${i+1}</span>
            <img class="leader-mugshot" src="${p.headshot||''}" onerror="this.style.display='none'">
            <div class="leader-info">
              <div class="leader-name">${p.firstName?.default||''} ${p.lastName?.default||p.name?.default||''}</div>
              <div class="leader-team-info">
                <img src="${LOGO(p.teamAbbrev||p.teamAbbrev?.default||'')}">
                ${p.teamAbbrev||''} #${p.sweaterNumber||''}
              </div>
            </div>
            <span class="leader-value">${p.value||0}</span>
          </div>`;
      });
      html += '</div>';
    });
    html += '</div>';
  }

  // Goalie leaders
  if (goalies) {
    html += '<div class="goalies-leaders-title">GARDIENS</div><div class="leaders-grid">';
    ['savePctg', 'wins', 'goalsAgainstAverage'].forEach(cat => {
      const label = cat === 'savePctg' ? '% ARRÊTS' : cat === 'wins' ? 'VICTOIRES' : 'MOY. BUTS ALLOUÉS';
      const players = goalies[cat] || [];
      if (players.length === 0) {
        html += `<div class="leader-section"><div class="leader-section-title">${label}</div><div class="no-data">Pas encore de données</div></div>`;
        return;
      }
      html += `<div class="leader-section"><div class="leader-section-title">${label}</div>`;
      players.slice(0, 10).forEach((p, i) => {
        let val = p.value;
        if (cat === 'savePctg') val = (val * 100).toFixed(1) + '%';
        else if (cat === 'goalsAgainstAverage') val = val.toFixed(2);

        html += `
          <div class="leader-row">
            <span class="leader-rank ${i===0?'gold':''}">${i+1}</span>
            <img class="leader-mugshot" src="${p.headshot||''}" onerror="this.style.display='none'">
            <div class="leader-info">
              <div class="leader-name">${p.firstName?.default||''} ${p.lastName?.default||p.name?.default||''}</div>
              <div class="leader-team-info">
                <img src="${LOGO(p.teamAbbrev||'')}">
                ${p.teamAbbrev||''} #${p.sweaterNumber||''}
              </div>
            </div>
            <span class="leader-value">${val}</span>
          </div>`;
      });
      html += '</div>';
    });
    html += '</div>';
  }

  c.innerHTML = html || '<div class="no-data">Les séries commencent le 18 avril — les meneurs apparaîtront bientôt!</div>';
}

async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  // Vider seulement les 2 derniers jours (données récentes/live) + game details
  const today = new Date().toISOString().split('T')[0];
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  delete scoresCache[today];
  delete scoresCache[yesterday];
  gamesCache = {};

  const [bracket, playoffGames] = await Promise.all([fetchBracket(), fetchPlayoffScores()]);

  renderBracket(bracketData);

  renderLeaders();

  setTimeout(() => btn.classList.remove('spinning'), 600);
}

// =============================================
// INIT
// =============================================
// =============================================
// ZOOM (TNI / Gymnase)
// =============================================
let currentZoom = parseInt(localStorage.getItem('zts_nhl_zoom') || '100');
const ZOOM_MIN = 50, ZOOM_MAX = 300, ZOOM_STEP = 10;

function setZoom(action) {
  if (action === 'in') currentZoom = Math.min(ZOOM_MAX, currentZoom + ZOOM_STEP);
  else if (action === 'out') currentZoom = Math.max(ZOOM_MIN, currentZoom - ZOOM_STEP);
  else if (action === 'reset') currentZoom = 100;
  applyZoom();
  localStorage.setItem('zts_nhl_zoom', String(currentZoom));
}

function applyZoom() {
  const lbl = document.getElementById('zoomLevel');
  if (lbl) lbl.textContent = currentZoom + '%';
  // Use CSS zoom (scales layout properly, no overflow weirdness)
  document.body.style.zoom = (currentZoom / 100);
}

// Apply persisted zoom on load
applyZoom();
// Ctrl/Cmd + scroll wheel to zoom
window.addEventListener('wheel', (e) => {
  if (e.ctrlKey || e.metaKey) {
    e.preventDefault();
    setZoom(e.deltaY < 0 ? 'in' : 'out');
  }
}, { passive: false });
// + / - keys
window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if ((e.ctrlKey || e.metaKey) && (e.key === '+' || e.key === '=')) { e.preventDefault(); setZoom('in'); }
  else if ((e.ctrlKey || e.metaKey) && e.key === '-') { e.preventDefault(); setZoom('out'); }
  else if ((e.ctrlKey || e.metaKey) && e.key === '0') { e.preventDefault(); setZoom('reset'); }
});

async function init() {
  createParticles();
  createNHLBackground();

  // Bracket + scores en parallèle
  const [bracket, playoffGames] = await Promise.all([fetchBracket(), fetchPlayoffScores()]);
  bracketData = bracket;

  renderBracket(bracketData);
  await renderResults(bracketData, playoffGames);
  renderLeaders(); // fire and forget

  // Auto-refresh every 3 minutes
  setInterval(refreshAll, 3 * 60 * 1000);
}

init();
